<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Détections</title>
  <link rel="stylesheet" href="bird-styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right">
      <div id="theme-switcher"></div>
        <div id="lang-switcher"></div>
    </div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- Filtres -->
    <div class="filter-bar">
      <div class="filter-group">
        <label data-i18n="filter_species"></label>
        <select class="bird-select" id="f-species" style="min-width:200px;">
          <option value="">— <span data-i18n="all_species"></span> —</option>
        </select>
      </div>
      <div class="filter-group">
        <label data-i18n="filter_date_from"></label>
        <input type="date" class="bird-input" id="f-date-from">
      </div>
      <div class="filter-group">
        <label data-i18n="filter_date_to"></label>
        <input type="date" class="bird-input" id="f-date-to">
      </div>
      <div class="filter-group">
        <label data-i18n="filter_confidence"></label>
        <select class="bird-select" id="f-conf">
          <option value="0">0%</option>
          <option value="0.5">50%</option>
          <option value="0.7" selected>70%</option>
          <option value="0.8">80%</option>
          <option value="0.9">90%</option>
        </select>
      </div>
      <div class="filter-group" style="justify-content:flex-end; flex-direction:row; gap:.4rem; align-self:flex-end;">
        <button class="btn btn-primary" onclick="applyFilters()" data-i18n="apply_filter"></button>
        <button class="btn btn-secondary" onclick="resetFilters()" data-i18n="reset_filter"></button>
      </div>
    </div>

    <!-- Résumé résultats -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem; font-size:.82rem; color:var(--text-muted);">
      <span id="result-summary"></span>
      <span id="page-info"></span>
    </div>

    <!-- Table détections -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div id="det-table-wrap">
        <div class="spinner" style="padding:3rem;"><div></div><div></div><div></div></div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

  </main>
</div>

<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
// ── État ─────────────────────────────────────────────────────────────────────
let state = {
  species:  '',
  dateFrom: '',
  dateTo:   localDateStr(),
  conf:     BIRD_CONFIG.defaultConfidence,
  page:     1,
  total:    0,
};

document.addEventListener('DOMContentLoaded', async () => {
  initPage('detections');
  applyI18n();

  // Pré-remplir depuis URL params
  const sp = getUrlParam('species');
  const dt = getUrlParam('date');
  if (sp) state.species = sp;
  if (dt) { state.dateFrom = dt; state.dateTo = dt; }

  // Date par défaut : 30 derniers jours
  if (!state.dateFrom) state.dateFrom = daysAgo(BIRD_CONFIG.recentDays);

  document.getElementById('f-date-from').value = state.dateFrom;
  document.getElementById('f-date-to').value   = state.dateTo;
  document.getElementById('f-conf').value       = state.conf;

  await loadSpeciesList();
  if (sp) document.getElementById('f-species').value = sp;

  await loadDetections();
});

document.addEventListener('langchange', applyI18n);

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset['i18n-placeholder']);
  });
}

// ── Liste espèces pour le select ──────────────────────────────────────────────
async function loadSpeciesList() {
  try {
    const rows = await birdQuery(
      `SELECT DISTINCT Com_Name FROM detections ORDER BY Com_Name ASC`
    );
    const sel = document.getElementById('f-species');
    sel.innerHTML = `<option value="">— ${t('all_species')} —</option>` +
      rows.map(r => `<option value="${r.Com_Name}">${r.Com_Name}</option>`).join('');
  } catch(e) { console.error('species list error:', e); }
}

// ── Chargement détections ─────────────────────────────────────────────────────
async function loadDetections() {
  const wrap = document.getElementById('det-table-wrap');
  wrap.innerHTML = `<div class="spinner" style="padding:3rem;"><div></div><div></div><div></div></div>`;

  try {
    // WHERE clause dynamique
    const wheres = ['1=1'];
    const params = [];

    if (state.species) {
      wheres.push('Com_Name = ?');
      params.push(state.species);
    }
    if (state.dateFrom) {
      wheres.push('Date >= ?');
      params.push(state.dateFrom);
    }
    if (state.dateTo) {
      wheres.push('Date <= ?');
      params.push(state.dateTo);
    }
    if (state.conf > 0) {
      wheres.push('Confidence >= ?');
      params.push(state.conf);
    }

    const where = wheres.join(' AND ');
    const offset = (state.page - 1) * BIRD_CONFIG.pageSize;

    // Total
    const [countRow] = await birdQuery(
      `SELECT COUNT(*) as n FROM detections WHERE ${where}`, params
    );
    state.total = countRow ? countRow.n : 0;

    // Données
    const rows = await birdQuery(
      `SELECT Date, Time, Com_Name, Sci_Name, Confidence, File_Name
       FROM detections WHERE ${where}
       ORDER BY Date DESC, Time DESC
       LIMIT ? OFFSET ?`,
      [...params, BIRD_CONFIG.pageSize, offset]
    );

    renderTable(rows);
    renderSummary();
    renderPagination();

  } catch(e) {
    wrap.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

// ── Rendu table ───────────────────────────────────────────────────────────────
function renderTable(rows) {
  const wrap = document.getElementById('det-table-wrap');

  if (!rows.length) {
    wrap.innerHTML = `<div class="error-msg" style="padding:2rem;">${t('no_data')}</div>`;
    return;
  }

  wrap.innerHTML = `
    <table class="bird-table">
      <thead>
        <tr>
          <th style="width:36px;"></th>
          <th data-i18n="date" style="width:100px;">${t('date')}</th>
          <th data-i18n="time" style="width:70px;">${t('time')}</th>
          <th data-i18n="species_name">${t('species_name')}</th>
          <th data-i18n="scientific_name" class="hide-sm">${t('scientific_name')}</th>
          <th data-i18n="confidence" style="width:90px;">${t('confidence')}</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(d => renderRow(d)).join('')}
      </tbody>
    </table>`;
}

function renderRow(d) {
  const conf     = parseFloat(d.Confidence);
  const confClass = conf >= 0.8 ? 'conf-high' : conf >= 0.6 ? 'conf-mid' : 'conf-low';
  const audioUrl  = d.File_Name ? buildAudioUrl(d.File_Name) : null;
  const safeFile  = d.File_Name ? d.File_Name.replace(/'/g,"&#39;") : '';

  const playBtn = audioUrl
    ? `<button class="play-btn"
               onclick="toggleAudio('${safeFile}', this)"
               title="${t('play')}">▶</button>`
    : `<span style="width:28px;display:inline-block;"></span>`;

  return `<tr>
    <td>${playBtn}</td>
    <td style="font-size:.8rem; color:var(--text-muted);">${fmtDate(d.Date)}</td>
    <td style="font-family:monospace; font-size:.8rem;">${fmtTime(d.Time)}</td>
    <td>
      <a class="species-link"
         onclick="navigateTo('especes.html',{species:'${encodeURIComponent(d.Com_Name)}'})">
        ${d.Com_Name}
      </a>
    </td>
    <td class="hide-sm" style="font-style:italic; font-size:.8rem; color:var(--text-muted);">
      ${d.Sci_Name || ''}
    </td>
    <td><span class="conf-badge ${confClass}">${fmtConf(d.Confidence)}</span></td>
  </tr>`;
}

// ── Résumé & pagination ────────────────────────────────────────────────────────
function renderSummary() {
  const totalPages = Math.ceil(state.total / BIRD_CONFIG.pageSize);
  document.getElementById('result-summary').textContent =
    `${state.total.toLocaleString()} ${t('results')}`;
  document.getElementById('page-info').textContent =
    `${t('page')} ${state.page} ${t('of')} ${totalPages}`;
}

function renderPagination() {
  const totalPages = Math.ceil(state.total / BIRD_CONFIG.pageSize);
  const pag = document.getElementById('pagination');

  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  // Pages à afficher : ±2 autour de la page courante
  const pages = new Set([1, totalPages, state.page]);
  for (let i = Math.max(1, state.page-2); i <= Math.min(totalPages, state.page+2); i++) pages.add(i);
  const sorted = [...pages].sort((a,b) => a-b);

  let html = `<button class="btn btn-secondary" ${state.page<=1?'disabled':''} onclick="goPage(${state.page-1})">${t('prev_page')}</button>`;

  let prev = 0;
  sorted.forEach(p => {
    if (p - prev > 1) html += `<span style="color:var(--text-faint)">…</span>`;
    html += `<button class="btn ${p===state.page?'btn-primary':'btn-secondary'}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });

  html += `<button class="btn btn-secondary" ${state.page>=totalPages?'disabled':''} onclick="goPage(${state.page+1})">${t('next_page')}</button>`;

  pag.innerHTML = html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function applyFilters() {
  state.species  = document.getElementById('f-species').value;
  state.dateFrom = document.getElementById('f-date-from').value;
  state.dateTo   = document.getElementById('f-date-to').value;
  state.conf     = parseFloat(document.getElementById('f-conf').value);
  state.page     = 1;
  loadDetections();
}

function resetFilters() {
  state.species  = '';
  state.dateFrom = daysAgo(BIRD_CONFIG.recentDays);
  state.dateTo   = localDateStr();
  state.conf     = BIRD_CONFIG.defaultConfidence;
  state.page     = 1;
  document.getElementById('f-species').value   = '';
  document.getElementById('f-date-from').value = state.dateFrom;
  document.getElementById('f-date-to').value   = state.dateTo;
  document.getElementById('f-conf').value      = state.conf;
  loadDetections();
}

function goPage(p) {
  state.page = p;
  window.scrollTo(0, 0);
  loadDetections();
}
</script>

<style>
@media (max-width: 640px) { .hide-sm { display: none; } }
</style>
</body>
</html>
