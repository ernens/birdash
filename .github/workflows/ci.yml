name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        # Errors fail the job; warnings surface but don't block. Catches
        # duplicate object keys, undefined globals, unreachable code — the
        # kind of slip the test suite wouldn't hit unless the exact path
        # runs at runtime.
        run: npm run lint

      - name: Stage CI fixtures
        # Copy birdnet.conf to /tmp so any boot-time mutation (auth secret
        # rotation, cache writes) doesn't dirty the checked-in fixture and
        # break a `git diff` check on subsequent runs.
        run: cp tests/fixtures/birdnet.conf /tmp/birdnet-ci.conf

      - name: Run tests
        # Integration suites self-skip when their Pi prereqs are missing
        # (no ~/birdengine/models, no audio_config.json, etc.) so CI
        # validates everything that's environment-portable. Pi installs
        # exercise the full set.
        #
        # BIRDNET_CONF points the config loader at the staged fixture
        # instead of /etc/birdnet/birdnet.conf. BIRDASH_DB points at /tmp;
        # the server auto-creates an empty schema.
        env:
          BIRDNET_CONF: /tmp/birdnet-ci.conf
          BIRDASH_DB: /tmp/birdash-ci.db
        run: npm test
