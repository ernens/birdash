name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # Integration suites self-skip when their Pi prereqs are missing
        # (no /etc/birdnet/birdnet.conf, no ~/birdengine/models, etc.) so
        # CI validates everything that's environment-portable. Pi installs
        # exercise the full set.
        run: npm test
