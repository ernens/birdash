# Dependabot — auto-update npm packages and GitHub Actions versions.
# Security updates are always opened ASAP regardless of schedule.
# Routine updates are batched weekly to avoid PR spam.

version: 2
updates:
  # Node.js dependencies (production + dev)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Brussels"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group minor/patch updates together to reduce PR noise
      production-minor:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in .github/workflows/*
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
