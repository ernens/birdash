<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Statistiques</title>
  <link rel="stylesheet" href="bird-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right"><div id="theme-switcher"></div>
        <div id="lang-switcher"></div></div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- KPIs globaux -->
    <div class="kpi-grid" id="global-kpis" style="margin-bottom:1rem;">
      <div class="spinner" style="grid-column:1/-1;"><div></div><div></div><div></div></div>
    </div>

    <!-- Totaux mensuels -->
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title" data-i18n="monthly_totals"></div>
      <div class="chart-wrap chart-wrap-tall">
        <canvas id="chart-monthly"></canvas>
      </div>
    </div>

    <!-- Classements côte à côte -->
    <div class="grid-2" style="margin-bottom:1rem;">

      <div class="card">
        <div class="card-title" data-i18n="top_by_count"></div>
        <div id="top-count">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title" data-i18n="top_by_confidence"></div>
        <div id="top-conf">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

    </div>

    <!-- Distribution de confiance -->
    <div class="grid-2" style="margin-bottom:1rem;">
      <div class="card">
        <div class="card-title" data-i18n="confidence_distrib"></div>
        <div class="chart-wrap">
          <canvas id="chart-conf-dist"></canvas>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🏆 Records journaliers</div>
        <div id="daily-records">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>
    </div>

    <!-- Activité par année -->
    <div class="card">
      <div class="card-title">📅 Évolution annuelle</div>
      <div class="chart-wrap">
        <canvas id="chart-yearly"></canvas>
      </div>
    </div>

  </main>
</div>

<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
let chartMonthly = null, chartConf = null, chartYearly = null;

document.addEventListener('DOMContentLoaded', async () => {
  initPage('stats');
  applyI18n();
  await Promise.all([
    loadGlobalKpis(),
    loadMonthlyChart(),
    loadTopByCount(),
    loadTopByConf(),
    loadConfDistrib(),
    loadDailyRecords(),
    loadYearlyChart(),
  ]);
});

document.addEventListener('langchange', applyI18n);

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

// ── KPIs globaux ──────────────────────────────────────────────────────────────
async function loadGlobalKpis() {
  const cont = document.getElementById('global-kpis');
  try {
    const [g] = await birdQuery(
      `SELECT COUNT(*) as total,
              COUNT(DISTINCT Com_Name) as sp,
              ROUND(AVG(Confidence)*100,1) as avg_conf,
              ROUND(MAX(Confidence)*100,1) as max_conf,
              MIN(Date) as first, MAX(Date) as last
       FROM detections WHERE Confidence >= ?`,
      [BIRD_CONFIG.defaultConfidence]
    );
    const [perDay] = await birdQuery(
      `SELECT ROUND(AVG(n),0) as avg FROM (
         SELECT COUNT(*) as n FROM detections
         WHERE Confidence >= ? GROUP BY Date
       )`, [BIRD_CONFIG.defaultConfidence]
    );

    const days = Math.round((new Date(g.last) - new Date(g.first)) / 86400000) + 1;

    cont.innerHTML = [
      { val: g.total.toLocaleString(),  label: t('all_time') + ' (' + t('detections') + ')', cls: '' },
      { val: g.sp,                       label: 'Espèces distinctes', cls: 'amber' },
      { val: g.avg_conf + '%',           label: t('avg_confidence'), cls: 'blue' },
      { val: Math.round(perDay.avg || 0).toLocaleString(), label: 'Détections / jour (moy.)', cls: '' },
      { val: days.toLocaleString(),      label: 'Jours de monitoring', cls: '' },
      { val: g.max_conf + '%',           label: t('max_confidence'), cls: 'amber' },
    ].map(k => `
      <div class="kpi-card">
        <div class="kpi-value ${k.cls}">${k.val}</div>
        <div class="kpi-label">${k.label}</div>
      </div>`).join('');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Totaux mensuels (toute la DB) ─────────────────────────────────────────────
async function loadMonthlyChart() {
  try {
    const rows = await birdQuery(
      `SELECT SUBSTR(Date,1,7) as ym,
              COUNT(*) as det,
              COUNT(DISTINCT Com_Name) as sp
       FROM detections WHERE Confidence >= ?
       GROUP BY ym ORDER BY ym ASC`,
      [BIRD_CONFIG.defaultConfidence]
    );

    const labels = rows.map(r => {
      const [y, m] = r.ym.split('-');
      return `${t('months_short')[parseInt(m)-1]} ${y.slice(2)}`;
    });

    if (chartMonthly) chartMonthly.destroy();
    const base = chartDefaults();
    chartMonthly = new Chart(
      document.getElementById('chart-monthly').getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: t('detections'),
            data: rows.map(r => r.det),
            backgroundColor: 'rgba(90,158,58,.65)',
            borderColor: '#5a9e3a',
            borderWidth: 1,
            borderRadius: 2,
          },
          {
            label: t('species'),
            data: rows.map(r => r.sp),
            type: 'line',
            borderColor: '#c8a84b',
            backgroundColor: 'transparent',
            pointRadius: 2,
            tension: 0.3,
            yAxisID: 'y2',
          }
        ]
      },
      options: {
        ...base,
        scales: {
          ...base.scales,
          x: { ...base.scales.x, ticks: { maxTicksLimit: 18, font: { size: 9 } } },
          y:  { ...base.scales.y, beginAtZero: true },
          y2: { position: 'right', beginAtZero: true,
                ticks: { color: '#c8a84b' }, grid: { drawOnChartArea: false } },
        }
      }
    });
  } catch(e) { console.error('monthly chart:', e); }
}

// ── Top 15 par nombre ─────────────────────────────────────────────────────────
async function loadTopByCount() {
  const cont = document.getElementById('top-count');
  try {
    const rows = await birdQuery(
      `SELECT Com_Name, COUNT(*) as n
       FROM detections WHERE Confidence >= ?
       GROUP BY Com_Name ORDER BY n DESC LIMIT 15`,
      [BIRD_CONFIG.defaultConfidence]
    );
    renderRanking(cont, rows, 'n', r => r.n.toLocaleString(), 'det.');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Top 15 par confiance moyenne ──────────────────────────────────────────────
async function loadTopByConf() {
  const cont = document.getElementById('top-conf');
  try {
    const rows = await birdQuery(
      `SELECT Com_Name, ROUND(AVG(Confidence)*100,1) as avg_conf, COUNT(*) as n
       FROM detections WHERE Confidence >= ?
       GROUP BY Com_Name HAVING n >= 10
       ORDER BY avg_conf DESC LIMIT 15`,
      [BIRD_CONFIG.defaultConfidence]
    );
    renderRanking(cont, rows, 'avg_conf', r => r.avg_conf + '%', 'conf.');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

function renderRanking(cont, rows, valKey, valFn, unit) {
  if (!rows.length) { cont.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }
  const max = parseFloat(rows[0][valKey]);
  cont.innerHTML = rows.map((r, i) => `
    <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.45rem; cursor:pointer;"
         onclick="navigateTo('especes.html',{species:'${encodeURIComponent(r.Com_Name)}'})">
      <div style="font-size:.7rem; color:var(--text-faint); min-width:18px; text-align:right;
           font-family:monospace;">${i+1}</div>
      <div style="flex:1; min-width:0;">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <span style="font-size:.82rem; white-space:nowrap; overflow:hidden;
                text-overflow:ellipsis;">${r.Com_Name}</span>
          <span style="font-size:.78rem; color:var(--accent); margin-left:.5rem; flex-shrink:0;">
            ${valFn(r)}
          </span>
        </div>
        <div style="height:3px; background:var(--bg-card2); border-radius:2px; margin-top:3px;">
          <div style="height:100%; width:${Math.round(parseFloat(r[valKey])/max*100)}%;
               background:${BIRD_CONFIG.chartColors[i % BIRD_CONFIG.chartColors.length]};
               border-radius:2px;"></div>
        </div>
      </div>
    </div>`).join('');
}

// ── Distribution confiance ────────────────────────────────────────────────────
async function loadConfDistrib() {
  try {
    const rows = await birdQuery(
      `SELECT
         CAST(CAST(Confidence*10 AS INT) AS TEXT) || '0%' as bucket,
         CAST(CAST(Confidence*10 AS INT)*10 AS INTEGER) as pct,
         COUNT(*) as n
       FROM detections
       GROUP BY CAST(Confidence*10 AS INT)
       ORDER BY pct ASC`
    );

    if (chartConf) chartConf.destroy();
    const base = chartDefaults();
    chartConf = new Chart(
      document.getElementById('chart-conf-dist').getContext('2d'), {
      type: 'bar',
      data: {
        labels: rows.map(r => r.bucket),
        datasets: [{
          label: t('detections'),
          data: rows.map(r => r.n),
          backgroundColor: rows.map(r =>
            r.pct >= 80 ? 'rgba(90,158,58,.75)' :
            r.pct >= 60 ? 'rgba(200,168,75,.65)' :
                          'rgba(224,108,74,.5)'
          ),
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        ...base,
        plugins: { ...base.plugins, legend: { display: false } },
        scales: {
          ...base.scales,
          y: { ...base.scales.y, beginAtZero: true },
        }
      }
    });
  } catch(e) { console.error('conf distrib:', e); }
}

// ── Records journaliers ───────────────────────────────────────────────────────
async function loadDailyRecords() {
  const cont = document.getElementById('daily-records');
  try {
    const [maxDet] = await birdQuery(
      `SELECT Date, COUNT(*) as n FROM detections
       WHERE Confidence >= ? GROUP BY Date ORDER BY n DESC LIMIT 1`,
      [BIRD_CONFIG.defaultConfidence]
    );
    const [maxSp] = await birdQuery(
      `SELECT Date, COUNT(DISTINCT Com_Name) as n FROM detections
       WHERE Confidence >= ? GROUP BY Date ORDER BY n DESC LIMIT 1`,
      [BIRD_CONFIG.defaultConfidence]
    );
    const [maxConf] = await birdQuery(
      `SELECT Date, Com_Name, ROUND(Confidence*100,1) as conf
       FROM detections ORDER BY Confidence DESC LIMIT 1`
    );

    cont.innerHTML = `
      <div style="display:flex; flex-direction:column; gap:.75rem; padding:.25rem 0;">
        <div class="det-item">
          <div style="font-size:1.5rem;">📊</div>
          <div style="flex:1;">
            <div style="font-size:.82rem; color:var(--text-muted);">Jour avec le + de détections</div>
            <div><strong>${maxDet ? fmtDate(maxDet.Date) : '—'}</strong></div>
          </div>
          <div class="kpi-value" style="font-size:1.4rem;">${maxDet ? maxDet.n.toLocaleString() : '—'}</div>
        </div>
        <div class="det-item">
          <div style="font-size:1.5rem;">🦜</div>
          <div style="flex:1;">
            <div style="font-size:.82rem; color:var(--text-muted);">Jour avec le + d'espèces</div>
            <div><strong>${maxSp ? fmtDate(maxSp.Date) : '—'}</strong></div>
          </div>
          <div class="kpi-value amber" style="font-size:1.4rem;">${maxSp ? maxSp.n : '—'}</div>
        </div>
        <div class="det-item">
          <div style="font-size:1.5rem;">🎯</div>
          <div style="flex:1;">
            <div style="font-size:.82rem; color:var(--text-muted);">Confiance maximale</div>
            <div style="font-size:.85rem;"><strong>${maxConf ? maxConf.Com_Name : '—'}</strong></div>
            <div style="font-size:.75rem; color:var(--text-muted);">${maxConf ? fmtDate(maxConf.Date) : ''}</div>
          </div>
          <div class="conf-badge conf-high" style="font-size:.9rem;">${maxConf ? maxConf.conf + '%' : '—'}</div>
        </div>
      </div>`;
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Évolution annuelle ────────────────────────────────────────────────────────
async function loadYearlyChart() {
  try {
    const rows = await birdQuery(
      `SELECT SUBSTR(Date,1,4) as year,
              COUNT(*) as det,
              COUNT(DISTINCT Com_Name) as sp
       FROM detections WHERE Confidence >= ?
       GROUP BY year ORDER BY year ASC`,
      [BIRD_CONFIG.defaultConfidence]
    );

    if (chartYearly) chartYearly.destroy();
    const base = chartDefaults();
    chartYearly = new Chart(
      document.getElementById('chart-yearly').getContext('2d'), {
      type: 'bar',
      data: {
        labels: rows.map(r => r.year),
        datasets: [
          {
            label: t('detections'),
            data: rows.map(r => r.det),
            backgroundColor: 'rgba(90,158,58,.65)',
            borderColor: '#5a9e3a',
            borderWidth: 1,
            borderRadius: 4,
          },
          {
            label: t('species'),
            data: rows.map(r => r.sp),
            type: 'line',
            borderColor: '#c8a84b',
            backgroundColor: 'rgba(200,168,75,.1)',
            pointRadius: 5,
            pointBackgroundColor: '#c8a84b',
            tension: 0.2,
            yAxisID: 'y2',
          }
        ]
      },
      options: {
        ...base,
        scales: {
          ...base.scales,
          y:  { ...base.scales.y, beginAtZero: true },
          y2: { position: 'right', beginAtZero: true,
                ticks: { color: '#c8a84b' }, grid: { drawOnChartArea: false } },
        }
      }
    });
  } catch(e) { console.error('yearly chart:', e); }
}
</script>
</body>
</html>
