<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Biodiversité</title>
  <link rel="stylesheet" href="bird-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>
  <style>
    /* Heatmap */
    .heatmap-wrap { overflow-x: auto; }
    .heatmap-table { border-collapse: collapse; font-size: .72rem; min-width: 600px; }
    .heatmap-table th {
      padding: .3rem .5rem; color: var(--text-muted); font-weight: 500;
      text-align: center; border-bottom: 1px solid var(--border);
    }
    .heatmap-table th.row-header { text-align: left; min-width: 160px; }
    .heatmap-table td {
      padding: .25rem .4rem; text-align: center;
      border: 1px solid var(--bg-deep); border-radius: 2px;
      font-size: .7rem; font-family: monospace; min-width: 36px;
    }
    .heatmap-table tr:hover td { outline: 1px solid var(--border-light); }
    .hm-0  { background: var(--bg-card2); color: var(--text-faint); }
    .hm-1  { background: rgba(90,158,58,.12); color: #4a7a2a; }
    .hm-2  { background: rgba(90,158,58,.25); color: #5a9e3a; }
    .hm-3  { background: rgba(90,158,58,.40); color: #6ab844; }
    .hm-4  { background: rgba(90,158,58,.58); color: #7bc754; }
    .hm-5  { background: rgba(90,158,58,.78); color: #0d1a0f; }

    /* Matrice espèce × mois */
    .matrix-wrap { overflow-x: auto; }
    .matrix-table { border-collapse: collapse; font-size: .72rem; }
    .matrix-table th {
      padding: .3rem .5rem; color: var(--text-muted);
      font-weight: 500; white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    .matrix-table th.sp-col { text-align: left; min-width: 170px; }
    .matrix-table td {
      padding: .2rem .3rem; text-align: center;
      border: 1px solid var(--bg-deep); min-width: 38px;
      font-size: .68rem; font-family: monospace;
    }
    .matrix-table .sp-name {
      color: var(--text-main); text-align: left; padding-left: .5rem;
      white-space: nowrap; cursor: pointer;
    }
    .matrix-table .sp-name:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right"><div id="theme-switcher"></div>
        <div id="lang-switcher"></div></div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- Richesse journalière -->
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title" data-i18n="richness_per_day"></div>
      <div class="chart-wrap chart-wrap-tall">
        <canvas id="chart-richness"></canvas>
      </div>
    </div>

    <!-- Deux colonnes : heatmap heure×jour + KPIs mensuels -->
    <div class="grid-2" style="margin-bottom:1rem;">

      <!-- Heatmap activité horaire par jour de semaine -->
      <div class="card">
        <div class="card-title" data-i18n="heatmap_hour_day"></div>
        <div class="heatmap-wrap">
          <div id="heatmap-container">
            <div class="spinner"><div></div><div></div><div></div></div>
          </div>
        </div>
      </div>

      <!-- Top espèces de la période -->
      <div class="card">
        <div class="card-title" id="title-monthly-kpis"></div>
        <div id="monthly-kpis">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

    </div>

    <!-- Matrice espèce × mois (top 20) -->
    <div class="card">
      <div class="card-title" data-i18n="species_x_month"></div>
      <div class="matrix-wrap">
        <div id="matrix-container">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="pibird-local.js"></script>
<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
let chartRichness = null;

document.addEventListener('DOMContentLoaded', async () => {
  await loadTranslations();
  initPage('biodiversite');
  applyI18n();
  await Promise.all([
    loadRichnessChart(),
    loadHeatmap(),
    loadMonthlyKpis(),
    loadSpeciesMatrix(),
  ]);
});

document.addEventListener('langchange', () => { applyI18n(); });

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const mk = document.getElementById('title-monthly-kpis');
  if (mk) mk.textContent = t('top_species') + ' — ' + t('this_month');
}

// ── Richesse journalière (90 jours) ──────────────────────────────────────────
async function loadRichnessChart() {
  try {
    const from = daysAgo(89);
    const rows = await birdQuery(
      `SELECT Date, COUNT(DISTINCT Com_Name) as sp, COUNT(*) as det
       FROM detections WHERE Date >= ? AND Confidence >= ?
       GROUP BY Date ORDER BY Date ASC`,
      [from, BIRD_CONFIG.defaultConfidence]
    );

    const map = {};
    rows.forEach(r => { map[r.Date] = r; });

    const labels = [], spData = [], detData = [];
    for (let i = 89; i >= 0; i--) {
      const d = daysAgo(i);
      const mo = t('months_short')[new Date(d).getMonth()];
      labels.push(`${new Date(d).getDate()} ${mo}`);
      spData.push(map[d] ? map[d].sp : 0);
      detData.push(map[d] ? map[d].det : 0);
    }

    if (chartRichness) chartRichness.destroy();
    const base = chartDefaults();
    chartRichness = new Chart(
      document.getElementById('chart-richness').getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: t('species'),
            data: spData,
            backgroundColor: 'rgba(90,158,58,.7)',
            borderColor: '#5a9e3a',
            borderWidth: 1,
            borderRadius: 2,
            order: 1,
          },
          {
            label: t('detections'),
            data: detData,
            type: 'line',
            borderColor: 'rgba(200,168,75,.6)',
            backgroundColor: 'transparent',
            pointRadius: 0,
            tension: 0.3,
            yAxisID: 'y2',
            order: 0,
          }
        ]
      },
      options: {
        ...base,
        scales: {
          ...base.scales,
          x: { ...base.scales.x, ticks: { maxTicksLimit: 15, font: { size: 9 } } },
          y:  { ...base.scales.y, beginAtZero: true,
                title: { display: true, text: t('species'), color: '#5a9e3a', font: { size: 10 } } },
          y2: { position: 'right', beginAtZero: true,
                ticks: { color: '#c8a84b', font: { size: 9 } },
                grid: { drawOnChartArea: false },
                title: { display: true, text: t('detections'), color: '#c8a84b', font: { size: 10 } } },
        }
      }
    });
  } catch(e) { console.error('richness chart:', e); }
}

// ── Heatmap heure × jour de semaine ──────────────────────────────────────────
async function loadHeatmap() {
  const cont = document.getElementById('heatmap-container');
  try {
    const rows = await birdQuery(
      `SELECT
         CAST(SUBSTR(Time,1,2) AS INTEGER) as hour,
         CAST(strftime('%w', Date) AS INTEGER) as dow,
         COUNT(*) as n
       FROM detections
       WHERE Date >= ? AND Confidence >= ?
       GROUP BY hour, dow`,
      [daysAgo(89), BIRD_CONFIG.defaultConfidence]
    );

    // dow: 0=dim, 1=lun … 6=sam
    const grid = Array.from({length:7}, () => Array(24).fill(0));
    let maxVal = 0;
    rows.forEach(r => {
      grid[r.dow][r.hour] = r.n;
      if (r.n > maxVal) maxVal = r.n;
    });

    const dayLabels = t('days_short'); // [Lun,Mar,...,Dim] index 0=Lun
    // Réordonne : 0=Lun(dow=1)…6=Dim(dow=0)
    const order = [1,2,3,4,5,6,0];

    function heatClass(v) {
      if (!v) return 'hm-0';
      const p = v / maxVal;
      if (p < .1) return 'hm-1';
      if (p < .3) return 'hm-2';
      if (p < .5) return 'hm-3';
      if (p < .75) return 'hm-4';
      return 'hm-5';
    }

    const hours = Array.from({length:24}, (_,i) => `${String(i).padStart(2,'0')}`);

    let html = `<table class="heatmap-table">
      <thead><tr>
        <th class="row-header"></th>
        ${hours.map(h => `<th>${h}</th>`).join('')}
      </tr></thead>
      <tbody>`;

    order.forEach((dow, di) => {
      html += `<tr><th class="row-header" style="text-align:left;">${dayLabels[di]}</th>`;
      for (let h = 0; h < 24; h++) {
        const v = grid[dow][h];
        const cls = heatClass(v);
        html += `<td class="${cls}" title="${dayLabels[di]} ${String(h).padStart(2,'0')}h : ${v}">${v || ''}</td>`;
      }
      html += '</tr>';
    });
    html += '</tbody></table>';
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

// ── Top espèces ce mois ───────────────────────────────────────────────────────
async function loadMonthlyKpis() {
  const cont = document.getElementById('monthly-kpis');
  const mk   = document.getElementById('title-monthly-kpis');
  if (mk) mk.textContent = t('top_species') + ' — ' + t('this_month');
  try {
    const thisMonth = localDateStr().substring(0, 7); // YYYY-MM
    const rows = await birdQuery(
      `SELECT Com_Name, COUNT(*) as n
       FROM detections
       WHERE SUBSTR(Date,1,7) = ? AND Confidence >= ?
       GROUP BY Com_Name ORDER BY n DESC LIMIT 15`,
      [thisMonth, BIRD_CONFIG.defaultConfidence]
    );
    if (!rows.length) { cont.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }

    const max = rows[0].n;
    cont.innerHTML = rows.map((r, i) => `
      <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.4rem; cursor:pointer;"
           onclick="navigateTo('especes.html',{species:'${encodeURIComponent(r.Com_Name)}'})">
        <div style="font-size:.72rem; color:var(--text-faint); min-width:16px; text-align:right;">${i+1}</div>
        <div style="flex:1; min-width:0;">
          <div style="font-size:.82rem; color:var(--text-main); white-space:nowrap; overflow:hidden;
               text-overflow:ellipsis;">${r.Com_Name}</div>
          <div style="height:4px; background:var(--bg-card2); border-radius:2px; margin-top:2px;">
            <div style="height:100%; width:${Math.round(r.n/max*100)}%;
                 background:${BIRD_CONFIG.chartColors[i % BIRD_CONFIG.chartColors.length]};
                 border-radius:2px; transition:width .4s;"></div>
          </div>
        </div>
        <div style="font-size:.78rem; color:var(--text-muted); min-width:40px; text-align:right;">
          ${r.n.toLocaleString()}
        </div>
      </div>`).join('');
  } catch(e) {
    cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

// ── Matrice espèce × mois (top 20 espèces) ───────────────────────────────────
async function loadSpeciesMatrix() {
  const cont = document.getElementById('matrix-container');
  try {
    // Top 20 espèces globales
    const topRows = await birdQuery(
      `SELECT Com_Name FROM detections WHERE Confidence >= ?
       GROUP BY Com_Name ORDER BY COUNT(*) DESC LIMIT 20`,
      [BIRD_CONFIG.defaultConfidence]
    );
    const topSpecies = topRows.map(r => r.Com_Name);

    if (!topSpecies.length) { cont.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }

    // Compte par espèce × mois
    const rows = await birdQuery(
      `SELECT Com_Name,
         CAST(SUBSTR(Date,6,2) AS INTEGER) as m,
         COUNT(*) as n
       FROM detections
       WHERE Com_Name IN (${topSpecies.map(()=>'?').join(',')})
         AND Confidence >= ?
       GROUP BY Com_Name, m`,
      [...topSpecies, BIRD_CONFIG.defaultConfidence]
    );

    // Pivot
    const data = {};
    topSpecies.forEach(sp => { data[sp] = Array(12).fill(0); });
    rows.forEach(r => { if (data[r.Com_Name]) data[r.Com_Name][r.m-1] = r.n; });

    // Max global pour coloration
    let maxVal = 0;
    Object.values(data).forEach(arr => arr.forEach(v => { if (v > maxVal) maxVal = v; }));

    function cellStyle(v) {
      if (!v) return 'background:var(--bg-card2); color:var(--text-faint);';
      const p = v / maxVal;
      const a = .1 + p * .7;
      return `background:rgba(90,158,58,${a.toFixed(2)}); color:${p > .5 ? '#0d1a0f' : '#e8f0e9'};`;
    }

    const months = t('months_short');
    let html = `<table class="matrix-table">
      <thead><tr>
        <th class="sp-col">${t('species_name')}</th>
        ${months.map(m => `<th>${m}</th>`).join('')}
        <th>${t('bio_total')}</th>
      </tr></thead>
      <tbody>`;

    topSpecies.forEach(sp => {
      const arr   = data[sp];
      const total = arr.reduce((a,b) => a+b, 0);
      html += `<tr>
        <td class="sp-name"
            onclick="navigateTo('especes.html',{species:'${encodeURIComponent(sp)}'})">
          ${sp}
        </td>
        ${arr.map(v => `<td style="${cellStyle(v)}">${v > 0 ? v.toLocaleString() : ''}</td>`).join('')}
        <td style="color:var(--accent); font-weight:500;">${total.toLocaleString()}</td>
      </tr>`;
    });

    html += '</tbody></table>';
    cont.innerHTML = html;
  } catch(e) {
    cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}
</script>
</body>
</html>
