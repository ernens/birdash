<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — Compare</title>
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/chart.umd.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-queries.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <script src="js/bird-spectro-modal.js"></script>
  <script src="js/bird-weather-chip.js"></script>
  <style>
    .cmp2-controls {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex; flex-direction: column; gap: .8rem;
    }
    .cmp2-pickers { display: grid; grid-template-columns: 1fr auto 1fr; gap: .6rem; align-items: center; }
    @media(max-width:640px) { .cmp2-pickers { grid-template-columns: 1fr; } .cmp2-swap { justify-self: center; } }
    .cmp2-combobox { position: relative; }
    .cmp2-cb-input {
      background: var(--bg-card2); border: 1px solid var(--border); color: var(--text);
      padding: .55rem .7rem; border-radius: 6px; font-size: .9rem; width: 100%;
      box-sizing: border-box;
    }
    .cmp2-cb-input:focus { outline: none; border-color: var(--accent); }
    .cmp2-cb-dropdown {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
      max-height: 280px; overflow-y: auto; z-index: 100;
      box-shadow: 0 6px 16px rgba(0,0,0,.2);
    }
    .cmp2-cb-option {
      padding: .45rem .7rem; font-size: .85rem; cursor: pointer;
      display: flex; justify-content: space-between; gap: .5rem;
      border-bottom: 1px solid var(--border);
    }
    .cmp2-cb-option:last-child { border-bottom: none; }
    .cmp2-cb-option:hover { background: var(--bg-card2); }
    .cmp2-cb-option.active { background: rgba(74,138,181,.12); color: var(--accent); }
    .cmp2-cb-count { color: var(--text-faint); font-family: monospace; font-size: .75rem; }
    .cmp2-cb-empty { padding: .7rem; color: var(--text-faint); font-size: .8rem; text-align: center; }
    .cmp2-swap {
      background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-muted);
      padding: .5rem; border-radius: 6px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cmp2-swap:hover { color: var(--accent); border-color: var(--accent); }
    .cmp2-row { display: flex; flex-wrap: wrap; gap: .8rem; align-items: center; font-size: .82rem; }
    .cmp2-period { display: inline-flex; gap: .25rem; flex-wrap: wrap; }
    .cmp2-period-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      padding: .3rem .65rem; border-radius: 5px; cursor: pointer; font-size: .78rem;
    }
    .cmp2-period-btn.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .cmp2-pair {
      background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-muted);
      padding: .25rem .55rem; border-radius: 5px; cursor: pointer; font-size: .75rem;
    }
    .cmp2-pair:hover { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
    .cmp2-pair-link {
      background: none; border: none; color: var(--accent); font-size: .75rem;
      cursor: pointer; text-decoration: underline; padding: .25rem;
    }
    .cmp2-id-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media(max-width:640px) { .cmp2-id-grid { grid-template-columns: 1fr; } }
    .cmp2-id-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; display: grid; grid-template-columns: 80px 1fr; gap: .9rem;
    }
    .cmp2-id-card.cmp2-a { border-top: 3px solid #4a8ab5; }
    .cmp2-id-card.cmp2-b { border-top: 3px solid #e89a3a; }
    .cmp2-id-photo { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; background: var(--bg-card2); }
    .cmp2-id-name { font-size: 1rem; font-weight: 600; line-height: 1.2; }
    .cmp2-id-sci { font-size: .72rem; color: var(--text-faint); font-style: italic; margin-bottom: .4rem; }
    .cmp2-id-stats { display: grid; grid-template-columns: 1fr 1fr; gap: .15rem .7rem; font-size: .72rem; }
    .cmp2-id-stat-label { color: var(--text-muted); }
    .cmp2-id-stat-val { color: var(--text); font-weight: 600; }
    .cmp2-badge {
      display: inline-flex; align-items: center; gap: .2rem;
      font-size: .65rem; padding: .12rem .4rem; border-radius: 4px;
      font-weight: 600; margin-left: .3rem;
    }
    .cmp2-badge.warn { background: rgba(245,158,11,.15); color: #f59e0b; }
    .cmp2-verdict {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem 1.1rem; margin-bottom: 1rem; border-left: 4px solid var(--accent);
    }
    .cmp2-verdict.warn { border-left-color: #f59e0b; }
    .cmp2-verdict.danger { border-left-color: var(--danger); }
    .cmp2-verdict.muted { border-left-color: var(--text-faint); }
    .cmp2-verdict-head {
      display: flex; align-items: center; gap: .5rem; font-size: .95rem;
      font-weight: 600; margin-bottom: .35rem;
    }
    .cmp2-verdict-text { font-size: .82rem; color: var(--text-muted); line-height: 1.45; }
    .cmp2-reliability {
      font-size: .68rem; color: var(--text-faint); margin-top: .55rem;
      display: flex; align-items: center; gap: .35rem;
    }
    .cmp2-rel-dot { width: 7px; height: 7px; border-radius: 50%; }
    .cmp2-rel-dot.high { background: var(--accent); }
    .cmp2-rel-dot.medium { background: #f59e0b; }
    .cmp2-rel-dot.low { background: var(--danger); }
    .cmp2-chart-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; margin-bottom: 1rem;
    }
    .cmp2-chart-head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: .8rem;
      flex-wrap: wrap; gap: .5rem;
    }
    .cmp2-chart-title { font-size: .8rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .cmp2-toggle { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .cmp2-toggle-btn {
      background: transparent; border: none; color: var(--text-muted);
      padding: .25rem .55rem; cursor: pointer; font-size: .72rem;
    }
    .cmp2-toggle-btn.active { background: var(--accent); color: var(--on-accent); }
    .cmp2-chart-hint { font-size: .68rem; color: var(--text-faint); margin-top: .5rem; font-style: italic; }
    .cmp2-chart-box { height: 220px; position: relative; }
    .cmp2-quick-links {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
      margin-bottom: 1rem;
    }
    @media(max-width:640px) { .cmp2-quick-links { grid-template-columns: 1fr; } }
    .cmp2-ql-col { font-size: .8rem; }
    .cmp2-ql-name { font-weight: 600; margin-bottom: .35rem; }
    .cmp2-ql-links { display: flex; flex-wrap: wrap; gap: .35rem; }
    .cmp2-ql-link {
      background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-muted);
      padding: .2rem .55rem; border-radius: 4px; font-size: .72rem; text-decoration: none;
    }
    .cmp2-ql-link:hover { color: var(--accent); border-color: var(--accent); }
    .cmp2-method {
      font-size: .7rem; color: var(--text-faint); padding: .8rem 1rem;
      background: var(--bg-card2); border: 1px solid var(--border); border-radius: 8px;
      line-height: 1.5;
    }
    .cmp2-method summary { cursor: pointer; color: var(--text-muted); font-weight: 600; }
    .cmp2-method ul { margin: .5rem 0 0; padding-left: 1.2rem; }
    .cmp2-empty {
      text-align: center; padding: 3rem 1rem; color: var(--text-muted);
      background: var(--bg-card); border: 1px dashed var(--border); border-radius: 10px;
    }
    .cmp2-color-a { color: #4a8ab5; }
    .cmp2-color-b { color: #e89a3a; }
  </style>
</head>
<body>
<div id="app" v-cloak>
  <birdash-shell page="compare" :title="t('nav_compare')">

    <!-- ── Controls ────────────────────────────────────────────────── -->
    <div class="cmp2-controls">
      <div class="cmp2-pickers">
        <div class="cmp2-combobox" @click.stop>
          <input class="cmp2-cb-input" type="text"
                 :value="searchA || displayName(speciesA)"
                 @input="searchA = $event.target.value; openA = true"
                 @focus="searchA = ''; openA = true; openB = false"
                 :placeholder="t('cmp_select_a')" />
          <div v-if="openA" class="cmp2-cb-dropdown">
            <div v-if="!filteredA.length" class="cmp2-cb-empty">{{t('cmp_no_match')}}</div>
            <div v-else v-for="sp in filteredA" :key="'a'+sp.Sci_Name"
                 class="cmp2-cb-option" :class="{active: sp.Sci_Name === speciesA}"
                 @mousedown.prevent="pickA(sp)">
              <span>{{spName(sp.Com_Name, sp.Sci_Name)}}</span>
              <span class="cmp2-cb-count">{{sp.n.toLocaleString()}}</span>
            </div>
          </div>
        </div>
        <button class="cmp2-swap" :title="t('cmp_swap')" @click="swap">
          <bird-icon name="git-compare" :size="16"></bird-icon>
        </button>
        <div class="cmp2-combobox" @click.stop>
          <input class="cmp2-cb-input" type="text"
                 :value="searchB || displayName(speciesB)"
                 @input="searchB = $event.target.value; openB = true"
                 @focus="searchB = ''; openB = true; openA = false"
                 :placeholder="t('cmp_select_b')" />
          <div v-if="openB" class="cmp2-cb-dropdown">
            <div v-if="!filteredB.length" class="cmp2-cb-empty">{{t('cmp_no_match')}}</div>
            <div v-else v-for="sp in filteredB" :key="'b'+sp.Sci_Name"
                 class="cmp2-cb-option" :class="{active: sp.Sci_Name === speciesB}"
                 @mousedown.prevent="pickB(sp)">
              <span>{{spName(sp.Com_Name, sp.Sci_Name)}}</span>
              <span class="cmp2-cb-count">{{sp.n.toLocaleString()}}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="cmp2-row">
        <span style="color:var(--text-muted);">{{t('cmp_period')}}:</span>
        <div class="cmp2-period">
          <button v-for="p in PERIODS" :key="p" class="cmp2-period-btn"
                  :class="{active: period === p}" @click="period = p; loadData()">
            {{t('cmp_period_' + p)}}
          </button>
        </div>
      </div>

      <div class="cmp2-row">
        <span style="color:var(--text-muted);">
          <bird-icon name="alert-triangle" :size="13" style="vertical-align:-2px;color:#f59e0b;"></bird-icon>
          {{t('cmp_often_confused')}}:
        </span>
        <button v-for="(p, i) in visiblePairs" :key="i" class="cmp2-pair"
                @click="pickPair(p)">
          {{shortName(p[0])}} / {{shortName(p[1])}}
        </button>
        <button v-if="!showMorePairs && morePairs.length" class="cmp2-pair-link"
                @click="showMorePairs = true">+ {{morePairs.length}} {{t('cmp_more_pairs')}}</button>
      </div>
    </div>

    <!-- ── Empty state ─────────────────────────────────────────────── -->
    <div v-if="!speciesA || !speciesB" class="cmp2-empty">
      <bird-icon name="git-compare" :size="40" style="opacity:.5;"></bird-icon>
      <div style="margin-top:.7rem;font-size:.95rem;">{{t('cmp_pick_two')}}</div>
      <div style="font-size:.78rem;margin-top:.4rem;color:var(--text-faint);">{{t('cmp_subtitle')}}</div>
    </div>

    <!-- ── Loading ─────────────────────────────────────────────────── -->
    <div v-else-if="loading" style="padding:2rem;text-align:center;">
      <div class="spinner"><div></div><div></div><div></div></div>
    </div>

    <!-- ── Main content ────────────────────────────────────────────── -->
    <template v-else-if="dataA && dataB">

      <!-- Identity cards (above verdict) -->
      <div class="cmp2-id-grid">
        <div class="cmp2-id-card cmp2-a">
          <bird-img :src="photoUrl(speciesA)" class="cmp2-id-photo" :alt="dataA.identity.com_name"></bird-img>
          <div>
            <div class="cmp2-id-name cmp2-color-a">{{spName(dataA.identity.com_name, speciesA)}}</div>
            <div class="cmp2-id-sci">{{speciesA}}</div>
            <div class="cmp2-id-stats">
              <span class="cmp2-id-stat-label">{{t('cmp_total')}}</span>
              <span class="cmp2-id-stat-val">
                {{dataA.identity.total.toLocaleString()}}
                <span v-if="dataA.identity.total < 50" class="cmp2-badge warn">{{t('cmp_low_volume')}}</span>
              </span>
              <span class="cmp2-id-stat-label">{{t('cmp_first')}}</span>
              <span class="cmp2-id-stat-val">{{fmtDate(dataA.identity.first_date)}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_last')}}</span>
              <span class="cmp2-id-stat-val">{{fmtDate(dataA.identity.last_date)}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_active_days')}}</span>
              <span class="cmp2-id-stat-val">{{dataA.identity.active_days}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_avg_conf')}}</span>
              <span class="cmp2-id-stat-val">{{(dataA.identity.avg_conf*100).toFixed(0)}}%</span>
            </div>
          </div>
        </div>
        <div class="cmp2-id-card cmp2-b">
          <bird-img :src="photoUrl(speciesB)" class="cmp2-id-photo" :alt="dataB.identity.com_name"></bird-img>
          <div>
            <div class="cmp2-id-name cmp2-color-b">{{spName(dataB.identity.com_name, speciesB)}}</div>
            <div class="cmp2-id-sci">{{speciesB}}</div>
            <div class="cmp2-id-stats">
              <span class="cmp2-id-stat-label">{{t('cmp_total')}}</span>
              <span class="cmp2-id-stat-val">
                {{dataB.identity.total.toLocaleString()}}
                <span v-if="dataB.identity.total < 50" class="cmp2-badge warn">{{t('cmp_low_volume')}}</span>
              </span>
              <span class="cmp2-id-stat-label">{{t('cmp_first')}}</span>
              <span class="cmp2-id-stat-val">{{fmtDate(dataB.identity.first_date)}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_last')}}</span>
              <span class="cmp2-id-stat-val">{{fmtDate(dataB.identity.last_date)}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_active_days')}}</span>
              <span class="cmp2-id-stat-val">{{dataB.identity.active_days}}</span>
              <span class="cmp2-id-stat-label">{{t('cmp_avg_conf')}}</span>
              <span class="cmp2-id-stat-val">{{(dataB.identity.avg_conf*100).toFixed(0)}}%</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Verdict -->
      <div class="cmp2-verdict" :class="verdictClass">
        <div class="cmp2-verdict-head">
          <bird-icon :name="verdictIcon" :size="18"></bird-icon>
          {{t('cmp_verdict_' + verdict.key)}}
          <span v-if="hasImbalance" class="cmp2-badge warn">{{t('cmp_strong_imbalance')}}</span>
        </div>
        <div class="cmp2-verdict-text">{{verdictText}}</div>
        <div class="cmp2-reliability">
          <span class="cmp2-rel-dot" :class="reliability"></span>
          {{t('cmp_reliability_' + reliability)}}
          · {{t('cmp_n_detections', {n: (dataA.identity.total + dataB.identity.total).toLocaleString()})}}
        </div>
      </div>

      <!-- Daily activity -->
      <div class="cmp2-chart-card">
        <div class="cmp2-chart-head">
          <div class="cmp2-chart-title">
            <bird-icon name="clock" :size="13" style="vertical-align:-2px;"></bird-icon>
            {{t('cmp_daily_activity')}}
          </div>
          <div class="cmp2-toggle">
            <button class="cmp2-toggle-btn" :class="{active: hourlyMode === 'normalized'}"
                    @click="hourlyMode = 'normalized'; renderHourly()">{{t('cmp_mode_normalized')}}</button>
            <button class="cmp2-toggle-btn" :class="{active: hourlyMode === 'raw'}"
                    @click="hourlyMode = 'raw'; renderHourly()">{{t('cmp_mode_raw')}}</button>
          </div>
        </div>
        <div class="cmp2-chart-box"><canvas ref="hourlyEl"></canvas></div>
        <div class="cmp2-chart-hint">
          {{hourlyMode === 'normalized' ? t('cmp_mode_normalized_hint') : t('cmp_mode_raw_hint')}}
        </div>
      </div>

      <!-- Annual phenology -->
      <div class="cmp2-chart-card">
        <div class="cmp2-chart-head">
          <div class="cmp2-chart-title">
            <bird-icon name="calendar-days" :size="13" style="vertical-align:-2px;"></bird-icon>
            {{t('cmp_annual_phenology')}}
          </div>
          <div class="cmp2-toggle">
            <button class="cmp2-toggle-btn" :class="{active: phenoMode === 'normalized'}"
                    @click="phenoMode = 'normalized'; renderPheno()">{{t('cmp_mode_normalized')}}</button>
            <button class="cmp2-toggle-btn" :class="{active: phenoMode === 'raw'}"
                    @click="phenoMode = 'raw'; renderPheno()">{{t('cmp_mode_raw')}}</button>
          </div>
        </div>
        <div class="cmp2-chart-box"><canvas ref="phenoEl"></canvas></div>
        <div class="cmp2-chart-hint">{{t('cmp_pheno_hint')}}</div>
      </div>

      <!-- Confidence histogram -->
      <div class="cmp2-chart-card">
        <div class="cmp2-chart-head">
          <div class="cmp2-chart-title">
            <bird-icon name="bar-chart-3" :size="13" style="vertical-align:-2px;"></bird-icon>
            {{t('cmp_confidence_dist')}}
          </div>
        </div>
        <div class="cmp2-chart-box"><canvas ref="confEl"></canvas></div>
        <div class="cmp2-chart-hint">{{t('cmp_confidence_caveat')}}</div>
      </div>

      <!-- Quick links -->
      <div class="cmp2-quick-links">
        <div class="cmp2-ql-col">
          <div class="cmp2-ql-name cmp2-color-a">{{spName(dataA.identity.com_name, speciesA)}}</div>
          <div class="cmp2-ql-links">
            <a class="cmp2-ql-link" :href="'species.html?species=' + encodeURIComponent(dataA.identity.com_name)">{{t('cmp_link_species')}}</a>
            <a class="cmp2-ql-link" :href="'phenology.html?species=' + encodeURIComponent(dataA.identity.com_name)">{{t('cmp_link_phenology')}}</a>
            <a class="cmp2-ql-link" :href="'recordings.html?species=' + encodeURIComponent(dataA.identity.com_name)">{{t('cmp_link_recordings')}}</a>
          </div>
        </div>
        <div class="cmp2-ql-col">
          <div class="cmp2-ql-name cmp2-color-b">{{spName(dataB.identity.com_name, speciesB)}}</div>
          <div class="cmp2-ql-links">
            <a class="cmp2-ql-link" :href="'species.html?species=' + encodeURIComponent(dataB.identity.com_name)">{{t('cmp_link_species')}}</a>
            <a class="cmp2-ql-link" :href="'phenology.html?species=' + encodeURIComponent(dataB.identity.com_name)">{{t('cmp_link_phenology')}}</a>
            <a class="cmp2-ql-link" :href="'recordings.html?species=' + encodeURIComponent(dataB.identity.com_name)">{{t('cmp_link_recordings')}}</a>
          </div>
        </div>
      </div>

      <!-- Methodology -->
      <details class="cmp2-method">
        <summary>{{t('cmp_methodology')}}</summary>
        <ul>
          <li>{{t('cmp_method_daily')}}</li>
          <li>{{t('cmp_method_seasonal')}}</li>
          <li>{{t('cmp_method_confidence')}}</li>
          <li>{{t('cmp_method_caveat')}}</li>
        </ul>
      </details>

    </template>
  </birdash-shell>
</div>

<script>
const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;
const { useI18n, useTheme, useNav, useSpeciesNames, navigateTo, photoUrl, fmtDate, birdQuery } = BIRDASH;
const Q = BIRDASH_QUERIES;

// Often-confused species pairs (Western Europe BirdNET)
// Scientific names — stable across languages
const PAIRS_VISIBLE = [
  ['Phylloscopus collybita', 'Phylloscopus trochilus'],   // Chiffchaff / Willow Warbler
  ['Poecile palustris',      'Poecile montanus'],         // Marsh / Willow Tit
  ['Phoenicurus ochruros',   'Phoenicurus phoenicurus'],  // Black / Common Redstart
  ['Anthus pratensis',       'Anthus trivialis'],         // Meadow / Tree Pipit
  ['Sylvia atricapilla',     'Sylvia borin'],             // Blackcap / Garden Warbler
];
const PAIRS_MORE = [
  ['Emberiza cirlus',     'Emberiza citrinella'],         // Cirl Bunting / Yellowhammer
  ['Turdus philomelos',   'Turdus viscivorus'],           // Song / Mistle Thrush
];
const PERIODS = ['30d', '90d', 'season', 'year', 'all'];

const app = createApp({
  setup() {
    const { lang, t } = useI18n();
    useTheme(); useNav();
    const { spName } = useSpeciesNames();

    const speciesList = ref([]);
    const speciesA = ref('');
    const speciesB = ref('');
    const searchA = ref('');
    const searchB = ref('');
    const openA = ref(false);
    const openB = ref(false);
    const period = ref('year');
    const dataA = ref(null);
    const dataB = ref(null);
    const loading = ref(false);
    const showMorePairs = ref(false);

    const hourlyMode = ref('normalized');
    const phenoMode = ref('normalized');

    const hourlyEl = ref(null);
    const phenoEl = ref(null);
    const confEl = ref(null);
    let _hourlyChart = null, _phenoChart = null, _confChart = null;

    const visiblePairs = computed(() =>
      showMorePairs.value ? [...PAIRS_VISIBLE, ...PAIRS_MORE] : PAIRS_VISIBLE
    );
    const morePairs = computed(() => PAIRS_MORE);

    function shortName(sciName) {
      const sp = speciesList.value.find(s => s.Sci_Name === sciName);
      if (!sp) {
        // fallback: take genus first letter + species
        const parts = sciName.split(' ');
        return parts.length > 1 ? `${parts[0][0]}. ${parts[1]}` : sciName;
      }
      return spName(sp.Com_Name, sp.Sci_Name);
    }

    function displayName(sciName) {
      if (!sciName) return '';
      const sp = speciesList.value.find(s => s.Sci_Name === sciName);
      if (!sp) return sciName;
      return `${spName(sp.Com_Name, sp.Sci_Name)} (${sp.n.toLocaleString()})`;
    }

    function _filterList(query) {
      const q = (query || '').trim().toLowerCase();
      if (!q) return speciesList.value.slice(0, 200);
      return speciesList.value.filter(sp => {
        const com = (spName(sp.Com_Name, sp.Sci_Name) || sp.Com_Name || '').toLowerCase();
        return com.includes(q) || sp.Sci_Name.toLowerCase().includes(q);
      }).slice(0, 200);
    }
    const filteredA = computed(() => _filterList(searchA.value));
    const filteredB = computed(() => _filterList(searchB.value));

    function pickA(sp) {
      speciesA.value = sp.Sci_Name;
      searchA.value = '';
      openA.value = false;
      onPick();
    }
    function pickB(sp) {
      speciesB.value = sp.Sci_Name;
      searchB.value = '';
      openB.value = false;
      onPick();
    }
    function closeDropdowns() { openA.value = false; openB.value = false; searchA.value = ''; searchB.value = ''; }

    // ─── Period → date range ─────────────────────────────────────────
    function periodRange() {
      const today = new Date();
      const todayStr = today.toISOString().slice(0, 10);
      const m = today.getMonth() + 1;

      if (period.value === '30d') {
        const d = new Date(today); d.setDate(d.getDate() - 30);
        return [d.toISOString().slice(0, 10), todayStr];
      }
      if (period.value === '90d') {
        const d = new Date(today); d.setDate(d.getDate() - 90);
        return [d.toISOString().slice(0, 10), todayStr];
      }
      if (period.value === 'season') {
        const y = today.getFullYear();
        if (m >= 3 && m <= 5)  return [`${y}-03-01`, `${y}-05-31`];
        if (m >= 6 && m <= 8)  return [`${y}-06-01`, `${y}-08-31`];
        if (m >= 9 && m <= 11) return [`${y}-09-01`, `${y}-11-30`];
        // winter spans year boundary
        return m === 12 ? [`${y}-12-01`, `${y+1}-02-28`] : [`${y-1}-12-01`, `${y}-02-28`];
      }
      if (period.value === 'year') {
        const y = today.getFullYear();
        return [`${y}-01-01`, todayStr];
      }
      // all
      return ['2000-01-01', todayStr];
    }

    // ─── Data loading ────────────────────────────────────────────────
    async function loadSpeciesList() {
      try {
        speciesList.value = await birdQuery(...Q.speciesWithCounts());
      } catch (e) { console.error('[compare] species list', e); }
    }

    async function loadData() {
      if (!speciesA.value || !speciesB.value) return;
      loading.value = true;
      const [from, to] = periodRange();
      try {
        const [idA, hrA, phA, cfA] = await Promise.all([
          birdQuery(...Q.compareIdentity(speciesA.value, from, to)),
          birdQuery(...Q.compareHourlyProfile(speciesA.value, from, to)),
          birdQuery(...Q.compareWeeklyPhenology(speciesA.value, from, to)),
          birdQuery(...Q.compareConfidenceHist(speciesA.value, from, to)),
        ]);
        const [idB, hrB, phB, cfB] = await Promise.all([
          birdQuery(...Q.compareIdentity(speciesB.value, from, to)),
          birdQuery(...Q.compareHourlyProfile(speciesB.value, from, to)),
          birdQuery(...Q.compareWeeklyPhenology(speciesB.value, from, to)),
          birdQuery(...Q.compareConfidenceHist(speciesB.value, from, to)),
        ]);
        dataA.value = { identity: idA[0] || _emptyIdentity(), hourly: _toBuckets(hrA, 24, 'h'), pheno: _toBuckets(phA, 53, 'week'), conf: cfA };
        dataB.value = { identity: idB[0] || _emptyIdentity(), hourly: _toBuckets(hrB, 24, 'h'), pheno: _toBuckets(phB, 53, 'week'), conf: cfB };
      } catch (e) {
        console.error('[compare] loadData', e);
      }
      loading.value = false;
      updateUrl();
      await nextTick();
      renderHourly(); renderPheno(); renderConf();
    }

    function _emptyIdentity() {
      return { com_name: '?', total: 0, first_date: null, last_date: null, active_days: 0, avg_conf: 0 };
    }
    function _toBuckets(rows, n, key) {
      const arr = new Array(n).fill(0);
      for (const r of rows) {
        const i = r[key];
        if (i >= 0 && i < n) arr[i] = r.n;
      }
      return arr;
    }

    // ─── Verdict logic ───────────────────────────────────────────────
    function pearson(a, b) {
      const n = Math.min(a.length, b.length);
      if (n === 0) return 0;
      let sa = 0, sb = 0, saa = 0, sbb = 0, sab = 0;
      for (let i = 0; i < n; i++) {
        sa += a[i]; sb += b[i];
        saa += a[i]*a[i]; sbb += b[i]*b[i];
        sab += a[i]*b[i];
      }
      const num = n*sab - sa*sb;
      const den = Math.sqrt(Math.max(0, (n*saa - sa*sa) * (n*sbb - sb*sb)));
      return den === 0 ? 0 : num/den;
    }
    function normalize(arr) {
      const s = arr.reduce((x,y) => x+y, 0);
      return s === 0 ? arr.map(() => 0) : arr.map(v => v/s);
    }
    function overlap(a, b) {
      // a,b assumed already normalized
      let sumMin = 0, sumMax = 0;
      for (let i = 0; i < a.length; i++) {
        sumMin += Math.min(a[i], b[i]);
        sumMax += Math.max(a[i], b[i]);
      }
      return sumMax > 0 ? sumMin/sumMax : 0;
    }
    function medianFromHist(hist) {
      const total = hist.reduce((s, h) => s + h.n, 0);
      if (total === 0) return 0;
      const target = total / 2;
      let cum = 0;
      for (const h of hist) {
        cum += h.n;
        if (cum >= target) return 0.10 + h.bin * 0.05 + 0.025;
      }
      return 1;
    }
    function peakWeek(arr) {
      let max = -1, idx = -1;
      for (let i = 0; i < arr.length; i++) if (arr[i] > max) { max = arr[i]; idx = i; }
      return idx;
    }

    const verdict = computed(() => {
      if (!dataA.value || !dataB.value) return { key: 'distinct_profiles', score: 0 };
      const a = dataA.value, b = dataB.value;
      if (a.identity.total < 20 || b.identity.total < 20) {
        return { key: 'not_enough_data', score: 0 };
      }
      const hourlyR = pearson(normalize(a.hourly), normalize(b.hourly));
      const phenoOverlap = overlap(normalize(a.pheno), normalize(b.pheno));
      const medA = medianFromHist(a.conf);
      const medB = medianFromHist(b.conf);
      const total = a.identity.total + b.identity.total;
      const ratio = Math.max(a.identity.total, b.identity.total) /
                    Math.max(1, Math.min(a.identity.total, b.identity.total));

      let score = 0;
      if (hourlyR > 0.85)               score++;
      if (phenoOverlap > 0.70)          score++;
      if (Math.abs(medA - medB) > 0.15) score++;
      if (medA < 0.65 || medB < 0.65)   score++;
      if (ratio > 15)                    score++;

      if (score >= 3) {
        return { key: 'possible_confusion', score, hourlyR, phenoOverlap, medA, medB, ratio };
      }
      const peakA = peakWeek(a.pheno), peakB = peakWeek(b.pheno);
      if (Math.abs(peakA - peakB) > 3 || phenoOverlap < 0.35) {
        return { key: 'seasonal_separation', score, hourlyR, phenoOverlap, medA, medB, peakA, peakB };
      }
      return { key: 'distinct_profiles', score, hourlyR, phenoOverlap, medA, medB };
    });

    const verdictClass = computed(() => {
      const v = verdict.value.key;
      if (v === 'not_enough_data')      return 'muted';
      if (v === 'possible_confusion')   return 'warn';
      if (v === 'seasonal_separation')  return '';
      return '';
    });
    const verdictIcon = computed(() => {
      const v = verdict.value.key;
      if (v === 'not_enough_data')      return 'help-circle';
      if (v === 'possible_confusion')   return 'alert-triangle';
      if (v === 'seasonal_separation')  return 'calendar-days';
      return 'check-circle';
    });
    const verdictText = computed(() => {
      const v = verdict.value;
      if (!dataA.value || !dataB.value) return '';
      if (v.key === 'not_enough_data') {
        return t('cmp_verdict_not_enough_text');
      }
      if (v.key === 'possible_confusion') {
        return t('cmp_verdict_confusion_text', {
          peak: hourPeakLabel(),
          overlap: Math.round(v.phenoOverlap * 100),
        });
      }
      if (v.key === 'seasonal_separation') {
        return t('cmp_verdict_seasonal_text', {
          shift: Math.abs(v.peakA - v.peakB),
        });
      }
      return t('cmp_verdict_distinct_text', {
        overlap: Math.round(v.phenoOverlap * 100),
      });
    });
    function hourPeakLabel() {
      const hA = dataA.value.hourly, hB = dataB.value.hourly;
      const peakA = hA.indexOf(Math.max(...hA));
      const peakB = hB.indexOf(Math.max(...hB));
      return peakA === peakB ? `${String(peakA).padStart(2,'0')}h` : `${String(peakA).padStart(2,'0')}h / ${String(peakB).padStart(2,'0')}h`;
    }

    const reliability = computed(() => {
      if (!dataA.value || !dataB.value) return 'low';
      const a = dataA.value.identity.total, b = dataB.value.identity.total;
      const minN = Math.min(a, b);
      const ratio = Math.max(a, b) / Math.max(1, minN);
      if (minN < 50 || ratio > 30)  return 'low';
      if (minN < 200 || ratio > 10) return 'medium';
      return 'high';
    });
    const hasImbalance = computed(() => {
      if (!dataA.value || !dataB.value) return false;
      const a = dataA.value.identity.total, b = dataB.value.identity.total;
      const minN = Math.max(1, Math.min(a, b));
      return Math.max(a, b) / minN > 15;
    });

    // ─── Charts ──────────────────────────────────────────────────────
    function _commonOpts() {
      return {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: 'var(--text-muted)', font: { size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.formattedValue}` } },
        },
        scales: {
          x: { ticks: { color: 'var(--text-faint)', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
          y: { beginAtZero: true, ticks: { color: 'var(--text-faint)', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
        },
      };
    }
    function _datasetA(label, data) {
      return {
        label, data,
        borderColor: '#4a8ab5', backgroundColor: 'rgba(74,138,181,.15)',
        borderWidth: 2, tension: 0.3, pointRadius: 2, fill: true,
      };
    }
    function _datasetB(label, data) {
      return {
        label, data,
        borderColor: '#e89a3a', backgroundColor: 'rgba(232,154,58,.15)',
        borderWidth: 2, tension: 0.3, pointRadius: 2, fill: true,
      };
    }
    function renderHourly() {
      if (!hourlyEl.value || !dataA.value) return;
      if (_hourlyChart) _hourlyChart.destroy();
      const a = dataA.value.hourly, b = dataB.value.hourly;
      const dataAvals = hourlyMode.value === 'normalized' ? normalize(a).map(v => v*100) : a;
      const dataBvals = hourlyMode.value === 'normalized' ? normalize(b).map(v => v*100) : b;
      const labels = Array.from({length: 24}, (_, i) => `${String(i).padStart(2,'0')}h`);
      _hourlyChart = new Chart(hourlyEl.value.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            _datasetA(spName(dataA.value.identity.com_name, speciesA.value), dataAvals),
            _datasetB(spName(dataB.value.identity.com_name, speciesB.value), dataBvals),
          ],
        },
        options: _commonOpts(),
      });
    }
    function renderPheno() {
      if (!phenoEl.value || !dataA.value) return;
      if (_phenoChart) _phenoChart.destroy();
      const a = dataA.value.pheno, b = dataB.value.pheno;
      const dataAvals = phenoMode.value === 'normalized' ? normalize(a).map(v => v*100) : a;
      const dataBvals = phenoMode.value === 'normalized' ? normalize(b).map(v => v*100) : b;
      // 53 weekly buckets but only the populated range matters; trim trailing zeros
      const maxIdx = Math.max(
        a.length - 1 - [...a].reverse().findIndex(v => v > 0),
        b.length - 1 - [...b].reverse().findIndex(v => v > 0),
      );
      const minIdx = Math.min(
        a.findIndex(v => v > 0) === -1 ? 0 : a.findIndex(v => v > 0),
        b.findIndex(v => v > 0) === -1 ? 0 : b.findIndex(v => v > 0),
      );
      const lo = Math.max(0, minIdx), hi = Math.min(52, maxIdx);
      const labels = Array.from({length: hi - lo + 1}, (_, i) => `W${(lo+i+1).toString().padStart(2,'0')}`);
      _phenoChart = new Chart(phenoEl.value.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            _datasetA(spName(dataA.value.identity.com_name, speciesA.value), dataAvals.slice(lo, hi+1)),
            _datasetB(spName(dataB.value.identity.com_name, speciesB.value), dataBvals.slice(lo, hi+1)),
          ],
        },
        options: _commonOpts(),
      });
    }
    function renderConf() {
      if (!confEl.value || !dataA.value) return;
      if (_confChart) _confChart.destroy();
      const buckets = 18; // 0.10 → 1.00 step 0.05
      const ax = new Array(buckets).fill(0);
      const bx = new Array(buckets).fill(0);
      for (const r of dataA.value.conf) if (r.bin >= 0 && r.bin < buckets) ax[r.bin] = r.n;
      for (const r of dataB.value.conf) if (r.bin >= 0 && r.bin < buckets) bx[r.bin] = r.n;
      const labels = Array.from({length: buckets}, (_, i) => Math.round((0.10 + i*0.05) * 100) + '%');
      _confChart = new Chart(confEl.value.getContext('2d'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: spName(dataA.value.identity.com_name, speciesA.value), data: normalize(ax).map(v => v*100), backgroundColor: 'rgba(74,138,181,.5)', borderColor: '#4a8ab5', borderWidth: 1 },
            { label: spName(dataB.value.identity.com_name, speciesB.value), data: normalize(bx).map(v => v*100), backgroundColor: 'rgba(232,154,58,.5)', borderColor: '#e89a3a', borderWidth: 1 },
          ],
        },
        options: _commonOpts(),
      });
    }

    // ─── Interactions ────────────────────────────────────────────────
    function swap() {
      const tmp = speciesA.value;
      speciesA.value = speciesB.value;
      speciesB.value = tmp;
      onPick();
    }
    function pickPair(p) {
      speciesA.value = p[0];
      speciesB.value = p[1];
      onPick();
    }
    function onPick() {
      if (speciesA.value && speciesB.value && speciesA.value !== speciesB.value) {
        loadData();
      }
    }

    // ─── URL state ───────────────────────────────────────────────────
    function updateUrl() {
      const u = new URL(window.location.href);
      u.searchParams.set('a', speciesA.value);
      u.searchParams.set('b', speciesB.value);
      u.searchParams.set('range', period.value);
      window.history.replaceState({}, '', u);
    }
    function readUrl() {
      const u = new URL(window.location.href);
      const a = u.searchParams.get('a');
      const b = u.searchParams.get('b');
      const r = u.searchParams.get('range');
      if (a) speciesA.value = a;
      if (b) speciesB.value = b;
      if (r && PERIODS.includes(r)) period.value = r;
    }

    onMounted(async () => {
      readUrl();
      await loadSpeciesList();
      if (speciesA.value && speciesB.value) loadData();
      document.addEventListener('click', closeDropdowns);
    });

    return {
      t, lang, PERIODS,
      speciesList, speciesA, speciesB, period,
      searchA, searchB, openA, openB,
      filteredA, filteredB,
      dataA, dataB, loading,
      visiblePairs, morePairs, showMorePairs,
      hourlyMode, phenoMode,
      hourlyEl, phenoEl, confEl,
      verdict, verdictClass, verdictIcon, verdictText,
      reliability, hasImbalance,
      shortName, displayName, swap, pickPair, pickA, pickB, onPick, loadData,
      renderHourly, renderPheno, renderConf,
      spName, navigateTo, photoUrl, fmtDate,
    };
  }
});
BIRDASH.ready.then(() => BIRDASH.registerComponents(app).mount('#app'));
</script>
</body>
</html>
