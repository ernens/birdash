<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <title>BIRDASH — Comparaison modèles</title>
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js" integrity="sha384-wdamyDHEiblYHsu/XTokGtIeFekZu7xN37Yvkl0NZ7PnhwRB+nwE1ByT7VlwiypE" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <style>
    .cmp-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; }
    .cmp-stat { text-align:center; padding:1.2rem; }
    .cmp-stat .big { font-size:2rem; font-weight:700; }
    .cmp-stat .label { font-size:.78rem; opacity:.6; }
    .cmp-table { width:100%; border-collapse:collapse; font-size:.82rem; }
    .cmp-table th { text-align:left; padding:.4rem .6rem; border-bottom:2px solid var(--border); font-size:.72rem; text-transform:uppercase; opacity:.6; }
    .cmp-table td { padding:.4rem .6rem; border-bottom:1px solid var(--border); }
    .cmp-table tr:hover { background:var(--bg-card2); }
    .conf-bar { display:inline-block; height:6px; border-radius:3px; vertical-align:middle; margin-left:.3rem; }
    .model-color-1 { color:#5a9e3a; }
    .model-color-2 { color:#4a7eb5; }
    .model-color-3 { color:#c8a84b; }
    .pill { display:inline-block; padding:.15rem .5rem; border-radius:1rem; font-size:.72rem; font-weight:600; }
    .pill-1 { background:rgba(90,158,58,.15); color:#5a9e3a; }
    .pill-2 { background:rgba(74,126,181,.15); color:#4a7eb5; }
    .pill-3 { background:rgba(200,168,75,.15); color:#c8a84b; }
  </style>
</head>
<body>
<div id="app">
  <birdash-shell page="models" :title="t('nav_models')">

    <!-- Period selector -->
    <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;flex-wrap:wrap;">
      <filter-period
        :period="fp.period.value"
        :quick-buttons="fp.quickButtons.value"
        :date-from="fp.dateFrom.value"
        :date-to="fp.dateTo.value"
        @set-period="fp.setPeriod"
        @set-custom-range="fp.setCustomRange"
      ></filter-period>
    </div>

    <div v-if="loading" style="text-align:center;padding:3rem;"><div class="spinner"></div></div>

    <template v-else-if="data">

      <!-- Overview cards -->
      <div class="cmp-grid" style="margin-bottom:1.2rem;">
        <div v-for="(m, i) in data.models" :key="m" class="card cmp-stat">
          <div class="big" :class="'model-color-'+(i+1)">{{ data.stats[m]?.total || 0 }}</div>
          <div class="label">détections</div>
          <div style="font-weight:600;margin-top:.3rem;">{{ modelLabel(m) }}</div>
          <div style="font-size:.78rem;opacity:.7;margin-top:.2rem;">
            {{ data.stats[m]?.species || 0 }} espèces | conf. moy. {{ ((data.stats[m]?.avg_conf || 0) * 100).toFixed(0) }}%
          </div>
        </div>
      </div>

      <!-- Daily chart -->
      <div class="card" style="margin-bottom:1.2rem;">
        <div class="section-title">Détections par jour et par modèle</div>
        <canvas ref="dailyChart" height="200"></canvas>
      </div>

      <!-- Species unique to each model -->
      <div class="cmp-grid" style="margin-bottom:1.2rem;">
        <div v-for="(m, i) in data.models" :key="'u'+m" class="card">
          <div class="section-title">
            <span :class="'pill pill-'+(i+1)">{{ modelLabel(m) }}</span>
            — Espèces exclusives ({{ (data.unique[m] || []).length }})
          </div>
          <div v-if="!data.unique[m]?.length" style="font-size:.82rem;opacity:.5;padding:.5rem;">
            Aucune espèce exclusive
          </div>
          <table v-else class="cmp-table">
            <tr><th>Espèce</th><th>N</th><th>Conf.</th></tr>
            <tr v-for="s in data.unique[m]" :key="s.Sci_Name">
              <td>
                <a :href="'species.html?species='+encodeURIComponent(s.Com_Name)" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit;cursor:pointer;" @mouseenter="$event.currentTarget.style.color='var(--accent)'" @mouseleave="$event.currentTarget.style.color='inherit'">
                  <img :src="'api/photo?sci='+encodeURIComponent(s.Sci_Name)" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;" loading="lazy" onerror="this.style.display='none'">
                  <div>
                    <strong>{{ s.Com_Name }}</strong>
                    <div style="font-size:.7rem;opacity:.5;">{{ s.Sci_Name }}</div>
                  </div>
                </a>
              </td>
              <td>{{ s.n }}</td>
              <td>
                {{ (s.avg_conf * 100).toFixed(0) }}%
                <span class="conf-bar" :style="{width: (s.avg_conf*60)+'px', background: 'var(--accent)'}"></span>
              </td>
            </tr>
          </table>
        </div>
      </div>

      <!-- Overlap: species detected by both -->
      <div v-if="data.overlap.length" class="card">
        <div class="section-title">Espèces détectées par les deux modèles (top 30)</div>
        <table class="cmp-table">
          <tr>
            <th>Espèce</th>
            <th><span class="pill pill-1">{{ modelLabel(data.models[0]) }}</span></th>
            <th><span class="pill pill-2">{{ modelLabel(data.models[1]) }}</span></th>
            <th>Ratio</th>
          </tr>
          <tr v-for="s in data.overlap" :key="s.Sci_Name">
            <td>
              <a :href="'species.html?species='+encodeURIComponent(s.Com_Name)" style="display:flex;align-items:center;gap:.5rem;text-decoration:none;color:inherit;cursor:pointer;" @mouseenter="$event.currentTarget.style.color='var(--accent)'" @mouseleave="$event.currentTarget.style.color='inherit'">
                <img :src="'api/photo?sci='+encodeURIComponent(s.Sci_Name)" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;" loading="lazy" onerror="this.style.display='none'">
                <div>
                  <strong>{{ s.Com_Name }}</strong>
                  <div style="font-size:.7rem;opacity:.5;">{{ s.Sci_Name }}</div>
                </div>
              </a>
            </td>
            <td>
              {{ s.n1 }}
              <span style="font-size:.75rem;opacity:.6;">({{ (s.conf1*100).toFixed(0) }}%)</span>
            </td>
            <td>
              {{ s.n2 }}
              <span style="font-size:.75rem;opacity:.6;">({{ (s.conf2*100).toFixed(0) }}%)</span>
            </td>
            <td>
              <span v-if="s.n2 > s.n1" class="model-color-2">{{ (s.n2/s.n1).toFixed(1) }}x</span>
              <span v-else-if="s.n1 > s.n2" class="model-color-1">{{ (s.n1/s.n2).toFixed(1) }}x</span>
              <span v-else style="opacity:.5;">=</span>
            </td>
          </tr>
        </table>
      </div>

    </template>
  </birdash-shell>
</div>

<script>
const { createApp, ref, onMounted, watch, nextTick } = Vue;
const { useI18n, useTheme, useNav, useFilterPeriod, registerComponents } = BIRDASH;
const { birdQuery } = BIRDASH_UTILS;

const MODEL_LABELS = {
  'BirdNET_GLOBAL_6K_V2.4_Model_FP16': 'BirdNET V2.4',
  'BirdNET_6K_GLOBAL_MODEL': 'BirdNET V1',
  'Perch_v2': 'Perch V2',
  'Perch_v2_int8': 'Perch V2 INT8',
};
const COLORS = ['#5a9e3a', '#4a7eb5', '#c8a84b', '#a85c3a'];

const app = createApp({
  setup() {
    const { t, lang } = useI18n();
    useTheme();
    useNav();

    const data = ref(null);
    const loading = ref(true);
    const dailyChart = ref(null);
    let chartInstance = null;

    const fp = useFilterPeriod({
      default: '7d',
      buttons: ['1d', '7d', '30d', '90d', 'all'],
      onChange: loadData,
    });

    function modelLabel(m) { return MODEL_LABELS[m] || m.replace(/_/g, ' '); }

    async function loadData() {
      loading.value = true;
      try {
        const from = fp.dateFrom.value;
        const to = fp.dateTo.value;
        const days = Math.max(1, Math.ceil((new Date(to) - new Date(from)) / 86400000) + 1);
        const resp = await fetch(`api/model-comparison?days=${days}`);
        data.value = await resp.json();
        loading.value = false;
        await nextTick();
        await nextTick();
        drawChart();
      } catch (e) {
        console.error('model-comparison:', e);
        loading.value = false;
      }
    }

    function drawChart() {
      if (!dailyChart.value || !data.value?.daily?.length) return;
      if (chartInstance) chartInstance.destroy();

      const models = data.value.models;
      const dates = [...new Set(data.value.daily.map(d => d.Date))].sort();
      const datasets = models.map((m, i) => {
        const byDate = {};
        data.value.daily.filter(d => d.Model === m).forEach(d => byDate[d.Date] = d.n);
        return {
          label: modelLabel(m),
          data: dates.map(d => byDate[d] || 0),
          borderColor: COLORS[i],
          backgroundColor: COLORS[i] + '33',
          fill: true,
          tension: 0.3,
        };
      });

      chartInstance = new Chart(dailyChart.value, {
        type: 'line',
        data: { labels: dates, datasets },
        options: {
          responsive: true,
          plugins: { legend: { position: 'top' } },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Détections' } },
          },
        },
      });
    }

    onMounted(loadData);

    return {
      t, fp, data, loading, dailyChart,
      modelLabel,
    };
  }
});
registerComponents(app).mount('#app');
</script>
</body>
</html>
