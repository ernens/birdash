<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — Favoris</title>
  <meta property="og:title" content="BirdStation — Favorites">
  <meta property="og:description" content="Bird detection dashboard — Heinsch, Belgium">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <script src="js/bird-spectro-modal.js"></script>
  <script src="js/bird-weather-chip.js"></script>
  <script src="js/bird-setup-wizard.js"></script>
</head>
<body>
<div id="app" v-cloak>
  <birdash-shell page="favorites" :title="t('nav_favorites')">

    <!-- KPI cards : recentrés sur l'usage watchlist (Phase 1) -->
    <div class="kpi-grid" style="margin-bottom:1rem;">
      <div class="kpi-card">
        <div class="kpi-value">{{stats.total || 0}}</div>
        <div class="kpi-label">{{t('fav_total')}}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" style="color:var(--accent);">{{stats.active_today || 0}}</div>
        <div class="kpi-label">{{t('fav_active_today')}}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value amber">{{dormantCount}}</div>
        <div class="kpi-label">{{t('fav_dormant_label')}}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value blue" style="font-size:1.1rem;">{{lastActivityLabel}}</div>
        <div class="kpi-label">{{t('fav_last_activity')}}</div>
      </div>
    </div>

    <!-- Desync banner: localStorage has favorites the server doesn't know about -->
    <div v-if="syncMissing.length" class="card"
         style="border:1px solid var(--amber);background:rgba(200,168,75,.08);padding:.7rem .9rem;margin-bottom:.8rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;">
      <span style="font-size:1.1rem;">⚠</span>
      <span style="flex:1;min-width:180px;font-size:.85rem;">
        {{t('fav_sync_warning', {n: syncMissing.length})}}
      </span>
      <button class="btn btn-secondary" @click="syncNow" :disabled="syncing" style="font-size:.78rem;">
        {{syncing ? t('fav_sync_progress') : t('fav_sync_btn')}}
      </button>
    </div>

    <!-- Search bar (le tri primaire est désormais le bucket d'activité) -->
    <div class="card" style="display:flex;gap:.6rem;align-items:center;padding:.6rem .8rem;">
      <input v-model="searchQ" type="search" :placeholder="t('search')+'…'"
             style="flex:1;min-width:120px;padding:.35rem .6rem;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text-main);font-size:.82rem;">
    </div>

    <!-- Empty state -->
    <div v-if="!loading && !favList.length" class="card hint-empty" style="padding:3rem;text-align:center;">
      <div class="hint-icon" style="font-size:2.5rem;"><bird-icon name="star" :size="14"></bird-icon></div>
      <div style="color:var(--text-muted);margin-top:.5rem;">{{t('fav_empty')}}</div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="padding:1rem;">
      <div class="skeleton-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem;">
        <div class="skeleton skeleton-kpi"></div><div class="skeleton skeleton-kpi"></div><div class="skeleton skeleton-kpi"></div><div class="skeleton skeleton-kpi"></div>
      </div>
      <div v-for="i in 3" :key="i" class="skeleton-row" style="padding:.8rem 0;border-bottom:1px solid var(--border);">
        <div class="skeleton skeleton-avatar"></div>
        <div style="flex:1"><div class="skeleton skeleton-text" style="width:40%"></div><div class="skeleton skeleton-text" style="width:25%"></div></div>
        <div class="skeleton" style="width:70px;height:1.2rem;border-radius:10px;"></div>
      </div>
    </div>

    <!-- Favorites organisés en 4 buckets (Phase 1 = option C) -->
    <template v-if="!loading && favList.length">
      <!-- Section 1 : Actifs aujourd'hui -->
      <section v-if="buckets.active.length" class="fav-section">
        <h2 class="fav-section-title">
          <span class="fav-section-dot fav-dot-active"></span>
          {{t('fav_section_active')}}
          <span class="fav-section-count">{{buckets.active.length}}</span>
        </h2>
        <div class="species-list">
          <div v-for="f in buckets.active" :key="f.com_name" class="sp-item"
               @click="navigateTo('species.html', {species: f.com_name})">
            <div class="sp-thumb">
              <bird-img v-if="f.photoUrl" :src="f.photoUrl" :alt="f.com_name"></bird-img>
              <span v-else><bird-icon name="bird" :size="16"></bird-icon></span>
            </div>
            <div class="sp-info">
              <div class="sp-name-row">
                {{spName(f.com_name, f.sci_name)}}
                <span style="font-size:.65rem;color:var(--accent);vertical-align:middle;margin-left:.3rem;">
                  {{f.today_detections}}× {{t('today_label')}}
                </span>
              </div>
              <div class="sp-sci-row">
                {{f.sci_name}}
                <button @click.stop="removeFav(f.com_name)" :title="t('fav_remove')"
                        style="background:none;border:none;cursor:pointer;font-size:.85rem;padding:0 .15rem;line-height:1;color:var(--accent);vertical-align:middle;">★</button>
              </div>
            </div>
            <div class="sp-meta" style="text-align:right;">
              <span class="conf-badge" :class="f.avg_conf>=0.8?'conf-high':'conf-mid'" style="font-size:.7rem;">{{f.total_detections}}×</span>
              <span v-if="f.last_date" style="font-size:.68rem;color:var(--text-faint);font-family:monospace;">{{fmtDateShort(f.last_date)}}</span>
              <weather-chip v-if="f.last_date && f.last_time" :date="f.last_date" :time="f.last_time"></weather-chip>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 2 : Récents (1–30 jours) -->
      <section v-if="buckets.recent.length" class="fav-section">
        <h2 class="fav-section-title">
          <span class="fav-section-dot fav-dot-recent"></span>
          {{t('fav_section_recent')}}
          <span class="fav-section-count">{{buckets.recent.length}}</span>
        </h2>
        <div class="species-list">
          <div v-for="f in buckets.recent" :key="f.com_name" class="sp-item"
               @click="navigateTo('species.html', {species: f.com_name})">
            <div class="sp-thumb">
              <bird-img v-if="f.photoUrl" :src="f.photoUrl" :alt="f.com_name"></bird-img>
              <span v-else><bird-icon name="bird" :size="16"></bird-icon></span>
            </div>
            <div class="sp-info">
              <div class="sp-name-row">{{spName(f.com_name, f.sci_name)}}</div>
              <div class="sp-sci-row">
                {{f.sci_name}}
                <span class="fav-status-text">{{statusFor(f)}}</span>
                <button @click.stop="removeFav(f.com_name)" :title="t('fav_remove')"
                        style="background:none;border:none;cursor:pointer;font-size:.85rem;padding:0 .15rem;line-height:1;color:var(--accent);vertical-align:middle;">★</button>
              </div>
            </div>
            <div class="sp-meta" style="text-align:right;">
              <span class="conf-badge" :class="f.avg_conf>=0.8?'conf-high':'conf-mid'" style="font-size:.7rem;">{{f.total_detections}}×</span>
              <span v-if="f.last_date" style="font-size:.68rem;color:var(--text-faint);font-family:monospace;">{{fmtDateShort(f.last_date)}}</span>
              <weather-chip v-if="f.last_date && f.last_time" :date="f.last_date" :time="f.last_time"></weather-chip>
            </div>
          </div>
        </div>
      </section>

      <!-- Section 3 : Dormants (>30 jours) — repliée par défaut -->
      <details v-if="buckets.dormant.length" class="fav-section fav-section--collapsible">
        <summary class="fav-section-title">
          <span class="fav-section-dot fav-dot-dormant"></span>
          {{t('fav_section_dormant')}}
          <span class="fav-section-count">{{buckets.dormant.length}}</span>
        </summary>
        <div class="species-list">
          <div v-for="f in buckets.dormant" :key="f.com_name" class="sp-item fav-row-faded"
               @click="navigateTo('species.html', {species: f.com_name})">
            <div class="sp-thumb">
              <bird-img v-if="f.photoUrl" :src="f.photoUrl" :alt="f.com_name"></bird-img>
              <span v-else><bird-icon name="bird" :size="16"></bird-icon></span>
            </div>
            <div class="sp-info">
              <div class="sp-name-row">{{spName(f.com_name, f.sci_name)}}</div>
              <div class="sp-sci-row">
                {{f.sci_name}}
                <span class="fav-status-text">{{statusFor(f)}}</span>
                <button @click.stop="removeFav(f.com_name)" :title="t('fav_remove')"
                        style="background:none;border:none;cursor:pointer;font-size:.85rem;padding:0 .15rem;line-height:1;color:var(--accent);vertical-align:middle;">★</button>
              </div>
            </div>
            <div class="sp-meta" style="text-align:right;">
              <span class="conf-badge" :class="f.avg_conf>=0.8?'conf-high':'conf-mid'" style="font-size:.7rem;">{{f.total_detections}}×</span>
              <span v-if="f.last_date" style="font-size:.68rem;color:var(--text-faint);font-family:monospace;">{{fmtDateShort(f.last_date)}}</span>
            </div>
          </div>
        </div>
      </details>

      <!-- Section 4 : Jamais détectés (sémantique distincte des dormants) — repliée par défaut -->
      <details v-if="buckets.never.length" class="fav-section fav-section--collapsible">
        <summary class="fav-section-title">
          <span class="fav-section-dot fav-dot-never"></span>
          {{t('fav_section_never')}}
          <span class="fav-section-count">{{buckets.never.length}}</span>
        </summary>
        <div class="species-list">
          <div v-for="f in buckets.never" :key="f.com_name" class="sp-item fav-row-faded"
               @click="navigateTo('species.html', {species: f.com_name})">
            <div class="sp-thumb">
              <bird-img v-if="f.photoUrl" :src="f.photoUrl" :alt="f.com_name"></bird-img>
              <span v-else><bird-icon name="bird" :size="16"></bird-icon></span>
            </div>
            <div class="sp-info">
              <div class="sp-name-row">{{spName(f.com_name, f.sci_name)}}</div>
              <div class="sp-sci-row">
                {{f.sci_name}}
                <span class="fav-status-text">{{statusFor(f)}}</span>
                <button @click.stop="removeFav(f.com_name)" :title="t('fav_remove')"
                        style="background:none;border:none;cursor:pointer;font-size:.85rem;padding:0 .15rem;line-height:1;color:var(--accent);vertical-align:middle;">★</button>
              </div>
            </div>
          </div>
        </div>
      </details>
    </template>

  </birdash-shell>
</div>

<script>
const { createApp, ref, computed, watch } = Vue;
const { navigateTo, photoUrl } = BIRDASH;

const app = Vue.createApp({
  setup() {
    const { t, lang } = BIRDASH.useI18n();
    const { theme }   = BIRDASH.useTheme();
    const { spName }  = BIRDASH.useSpeciesNames();
    const { favorites, toggleFavorite, isFavorite } = BIRDASH.useFavorites();

    const loading = ref(true);
    const favList = ref([]);
    const stats   = ref({});
    const searchQ = ref('');
    const sortBy  = ref('recent');
    const syncMissing = ref([]);   // favoris en localStorage non présents côté serveur
    const syncing     = ref(false);

    const sortOptions = computed(() => [
      { key: 'name',   label: t('fav_sort_name') },
      { key: 'recent', label: t('fav_sort_recent') },
      { key: 'count',  label: t('fav_sort_count') },
    ]);

    const filteredFavs = computed(() => {
      let list = [...favList.value];
      if (searchQ.value) {
        const q = searchQ.value.toLowerCase();
        list = list.filter(f =>
          f.com_name.toLowerCase().includes(q) ||
          f.sci_name.toLowerCase().includes(q) ||
          spName(f.com_name, f.sci_name).toLowerCase().includes(q)
        );
      }
      // Pas de tri ici : le bucket fait le tri primaire (état d'activité),
      // chaque bucket trie ensuite par récence/fréquence pertinente.
      return list;
    });

    function fmtDateShort(d) {
      if (!d) return '';
      return new Date(d + 'T12:00:00').toLocaleDateString(lang.value, { day: 'numeric', month: 'short' });
    }

    function daysSince(dateStr) {
      if (!dateStr) return Infinity;
      return Math.floor((Date.now() - new Date(dateStr + 'T12:00:00').getTime()) / 86400000);
    }

    // ── Buckets par état d'activité (Phase 1 = option C) ──────────────────
    // Règles de classement explicites :
    //   Actifs     : détecté aujourd'hui (today_detections > 0)
    //   Récents    : last_date dans les 30 derniers jours, mais pas aujourd'hui
    //   Dormants   : last_date > 30 jours
    //   Jamais vus : aucune détection (séparé des dormants — sémantique différente)
    const buckets = computed(() => {
      const active = [], recent = [], dormant = [], never = [];
      for (const f of filteredFavs.value) {
        if (f.today_detections > 0)      active.push(f);
        else if (!f.last_date)           never.push(f);
        else if (daysSince(f.last_date) <= 30) recent.push(f);
        else                             dormant.push(f);
      }
      active.sort((a,b)  => b.today_detections - a.today_detections);
      recent.sort((a,b)  => daysSince(a.last_date) - daysSince(b.last_date));
      dormant.sort((a,b) => daysSince(a.last_date) - daysSince(b.last_date));
      never.sort((a,b)   => (b.added_at || '').localeCompare(a.added_at || ''));
      return { active, recent, dormant, never };
    });

    const dormantCount = computed(() => {
      // Compte sur la liste complète (pas filtrée) : signal global, pas dépendant de la recherche
      return favList.value.filter(f => f.last_date && daysSince(f.last_date) > 30).length;
    });

    const lastActivityLabel = computed(() => {
      if (!favList.value.length) return '—';
      let mostRecent = null;
      for (const f of favList.value) {
        if (!f.last_date) continue;
        if (!mostRecent || f.last_date > mostRecent) mostRecent = f.last_date;
      }
      if (!mostRecent) return '—';
      const d = daysSince(mostRecent);
      if (d === 0) return t('fav_la_today');
      if (d === 1) return t('fav_la_yesterday');
      return t('fav_la_days', { n: d });
    });

    function statusFor(f) {
      // Pour les actifs : déjà rendu via le badge "{N}× today" inline → rien à ajouter
      if (f.today_detections > 0) return '';
      if (!f.last_date) {
        if (f.added_at) {
          const d = daysSince((f.added_at || '').substring(0, 10));
          return t('fav_status_never_added', { n: d });
        }
        return t('fav_status_never');
      }
      const days = daysSince(f.last_date);
      if (days === 1) return t('fav_status_yesterday');
      return t('fav_status_days_ago', { n: days });
    }

    async function loadFavorites() {
      loading.value = true;
      try {
        const res = await fetch(BIRD_CONFIG.apiUrl + '/favorites/stats');
        if (res.ok) {
          const data = await res.json();
          favList.value = (data.favorites || []).map(f => ({
            ...f,
            photoUrl: photoUrl(f.sci_name),
          }));
          stats.value = data.stats || {};
          // Detect desync: favoris en localStorage non présents côté serveur
          // (cause #1 du bug — POST échoué + fallback localStorage silencieux).
          const serverNames = new Set(favList.value.map(f => f.com_name));
          let localNames = [];
          try { localNames = JSON.parse(localStorage.getItem('birdash_favorites') || '[]'); } catch {}
          syncMissing.value = localNames.filter(n => n && !serverNames.has(n));
          // Pre-fetch weather for last detection dates so chips populate
          if (BIRDASH.loadWeatherRange) {
            const dates = favList.value.map(f => f.last_date).filter(Boolean).sort();
            if (dates.length) BIRDASH.loadWeatherRange(dates[0], dates[dates.length-1]);
          }
        }
      } catch (e) {
        console.warn('[favorites]', e);
      }
      loading.value = false;
    }

    async function syncNow() {
      if (!syncMissing.value.length || syncing.value) return;
      syncing.value = true;
      let okCount = 0, failCount = 0;
      for (const name of syncMissing.value) {
        try {
          const res = await fetch(BIRD_CONFIG.apiUrl + '/favorites', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'add', com_name: name, sci_name: '' }),
          });
          if (res.ok) okCount++; else failCount++;
        } catch (e) { failCount++; }
      }
      syncing.value = false;
      window.dispatchEvent(new CustomEvent(failCount ? 'birdash:error' : 'birdash:success', {
        detail: failCount
          ? `${okCount} favori(s) synchronisé(s), ${failCount} échec(s).`
          : `${okCount} favori(s) synchronisé(s) avec le serveur.`,
      }));
      await loadFavorites();
    }

    async function removeFav(comName) {
      await toggleFavorite(comName, '');
      // Reload stats
      await loadFavorites();
    }

    loadFavorites();

    // Reload when favorites change externally
    watch(favorites, () => loadFavorites());

    return {
      t, lang, theme, spName,
      loading, favList, stats, searchQ,
      filteredFavs, fmtDateShort,
      navigateTo, removeFav,
      syncMissing, syncing, syncNow,
      buckets, dormantCount, lastActivityLabel, statusFor,
    };
  }
});

BIRDASH.ready.then(() => { BIRDASH.registerComponents(app); app.mount('#app'); });
</script>
</body>
</html>
