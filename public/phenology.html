<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — Phénologie</title>
  <meta property="og:title" content="BirdStation — Phénologie observée">
  <meta property="og:description" content="Calendrier phénologique observé par la station">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-queries.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <script src="js/bird-spectro-modal.js"></script>
</head>
<body>
<div id="app">
  <birdash-shell page="phenology" :title="t('phenology_title')">

    <!-- ── Species search bar ─────────────────────────────────── -->
    <div class="ph-controls">
      <div class="ph-species-picker" v-click-outside="closeSpeciesDropdown">
        <button class="ph-species-trigger" :class="{open: speciesDropdownOpen}"
                @click="toggleSpeciesDropdown">
          <span v-if="currentSpecies" class="ph-species-trigger-name">{{spName(currentSpecies, sciName)}}</span>
          <span v-else class="ph-species-trigger-placeholder">{{t('pheno_pick_species')}}</span>
          <span class="ph-species-trigger-caret">{{speciesDropdownOpen ? '▲' : '▼'}}</span>
        </button>
        <div v-if="speciesDropdownOpen" class="ph-species-dropdown">
          <input ref="speciesSearchInput" type="text"
                 v-model="speciesFilter"
                 :placeholder="t('search_species_ph') || 'Rechercher...'"
                 class="ph-species-filter"
                 @click.stop
                 @keydown.esc="closeSpeciesDropdown"
                 @keydown.enter.prevent="pickFirstFiltered">
          <div class="ph-species-list">
            <button v-for="sp in filteredSpeciesList" :key="sp.Com_Name"
                    class="ph-species-item"
                    :class="{active: sp.Com_Name === currentSpecies}"
                    @click.stop="pickSpeciesFromDropdown(sp)">
              <div class="ph-species-item-row">
                <span class="ph-species-item-name">{{spName(sp.Com_Name, sp.Sci_Name)}}</span>
                <span v-if="sp.n != null" class="ph-species-item-count">{{sp.n}}</span>
              </div>
              <span class="ph-species-item-sci">{{sp.Sci_Name}}</span>
            </button>
            <div v-if="!filteredSpeciesList.length" class="ph-species-empty">
              {{t('no_species_match') || 'Aucune espèce'}}
            </div>
          </div>
        </div>
      </div>
      <select v-if="availableYears.length" v-model="selectedYear" @change="reloadData" class="ph-year-select">
        <option v-for="y in availableYears" :key="y" :value="y">{{y}}</option>
      </select>
      <div v-if="currentSpecies" class="ph-mode-group">
        <button class="ph-mode-btn" :class="{active: viewMode==='presence'}" @click="viewMode='presence'">{{t('pheno_view_presence')}}</button>
        <button class="ph-mode-btn" :class="{active: viewMode==='abundance'}" @click="viewMode='abundance'">{{t('pheno_view_abundance')}}</button>
        <button class="ph-mode-btn" :class="{active: viewMode==='hourly'}" @click="viewMode='hourly'">{{t('pheno_view_hourly')}}</button>
      </div>
    </div>

    <!-- ── Empty state with suggestions ─────────────────────── -->
    <div v-if="!currentSpecies" class="ph-empty">
      <div class="ph-empty-title">{{t('pheno_pick_species_title')}}</div>
      <div>{{t('pheno_pick_species_sub')}}</div>
      <div v-if="topSpecies.length" style="margin-top:1.2rem;">
        <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:.5rem;">Suggestions</div>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;">
          <button v-for="sp in topSpecies" :key="sp" @click="selectSpecies(sp)"
                  style="padding:.4rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card2);color:var(--text-main);font-size:.82rem;cursor:pointer;transition:all .15s;"
                  onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
                  onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-main)'">
            {{spName(sp, '')}}
          </button>
        </div>
      </div>
    </div>

    <!-- ── Hero (species info) ────────────────────────────────── -->
    <template v-else-if="loaded">
      <div class="ph-hero">
        <img class="ph-photo" :src="photoUrl(sciName)" :alt="currentSpecies"
             @error="e=>e.target.src='img/robin-logo.svg'">
        <div>
          <div class="ph-title">{{spName(currentSpecies, sciName)}}</div>
          <div class="ph-sci">{{sciName}}</div>
          <div class="ph-meta">
            <span><strong>{{stats.total}}</strong> {{t('detections')}}</span>
            <span v-if="stats.first_date"><strong>{{fmtDate(stats.first_date)}}</strong> → <strong>{{fmtDate(stats.last_date)}}</strong></span>
            <span v-if="stats.activeWeeks"><strong>{{stats.activeWeeks}}</strong> {{t('pheno_active_weeks')}}</span>
          </div>
        </div>
      </div>

      <!-- ── Weekly ribbon ────────────────────────────────────── -->
      <div class="ph-ribbon-wrap">
        <div class="ph-ribbon-title">{{t('pheno_weekly_ribbon')}} — {{selectedYear}}</div>
        <div class="ph-months">
          <span>Jan</span><span>Fév</span><span>Mar</span><span>Avr</span>
          <span>Mai</span><span>Juin</span><span>Juil</span><span>Août</span>
          <span>Sep</span><span>Oct</span><span>Nov</span><span>Déc</span>
        </div>
        <div class="ph-ribbon" ref="ribbonEl">
          <div v-for="cell in ribbonCells" :key="cell.week"
               class="ph-cell"
               :class="{future: cell.future, now: cell.isCurrent, 'has-data': cell.n > 0, selected: selectedWeek === cell.week}"
               :style="{background: cell.color}"
               :title="cell.tooltip"
               @click="selectWeek(cell)"></div>
        </div>
        <div class="ph-ribbon-hint">{{t('pheno_week_zoom_hint')}}</div>
        <div class="ph-legend">
          <span v-if="viewMode==='presence'">
            <span class="ph-legend-cell" :style="{background: 'var(--border)'}"></span> {{t('pheno_legend_absent')}}
            &nbsp;
            <span class="ph-legend-cell" :style="{background: 'var(--data-day)'}"></span> {{t('pheno_legend_present')}}
          </span>
          <span v-else-if="viewMode==='abundance'">
            <span class="ph-legend-cell" :style="{background: 'var(--border)'}"></span> 0
            <span class="ph-legend-cell" :style="{background: phenoColor(1)}"></span> 1-5
            <span class="ph-legend-cell" :style="{background: phenoColor(8)}"></span> 6-20
            <span class="ph-legend-cell" :style="{background: phenoColor(30)}"></span> 21-50
            <span class="ph-legend-cell" :style="{background: phenoColor(80)}"></span> 50+
          </span>
          <span v-else-if="viewMode==='hourly'">
            <span class="ph-legend-cell" :style="{background: 'var(--data-night)'}"></span> {{t('pheno_legend_night')}} (0-4h)
            <span class="ph-legend-cell" :style="{background: 'var(--data-dawn)'}"></span> {{t('pheno_legend_dawn')}} (4-8h)
            <span class="ph-legend-cell" :style="{background: 'var(--data-day)'}"></span> {{t('pheno_legend_day')}} (8-18h)
            <span class="ph-legend-cell" :style="{background: 'var(--data-dusk)'}"></span> {{t('pheno_legend_dusk')}} (18-22h)
          </span>
        </div>
      </div>

      <!-- ── Week zoom panel ─────────────────────────────────── -->
      <div v-if="selectedWeek !== null" class="ph-week-zoom" ref="zoomEl">
        <div class="ph-zoom-head">
          <div>
            <div class="ph-zoom-title">{{t('pheno_week_title')}} {{selectedWeek}}</div>
            <div v-if="weekDetails?.date_from" class="ph-zoom-dates">
              {{fmtDate(weekDetails.date_from)}}
              <span v-if="weekDetails.date_to !== weekDetails.date_from"> → {{fmtDate(weekDetails.date_to)}}</span>
            </div>
          </div>
          <button class="ph-zoom-close" @click="closeWeek">✕ {{t('pheno_week_close')}}</button>
        </div>

        <div v-if="!weekDetails" style="text-align:center;padding:1.5rem;color:var(--text-muted);font-size:.85rem;">
          {{t('pheno_week_loading')}}
        </div>

        <template v-else>
          <div class="ph-zoom-stats">
            <div class="ph-zoom-stat">
              <div class="ph-zoom-stat-val">{{weekDetails.n}}</div>
              <div class="ph-zoom-stat-lbl">{{t('detections')}}</div>
            </div>
            <div class="ph-zoom-stat">
              <div class="ph-zoom-stat-val">{{weekDetails.days}} / 7</div>
              <div class="ph-zoom-stat-lbl">{{t('pheno_week_days_active')}}</div>
            </div>
            <div class="ph-zoom-stat" v-if="weekDetails.avg_hour != null">
              <div class="ph-zoom-stat-val">{{weekDetails.avg_hour}}h</div>
              <div class="ph-zoom-stat-lbl">{{t('pheno_week_avg_hour')}}</div>
            </div>
            <div class="ph-zoom-stat" v-if="weekDetails.first_time">
              <div class="ph-zoom-stat-val">{{weekDetails.first_time?.substring(0,5)}} → {{weekDetails.last_time?.substring(0,5)}}</div>
              <div class="ph-zoom-stat-lbl">{{t('pheno_week_first_last')}}</div>
            </div>
            <div class="ph-zoom-stat" v-if="weekPrevYearCount > 0">
              <div class="ph-zoom-stat-val">{{weekPrevYearCount}}</div>
              <div class="ph-zoom-stat-lbl">{{t('pheno_week_prev_year')}} {{selectedYear - 1}}</div>
            </div>
          </div>

          <div class="ph-zoom-grid">
            <div>
              <div class="ph-zoom-section-title">{{t('pheno_week_hourly_dist')}}</div>
              <div class="ph-hist">
                <div v-for="h in 24" :key="'hb'+h" class="ph-hist-col">
                  <div class="ph-hist-bar"
                       :class="{empty: hourCount(h-1) === 0}"
                       :style="{height: hourBarPct(h-1)+'%', background: hourCount(h-1) > 0 ? hourColor(h-1) : ''}"
                       :title="(h-1)+'h : '+hourCount(h-1)"></div>
                </div>
              </div>
              <div class="ph-hist-labels">
                <span v-for="h in 24" :key="'hl'+h">{{(h-1)%4===0 ? (h-1)+'h' : ''}}</span>
              </div>
            </div>

            <div v-if="weekDetails.top?.length">
              <div class="ph-zoom-section-title">{{t('pheno_week_top_detections')}}</div>
              <div class="ph-top-list">
                <div v-for="(d, i) in weekDetails.top" :key="'td'+i" class="ph-top-row">
                  <span class="ph-top-date">{{fmtDate(d.Date)}} · {{d.Time?.substring(0,5)}}</span>
                  <span class="ph-top-conf">{{d.conf}}%</span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- ── Inferred phases ──────────────────────────────────── -->
      <div v-if="phases.length" class="ph-phases">
        <div v-for="ph in phases" :key="ph.id" class="ph-phase-card" :class="ph.kind">
          <div class="ph-phase-label"><bird-icon :name="ph.icon" :size="14" class="ph-phase-icon" ></bird-icon>{{ph.label}}</div>
          <div class="ph-phase-value">{{ph.value}}</div>
          <div v-if="ph.sub" class="ph-phase-sub">{{ph.sub}}</div>
        </div>
      </div>

      <!-- ── Honest disclaimer ────────────────────────────────── -->
      <div class="ph-disclaimer">
        ⚠ {{t('pheno_disclaimer')}}
      </div>
    </template>

    <div v-else style="text-align:center;padding:2rem;color:var(--text-muted);">{{t('loading')}}…</div>

  </birdash-shell>
</div>

<script>
BIRDASH.ready.then(() => {
  const { createApp, ref, computed, onMounted, watch, nextTick } = Vue;
  const { useI18n, useSpeciesNames, registerComponents,
          birdQuery, fmtDate, photoUrl } = BIRDASH;
  const Q = BIRDASH_QUERIES;

  // v-click-outside — closes the species dropdown when the user clicks
  // anywhere outside the picker. Same shape as the directive used in
  // detections.html so the behaviour is consistent across pages.
  const vClickOutside = {
    mounted(el, binding) {
      el._clickOutsideHandler = e => { if (!el.contains(e.target)) binding.value(e); };
      document.addEventListener('click', el._clickOutsideHandler);
    },
    unmounted(el) { document.removeEventListener('click', el._clickOutsideHandler); },
  };

  const app = createApp({
    directives: { 'click-outside': vClickOutside },
    setup() {
      const { t } = useI18n();
      const { spName } = useSpeciesNames();

      // ── State ────────────────────────────────────────────────
      const allSpecies     = ref([]);
      const topSpecies = ref([]);
      const currentSpecies = ref('');
      const sciName        = ref('');
      // Custom species picker (replaces the legacy datalist input that
      // forced the user to manually clear the field before re-selecting).
      const speciesDropdownOpen = ref(false);
      const speciesFilter       = ref('');
      const speciesSearchInput  = ref(null);
      const availableYears = ref([]);
      const selectedYear   = ref(new Date().getFullYear());
      const viewMode       = ref('presence');
      const loaded         = ref(false);

      const weeklyData = ref([]);
      const hourlyData = ref([]);
      const stats      = ref({ total: 0, first_date: null, last_date: null, activeWeeks: 0 });

      // ── Week zoom state ──────────────────────────────────────
      const selectedWeek    = ref(null);
      const weekDetails     = ref(null);
      const weekPrevYearCount = ref(0);
      const zoomEl          = ref(null);

      // ── Read URL param ───────────────────────────────────────
      const url = new URL(window.location.href);
      const initialSpecies = url.searchParams.get('species');

      // ── Load species list ────────────────────────────────────
      // Use the confidence-filtered query so species that exist in the
      // database only at sub-threshold confidence (e.g. an "Aigrette
      // garzette" with two 0.4 hits) don't appear in the picker — the
      // phenology graphs filter the same way and would show empty.
      async function loadSpeciesList() {
        try {
          const rows = await birdQuery(...Q.speciesWithCounts());
          allSpecies.value = rows;
          // Top 8 for the empty-state suggestions (already sorted by count).
          topSpecies.value = rows.slice(0, 8).map(r => r.Com_Name);
          if (initialSpecies) {
            const match = rows.find(r => r.Com_Name === initialSpecies);
            if (match) {
              await selectSpecies(match.Com_Name, match.Sci_Name);
            }
          }
        } catch(e) { console.error('loadSpeciesList:', e); }
      }

      // ── Select a species ─────────────────────────────────────
      async function selectSpecies(name, sci) {
        currentSpecies.value = name;
        sciName.value = sci || (allSpecies.value.find(s => s.Com_Name === name)?.Sci_Name || '');
        loaded.value = false;

        // Load available years
        try {
          const years = await birdQuery(...Q.phenologyYears(name));
          availableYears.value = years.map(y => y.year);
          if (availableYears.value.length && !availableYears.value.includes(selectedYear.value)) {
            selectedYear.value = availableYears.value[0];
          }
        } catch(e) {}

        await reloadData();

        // Update URL
        const u = new URL(window.location.href);
        u.searchParams.set('species', name);
        history.replaceState(null, '', u.toString());
      }

      // ── Species dropdown helpers ─────────────────────────────
      // Filter list against the search input. We compare against BOTH
      // the localized common name (what the user actually sees) and
      // the scientific name, so a French user typing "moineau" finds
      // the right rows even if Com_Name is in the database language.
      const filteredSpeciesList = computed(() => {
        const q = speciesFilter.value.trim().toLowerCase();
        const list = allSpecies.value || [];
        if (!q) return list;
        return list.filter(s => {
          const display = (spName(s.Com_Name, s.Sci_Name) || '').toLowerCase();
          return display.includes(q)
              || (s.Com_Name || '').toLowerCase().includes(q)
              || (s.Sci_Name || '').toLowerCase().includes(q);
        });
      });

      function toggleSpeciesDropdown() {
        speciesDropdownOpen.value = !speciesDropdownOpen.value;
        if (speciesDropdownOpen.value) {
          // Reset the filter on open so the user always sees the full
          // list — this is the whole point of the redesign.
          speciesFilter.value = '';
          // Auto-focus the search input.
          nextTick(() => {
            if (speciesSearchInput.value) speciesSearchInput.value.focus();
          });
        }
      }
      function closeSpeciesDropdown() { speciesDropdownOpen.value = false; }

      function pickSpeciesFromDropdown(sp) {
        speciesDropdownOpen.value = false;
        speciesFilter.value = '';
        selectSpecies(sp.Com_Name, sp.Sci_Name);
      }

      function pickFirstFiltered() {
        const first = filteredSpeciesList.value[0];
        if (first) pickSpeciesFromDropdown(first);
      }

      // ── Load weekly + hourly data for current species/year ───
      async function reloadData() {
        if (!currentSpecies.value) return;
        try {
          const [weekly, hourly, statsRow] = await Promise.all([
            birdQuery(...Q.phenologyWeekly(currentSpecies.value, selectedYear.value)),
            birdQuery(...Q.phenologyHourlyByWeek(currentSpecies.value, selectedYear.value)),
            birdQuery(...Q.phenologyFirstLast(currentSpecies.value, selectedYear.value)),
          ]);
          weeklyData.value = weekly;
          hourlyData.value = hourly;
          const s = statsRow[0] || {};
          stats.value = {
            total: s.total || 0,
            first_date: s.first_date,
            last_date: s.last_date,
            activeWeeks: weekly.length,
          };
          loaded.value = true;
        } catch(e) { console.error('reloadData:', e); loaded.value = true; }
      }

      // ── Color scale (abundance / heatmap) ────────────────────
      // All colors come from CSS custom properties so they re-theme automatically.
      function phenoColor(n) {
        if (!n || n <= 0) return 'var(--border)';
        if (n <= 5)  return 'var(--data-abundance-0)';
        if (n <= 20) return 'var(--data-abundance-1)';
        if (n <= 50) return 'var(--data-abundance-2)';
        return 'var(--data-abundance-3)';
      }
      function hourColor(h) {
        if (h == null) return 'var(--border)';
        if (h < 4)  return 'var(--data-night)';
        if (h < 8)  return 'var(--data-dawn)';
        if (h < 18) return 'var(--data-day)';
        if (h < 22) return 'var(--data-dusk)';
        return 'var(--data-night)';
      }

      // ── Build ribbon cells (53 weeks) ────────────────────────
      const ribbonCells = computed(() => {
        const weekMap = {};
        for (const w of weeklyData.value) weekMap[w.week] = w.n;
        const hourMap = {};
        for (const h of hourlyData.value) hourMap[h.week] = h.avg_hour;

        const now = new Date();
        const currentYear = now.getFullYear();
        const currentWeek = isoWeekOfYear(now);
        const isCurrentYear = parseInt(selectedYear.value) === currentYear;

        const cells = [];
        for (let w = 0; w <= 52; w++) {
          const n = weekMap[w] || 0;
          const avgHour = hourMap[w];
          let color = 'var(--border)';
          if (viewMode.value === 'presence') {
            color = n > 0 ? '#4caf50' : 'var(--border)';
          } else if (viewMode.value === 'abundance') {
            color = phenoColor(n);
          } else if (viewMode.value === 'hourly') {
            color = n > 0 ? hourColor(avgHour) : 'var(--border)';
          }

          const future = isCurrentYear && w > currentWeek;
          const isCurrent = isCurrentYear && w === currentWeek;

          let tooltip = 'Sem. ' + w;
          if (n > 0) tooltip += ' — ' + n + ' détection' + (n>1?'s':'');
          if (avgHour != null && viewMode.value === 'hourly') tooltip += ' · ~' + avgHour + 'h';

          cells.push({ week: w, n, color, future, isCurrent, tooltip });
        }
        return cells;
      });

      // ── Week zoom: select / close / fetch ────────────────────
      async function selectWeek(cell) {
        if (cell.future || !cell.n) return;
        if (selectedWeek.value === cell.week) {
          closeWeek();
          return;
        }
        selectedWeek.value = cell.week;
        weekDetails.value = null;
        weekPrevYearCount.value = 0;
        try {
          const [details, hourly, top, prev] = await Promise.all([
            birdQuery(...Q.phenologyWeekDetails(currentSpecies.value, selectedYear.value, cell.week)),
            birdQuery(...Q.phenologyWeekHourly(currentSpecies.value, selectedYear.value, cell.week)),
            birdQuery(...Q.phenologyWeekTopDetections(currentSpecies.value, selectedYear.value, cell.week, 5)),
            birdQuery(...Q.phenologyWeekPrevYear(currentSpecies.value, selectedYear.value, cell.week)),
          ]);
          weekDetails.value = {
            ...(details[0] || {}),
            hourly,
            top,
          };
          weekPrevYearCount.value = (prev[0] && prev[0].n) || 0;
          await nextTick();
          if (zoomEl.value) {
            zoomEl.value.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
        } catch (e) {
          console.error('selectWeek:', e);
          weekDetails.value = { n: 0, days: 0, hourly: [], top: [] };
        }
      }

      function closeWeek() {
        selectedWeek.value = null;
        weekDetails.value = null;
        weekPrevYearCount.value = 0;
      }

      function hourCount(h) {
        if (!weekDetails.value?.hourly) return 0;
        const row = weekDetails.value.hourly.find(r => r.h === h);
        return row ? row.n : 0;
      }
      function hourBarPct(h) {
        if (!weekDetails.value?.hourly?.length) return 0;
        const max = Math.max(1, ...weekDetails.value.hourly.map(r => r.n));
        const n = hourCount(h);
        return n > 0 ? Math.max(4, (n / max) * 100) : 0;
      }

      // Reset zoom whenever the context changes
      watch([currentSpecies, selectedYear], closeWeek);

      function isoWeekOfYear(d) {
        const onejan = new Date(d.getFullYear(), 0, 1);
        return Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
      }

      // ── Inferred phases (computed from observed data) ────────
      const phases = computed(() => {
        if (!weeklyData.value.length) return [];
        const out = [];
        const counts = weeklyData.value.map(w => w.n);
        const total = counts.reduce((s, n) => s + n, 0);
        const max = Math.max(...counts);
        const weeks = weeklyData.value.map(w => w.week);
        const minWeek = Math.min(...weeks);
        const maxWeek = Math.max(...weeks);

        // Active period (first to last week with any detection)
        out.push({
          id: 'active', kind: '', icon: 'calendar',
          label: t('pheno_phase_active'),
          value: 'Sem. ' + minWeek + ' → Sem. ' + maxWeek,
          sub: weeks.length + ' / 53 ' + t('pheno_active_weeks_sub'),
        });

        // First / last observation
        if (stats.value.first_date) {
          out.push({
            id: 'first', kind: 'info', icon: 'plane-landing',
            label: t('pheno_first_obs'),
            value: fmtDate(stats.value.first_date),
          });
          out.push({
            id: 'last', kind: 'info', icon: 'plane-takeoff',
            label: t('pheno_last_obs'),
            value: fmtDate(stats.value.last_date),
          });
        }

        // Peak weeks (top quartile)
        if (max > 1) {
          const sorted = [...counts].sort((a, b) => b - a);
          const q1 = sorted[Math.floor(sorted.length * 0.25)] || max;
          const peakWeeks = weeklyData.value.filter(w => w.n >= q1).map(w => w.week);
          if (peakWeeks.length) {
            const pk1 = Math.min(...peakWeeks);
            const pk2 = Math.max(...peakWeeks);
            out.push({
              id: 'peak', kind: '', icon: 'trending-up',
              label: t('pheno_phase_peak'),
              value: 'Sem. ' + pk1 + ' → Sem. ' + pk2,
              sub: peakWeeks.length + ' ' + t('pheno_peak_weeks_sub'),
            });
          }
        }

        // Dawn chorus dominance (>70% detections in 4-8h)
        if (hourlyData.value.length) {
          const dawnWeeks = hourlyData.value.filter(h => h.n > 2 && h.dawn_n / h.n > 0.7);
          if (dawnWeeks.length >= 3) {
            const dw = dawnWeeks.map(w => w.week);
            out.push({
              id: 'dawn', kind: '', icon: 'music',
              label: t('pheno_phase_dawn_chorus'),
              value: 'Sem. ' + Math.min(...dw) + ' → Sem. ' + Math.max(...dw),
              sub: t('pheno_dawn_chorus_sub'),
            });
          }
        }

        // Continuous absence > 4 weeks → likely migrant
        const presentSet = new Set(weeks);
        let maxGap = 0;
        for (let i = 1; i < 53; i++) {
          let gap = 0;
          while (i + gap < 53 && !presentSet.has(i + gap)) gap++;
          if (gap > maxGap) maxGap = gap;
          i += gap;
        }
        if (maxGap >= 4) {
          out.push({
            id: 'migrant', kind: 'warn', icon: 'globe',
            label: t('pheno_migrant_likely'),
            value: maxGap + ' ' + t('pheno_gap_weeks_sub'),
            sub: t('pheno_migrant_sub'),
          });
        } else if (weeks.length >= 40) {
          out.push({
            id: 'resident', kind: 'info', icon: 'home',
            label: t('pheno_resident_likely'),
            value: weeks.length + ' / 53 ' + t('pheno_active_weeks_sub'),
          });
        }

        return out;
      });

      onMounted(loadSpeciesList);

      return {
        t, spName, fmtDate, photoUrl, phenoColor, hourColor,
        allSpecies, topSpecies, selectSpecies,
        speciesDropdownOpen, speciesFilter, speciesSearchInput, filteredSpeciesList,
        toggleSpeciesDropdown, closeSpeciesDropdown, pickSpeciesFromDropdown, pickFirstFiltered,
        currentSpecies, sciName, availableYears, selectedYear,
        viewMode, loaded, stats, ribbonCells, phases,
        reloadData,
        selectedWeek, weekDetails, weekPrevYearCount, zoomEl,
        selectWeek, closeWeek, hourCount, hourBarPct,
      };
    }
  });
  registerComponents(app).mount('#app');
});
</script>
