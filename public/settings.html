<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — Configuration</title>
  <meta property="og:title" content="BirdStation — Settings">
  <meta property="og:description" content="Bird detection dashboard — Heinsch, Belgium">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <script src="js/bird-spectro-modal.js"></script>
  <script src="js/bird-weather-chip.js"></script>
</head>
<body>
<div id="app" v-cloak>
  <birdash-shell page="settings" :title="t('nav_settings')">

    <!-- Info modal -->
    <div v-show="helpKey" class="info-overlay" @click.self="helpKey=null" :style="{display: helpKey ? 'flex' : 'none'}">
      <div class="info-modal">
        <button class="info-modal-close" @click="helpKey=null">&times;</button>
        <div class="info-modal-title">ⓘ {{helpTitle}}</div>
        <div class="info-modal-body" v-html="safeHtml(helpBody)"></div>
      </div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="display:flex;justify-content:center;padding:3rem;">
      <div class="spinner"><div></div><div></div><div></div></div>
    </div>

    <template v-else>

      <!-- ── Tab Navigation ──────────────────────────────────────── -->
      <div class="set-tabs">
        <button v-for="tab in tabs" :key="tab.id"
                class="set-tab-btn" :class="{active: activeTab === tab.id}"
                @click="switchTab(tab.id)">
          <span class="set-tab-icon"><bird-icon :name="tab.icon" :size="16" ></bird-icon></span>
          <span class="set-tab-label">{{tab.label || t(tab.labelKey)}}</span>
        </button>
      </div>

      <!-- ══ Lazy-loaded tab content ═════════════════════════════════ -->
      <keep-alive>
        <component :is="tabComponents[activeTab]" :key="activeTab"></component>
      </keep-alive>


      <!-- ═══ Save bar ═══ -->
      <div class="save-bar">
        <button class="btn-save" @click="saveAll" :disabled="saving || !isDirty" :class="{'has-changes': isDirty}">
          <span v-if="saving">…</span>
          <span v-else>{{t('set_save')}}<span v-if="isDirty" style="margin-left:.4em;color:var(--accent, #4a9eff);font-size:1.15em;line-height:1;">●</span></span>
        </button>
        <button class="btn-outline" @click="resetDefaults">{{t('set_defaults')}}</button>
        <span v-if="saveMsg" class="save-msg" :class="saveErr ? 'save-err' : 'save-ok'">{{saveMsg}}</span>
      </div>

    </template>
  </birdash-shell>
</div>
<script>
const { createApp, ref, reactive, onMounted, computed, watch, defineAsyncComponent, provide, inject } = Vue;
const { useI18n, useFormat, registerComponents, safeHtml, authHeaders } = BIRDASH;

const app = createApp({
  setup() {
    const { lang, t } = useI18n();
    const fmt = useFormat();
    const API = BIRD_CONFIG.apiUrl;

    const conf = reactive({});
    const models = ref([]);
    const analysisStatus = ref(null);
    const languages = ref([]);
    const services = ref([]);
    const loading = ref(true);

    // ── Tab navigation ──────────────────────────────────────────
    const tabs = [
      { id: 'detection', icon: 'cpu', labelKey: 'set_tab_detection' },
      { id: 'audio',     icon: 'mic', labelKey: 'set_tab_audio' },
      { id: 'notif',     icon: 'bell', labelKey: 'set_tab_notif' },
      { id: 'station',   icon: 'map-pin', labelKey: 'set_tab_station' },
      { id: 'services',  icon: 'wrench', labelKey: 'set_tab_services' },
      { id: 'species',   icon: 'list', labelKey: 'set_tab_species' },
      { id: 'backup',    icon: 'save', labelKey: 'set_tab_backup' },
      { id: 'database',  icon: 'database', labelKey: 'set_tab_database' },
      { id: 'terminal',  icon: 'terminal', labelKey: 'set_tab_terminal' },
      { id: 'external-display', icon: 'monitor', labelKey: 'set_tab_external_display' },
      { id: 'monitoring', icon: 'monitor', labelKey: 'nav_system', href: 'system.html' },
    ];
    const hashTab = location.hash.slice(1);
    const localTabs = ['detection', 'audio', 'notif', 'station', 'services', 'species', 'backup', 'database', 'terminal', 'external-display'];
    // Migrate old key
    if (localStorage.getItem('birdash-settings-tab') && !localStorage.getItem('birdash_settings_tab')) {
      localStorage.setItem('birdash_settings_tab', localStorage.getItem('birdash-settings-tab'));
      localStorage.removeItem('birdash-settings-tab');
    }
    const activeTab = ref(
      localTabs.includes(hashTab) ? hashTab :
      localStorage.getItem('birdash_settings_tab') || 'detection'
    );

    function switchTab(id) {
      const tab = tabs.find(t => t.id === id);
      if (tab && tab.href) {
        window.location.href = tab.href;
        return;
      }
      activeTab.value = id;
      localStorage.setItem('birdash_settings_tab', id);
      history.replaceState(null, '', '#' + id);
    }
    const saving = ref(false);
    const birdnetLicenseAccepted = ref(false);
    const birdnetDownloading = ref(false);
    async function downloadBirdnet() {
      birdnetDownloading.value = true;
      try {
        const resp = await fetch(BIRD_CONFIG.apiUrl + '/download-birdnet', { method: 'POST', headers: BIRDASH.authHeaders() });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || `HTTP ${resp.status}`);
        window.dispatchEvent(new CustomEvent('birdash:success', { detail: data.message || 'BirdNET download started' }));
        setTimeout(() => reload(), 30000);
      } catch(e) {
        window.dispatchEvent(new CustomEvent('birdash:error', { detail: 'BirdNET download: ' + e.message }));
      }
      birdnetDownloading.value = false;
    }
    const svcLoading = ref(true);
    const saveMsg = ref('');
    const saveErr = ref(false);
    const includeList = ref('');
    const excludeList = ref('');
    const savingLists = ref(false);

    // ── Range Filter preview (Detection tab) ───────────────────
    const rangePreview = reactive({ loading: false, error: '', data: null });
    let _rangePreviewTimer = null;
    async function loadRangePreview() {
      const threshold = parseFloat(conf.SF_THRESH);
      if (isNaN(threshold)) return;
      rangePreview.loading = true; rangePreview.error = '';
      try {
        const r = await fetch(`${API}/range-filter/preview?threshold=${threshold}`);
        const d = await r.json();
        if (!r.ok || d.error) {
          rangePreview.error = d.message || d.error || ('HTTP ' + r.status);
        } else {
          rangePreview.data = d;
        }
      } catch (e) {
        rangePreview.error = e.message;
      }
      rangePreview.loading = false;
    }
    function onRangePreviewDebounced() {
      if (_rangePreviewTimer) clearTimeout(_rangePreviewTimer);
      _rangePreviewTimer = setTimeout(loadRangePreview, 500);
    }
    // Trigger initial load when settings finish loading and we know SF_THRESH
    watch(() => conf.SF_THRESH, (v, old) => {
      if (old === undefined && v !== undefined) loadRangePreview();
    });

    // ── Auth (security card in Station tab) ────────────────────
    const authUser        = ref('');
    const authCurrentPw   = ref('');
    const authNewPw       = ref('');
    const authNewPw2      = ref('');
    const authSaving      = ref(false);
    const authMsg         = ref('');
    const authErr         = ref(false);
    const authConfigured  = ref(false);
    async function loadAuthStatus() {
      try {
        const r = await fetch(API + '/auth/status');
        const d = await r.json();
        authConfigured.value = !!d.configured;
      } catch {}
    }
    async function saveAuthCreds() {
      authMsg.value = ''; authErr.value = false;
      if (!authNewPw.value || authNewPw.value.length < 8) {
        authMsg.value = t('set_security_password_too_short'); authErr.value = true; return;
      }
      if (authNewPw.value !== authNewPw2.value) {
        authMsg.value = t('set_security_password_mismatch'); authErr.value = true; return;
      }
      authSaving.value = true;
      try {
        const body = { username: authUser.value, newPassword: authNewPw.value };
        if (authConfigured.value) body.currentPassword = authCurrentPw.value;
        const r = await fetch(API + '/auth/set-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || d.error || 'HTTP ' + r.status);
        authMsg.value = t('set_security_password_set');
        authNewPw.value = ''; authNewPw2.value = ''; authCurrentPw.value = '';
        authConfigured.value = true;
        // Mirror the new username into the generic conf so that any later
        // "Save all" doesn't roll the username back to its prior value.
        conf.AUTH_USERNAME = authUser.value;
      } catch(e) {
        authMsg.value = e.message; authErr.value = true;
      }
      authSaving.value = false;
    }

    // ── Apprise notification URLs ──────────────────────────────
    const appriseUrls    = ref('');
    const savingApprise  = ref(false);
    const testingApprise = ref(false);
    const appriseMsg     = ref('');
    const appriseErr     = ref(false);

    async function loadApprise() {
      try {
        const res = await fetch(API + '/apprise');
        const data = await res.json();
        appriseUrls.value = data.urls || '';
      } catch(e) {}
    }

    async function saveApprise() {
      savingApprise.value = true;
      appriseMsg.value = '';
      let _thrown = null;
      try {
        const res = await fetch(API + '/apprise', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ urls: appriseUrls.value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) {
          throw new Error(data.error || ('apprise: HTTP ' + res.status));
        }
        appriseMsg.value = '✓'; appriseErr.value = false;
      } catch(e) {
        appriseMsg.value = e.message; appriseErr.value = true;
        _thrown = e;
      }
      savingApprise.value = false;
      if (_thrown) throw _thrown;
    }

    // ── Alert thresholds ─────────────────────────────────────
    const { data: alertThresholds, loadOk: alertsLoadOk, load: loadAlertThresholds } = useJsonConfig(
      '/alert-thresholds',
      { temp_warn:70, temp_crit:80, disk_warn:85, disk_crit:95, ram_warn:90, backlog_warn:50, no_detection_hours:4, service_down:1,
        alert_temp:1, alert_temp_crit:1, alert_disk:1, alert_ram:1, alert_backlog:1, alert_no_det:1,
        alert_influx:0, alert_missing:0, alert_rare_visitor:0 }
    );
    const savingAlerts = ref(false);
    const alertSaveMsg = ref('');
    const alertSaveErr = ref(false);

    async function saveAlertThresholds() {
      if (!alertsLoadOk.value) {
        throw new Error('alert-thresholds: initial load failed, refusing to save stale state');
      }
      savingAlerts.value = true;
      alertSaveMsg.value = '';
      let _thrown = null;
      try {
        // Save bird notification event toggles + system alert thresholds
        const updates = {
          APPRISE_NOTIFY_EACH_DETECTION: String(conf.APPRISE_NOTIFY_EACH_DETECTION || 0),
          APPRISE_NOTIFY_NEW_SPECIES: String(conf.APPRISE_NOTIFY_NEW_SPECIES || 0),
          NOTIFY_FAVORITES: String(conf.NOTIFY_FAVORITES || 0),
          APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY: String(conf.APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY || 0),
          APPRISE_NOTIFICATION_TITLE: conf.APPRISE_NOTIFICATION_TITLE || '',
          APPRISE_NOTIFICATION_BODY: conf.APPRISE_NOTIFICATION_BODY || '',
          APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES: String(conf.APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES || 0),
          BIRDASH_ALERT_TEMP_WARN: String(alertThresholds.temp_warn),
          BIRDASH_ALERT_TEMP_CRIT: String(alertThresholds.temp_crit),
          BIRDASH_ALERT_DISK_WARN: String(alertThresholds.disk_warn),
          BIRDASH_ALERT_DISK_CRIT: String(alertThresholds.disk_crit),
          BIRDASH_ALERT_RAM_WARN: String(alertThresholds.ram_warn),
          BIRDASH_ALERT_BACKLOG: String(alertThresholds.backlog_warn),
          BIRDASH_ALERT_NO_DET_H: String(alertThresholds.no_detection_hours),
          BIRDASH_ALERT_ON_TEMP: String(alertThresholds.alert_temp || 0),
          BIRDASH_ALERT_ON_TEMP_CRIT: String(alertThresholds.alert_temp_crit || 0),
          BIRDASH_ALERT_ON_DISK: String(alertThresholds.alert_disk || 0),
          BIRDASH_ALERT_ON_RAM: String(alertThresholds.alert_ram || 0),
          BIRDASH_ALERT_ON_BACKLOG: String(alertThresholds.alert_backlog || 0),
          BIRDASH_ALERT_ON_NO_DET: String(alertThresholds.alert_no_det || 0),
          BIRDASH_ALERT_ON_INFLUX: String(alertThresholds.alert_influx || 0),
          BIRDASH_ALERT_ON_MISSING: String(alertThresholds.alert_missing || 0),
          BIRDASH_ALERT_ON_RARE_VISITOR: String(alertThresholds.alert_rare_visitor || 0),
          BIRDASH_ALERT_ON_SVC_DOWN: String(alertThresholds.service_down || 0),
          BIRDASH_ALERT_ON_SOUND: String(alertThresholds.alert_sound || 0),
          BIRDASH_ALERT_SOUND_LOW_DBFS: String(alertThresholds.sound_low_dbfs),
          BIRDASH_ALERT_SOUND_HIGH_DBFS: String(alertThresholds.sound_high_dbfs),
          BIRDASH_ALERT_SOUND_SUSTAINED_MIN: String(alertThresholds.sound_sustained_min),
        };
        const res = await fetch(API + '/settings', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ updates }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) {
          throw new Error(data.error || ('alert-thresholds: HTTP ' + res.status));
        }
        alertSaveMsg.value = '✓'; alertSaveErr.value = false;
      } catch(e) {
        alertSaveMsg.value = e.message; alertSaveErr.value = true;
        _thrown = e;
      }
      savingAlerts.value = false;
      if (_thrown) throw _thrown;
    }

    async function testApprise() {
      testingApprise.value = true;
      appriseMsg.value = '';
      // Save first to ensure apprise.txt is up to date
      await saveApprise();
      try {
        const res = await fetch(API + '/apprise/test', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) { appriseMsg.value = t('set_notif_test_ok'); appriseErr.value = false; }
        else { appriseMsg.value = t('set_notif_test_fail', { error: data.error || 'unknown' }); appriseErr.value = true; }
      } catch(e) { appriseMsg.value = t('set_notif_test_fail', { error: e.message }); appriseErr.value = true; }
      testingApprise.value = false;
    }

    // ── Backup configuration ──────────────────────────────────────
    const bkp = reactive({
      destination: 'local', content: ['all'], schedule: 'manual', scheduleTime: '02:00', retention: 30,
      local: { path: '/mnt/backup' },
      smb: { host: '', share: '', user: '', pass: '', remotePath: '/birdash-backup' },
      nfs: { host: '', exportPath: '', mountPoint: '/mnt/nfs-backup', remotePath: '/birdash-backup' },
      sftp: { host: '', port: 22, user: '', pass: '', remotePath: '/birdash-backup' },
      s3: { bucket: '', region: 'eu-west-1', accessKey: '', secretKey: '', remotePath: 'birdash-backup' },
      gdrive: { folderId: '' },
      webdav: { url: '', user: '', pass: '', remotePath: '/birdash-backup' },
      lastRun: null, lastStatus: null,
    });
    const savingBkp = ref(false);
    const runningBkp = ref(false);
    const bkpProgress = reactive({ state: 'idle', percent: 0, step: '', detail: '', startedAt: null, updatedAt: null });
    let _bkpPollTimer = null;

    const backupDests = [
      { value: 'local', icon: 'disc', labelKey: 'set_backup_dest_local' },
      { value: 'smb', icon: 'monitor', labelKey: 'set_backup_dest_smb' },
      { value: 'nfs', icon: 'folder', labelKey: 'set_backup_dest_nfs' },
      { value: 'sftp', icon: 'lock', labelKey: 'set_backup_dest_sftp' },
      { value: 's3', icon: 'cloud', labelKey: 'set_backup_dest_s3' },
      { value: 'gdrive', icon: '📎', labelKey: 'set_backup_dest_gdrive' },
      { value: 'webdav', icon: '🌐', labelKey: 'set_backup_dest_webdav' },
    ];

    function toggleBackupContent(type) {
      if (type === 'all') {
        bkp.content = bkp.content.includes('all') ? ['db', 'config'] : ['all'];
      } else {
        if (bkp.content.includes('all')) return;
        const idx = bkp.content.indexOf(type);
        if (idx >= 0) { bkp.content.splice(idx, 1); if (bkp.content.length === 0) bkp.content.push('db'); }
        else bkp.content.push(type);
      }
    }

    async function loadBackupConfig() {
      try {
        const data = await fetch(API + '/backup-config').then(r => r.json());
        if (data.error) return;
        Object.keys(data).forEach(k => { if (k in bkp) { if (typeof bkp[k] === 'object' && !Array.isArray(bkp[k]) && bkp[k] !== null) Object.assign(bkp[k], data[k]); else bkp[k] = data[k]; } });
      } catch(e) { console.warn('Could not load backup config:', e); }
      // Check if a backup is already running
      try {
        const prog = await fetch(API + '/backup-progress').then(r => r.json());
        if (prog.state === 'running') {
          Object.assign(bkpProgress, prog);
          runningBkp.value = true;
          startBackupPoll();
        } else if (prog.state && prog.state !== 'idle') {
          Object.assign(bkpProgress, prog);
        }
      } catch(e) { /* silent */ }
    }

    function bkpStepLabel(step) {
      const keys = { init: 'bkp_init', db: 'bkp_db', config: 'bkp_config',
        projects: 'bkp_projects', audio: 'bkp_audio', upload: 'bkp_upload', mount: 'bkp_mount', done: 'bkp_done' };
      return keys[step] ? t(keys[step]) : step || '';
    }

    const bkpElapsed = computed(() => {
      if (!bkpProgress.startedAt) return '';
      const ms = new Date(bkpProgress.updatedAt || new Date()) - new Date(bkpProgress.startedAt);
      const sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + 'min ' + (sec % 60) + 's';
      const hr = Math.floor(min / 60);
      return hr + 'h ' + (min % 60) + 'min';
    });

    async function pollBackupProgress() {
      try {
        const data = await fetch(API + '/backup-progress').then(r => r.json());
        if (data.error) return;
        Object.assign(bkpProgress, data);
        // If backup finished, refresh config to get lastRun/lastStatus
        if (data.state === 'completed' || data.state === 'failed' || data.state === 'stopped') {
          stopBackupPoll();
          runningBkp.value = false;
          await loadBackupConfig();
          loadBackupHistory();
        }
      } catch(e) { /* silent */ }
    }

    function startBackupPoll() {
      stopBackupPoll();
      _bkpPollTimer = setInterval(pollBackupProgress, 2000);
    }

    function stopBackupPoll() {
      if (_bkpPollTimer) { clearInterval(_bkpPollTimer); _bkpPollTimer = null; }
    }

    // ── Schedule & History ──────────────────────────────────────────────────
    const bkpSchedule = ref(null);
    const bkpHistory = ref([]);

    async function loadBackupSchedule() {
      try {
        const data = await fetch(API + '/backup-schedule').then(r => r.json());
        bkpSchedule.value = data.schedule || null;
      } catch(e) {}
    }

    async function loadBackupHistory() {
      try {
        const data = await fetch(API + '/backup-history').then(r => r.json());
        bkpHistory.value = (data || []).reverse(); // most recent first
      } catch(e) {}
    }

    // fmtSize / fmtDateTimeFull now delegate to the locale-aware useFormat
    // helpers so file sizes and timestamps follow the Region & units prefs.
    const fmtSize         = fmt.fmtSize;
    const fmtDateTimeFull = fmt.fmtDateTime;

    async function pauseBackup() {
      try {
        const res = await fetch(API + '/backup-pause', { method: 'POST', headers: authHeaders() });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
        if (data.action === 'pause') bkpProgress.state = 'paused';
        else bkpProgress.state = 'running';
      } catch(e) {
        saveMsg.value = 'pause backup: ' + e.message;
        saveErr.value = true;
      }
    }

    async function stopBackup() {
      if (!confirm(t('set_backup_stop_confirm'))) return;
      try {
        const res = await fetch(API + '/backup-stop', { method: 'POST', headers: authHeaders() });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
        bkpProgress.state = 'stopped';
        bkpProgress.detail = t('bkp_stopped_by_user');
        stopBackupPoll();
        runningBkp.value = false;
        await loadBackupConfig();
      } catch(e) {
        saveMsg.value = 'stop backup: ' + e.message;
        saveErr.value = true;
      }
    }

    async function saveBackupConfig() {
      savingBkp.value = true;
      try {
        const res = await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) {
          throw new Error(data.error || ('backup-config: HTTP ' + res.status));
        }
        saveMsg.value = t('set_backup_saved'); saveErr.value = false; loadBackupSchedule();
      } catch(e) {
        saveMsg.value = e.message; saveErr.value = true;
      }
      savingBkp.value = false;
    }

    async function runBackup() {
      runningBkp.value = true;
      Object.assign(bkpProgress, { state: 'running', percent: 0, step: 'init', detail: t('bkp_starting'), startedAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      try {
        // Save config first — refuse to start the backup if save fails.
        const cfgRes = await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const cfgData = await cfgRes.json().catch(() => ({}));
        if (!cfgRes.ok || cfgData.error) {
          throw new Error('save backup config: ' + (cfgData.error || `HTTP ${cfgRes.status}`));
        }
        const res = await fetch(API + '/backup-run', { method: 'POST', headers: authHeaders() });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.error) {
          throw new Error('backup-run: ' + (data.error || `HTTP ${res.status}`));
        }
        saveMsg.value = '';
        saveErr.value = false;
        startBackupPoll();
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
        Object.assign(bkpProgress, { state: 'idle', percent: 0 });
        runningBkp.value = false;
      }
    }

    function modelLabel(m) {
      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return 'BirdNET V2.4';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return 'BirdNET V2.4 MData';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return 'BirdNET V2.4 MData V2';
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return 'BirdNET V1';
      if (m === 'perch_v2_fp16') return 'Perch V2 FP16';
      if (m === 'perch_v2_dynint8') return 'Perch V2 INT8';
      if (m === 'perch_v2_original') return 'Perch V2 FP32';
      if (m.includes('Perch') || m.includes('perch')) return 'Perch V2';
      return m;
    }

    function modelDescription(m) {
      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return t('set_model_desc_birdnet');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return t('set_model_desc_mdata');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return t('set_model_desc_mdata_v2');
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return t('set_model_desc_v1');
      if (m === 'perch_v2_fp16') return t('set_model_desc_perch_fp16');
      if (m === 'perch_v2_dynint8') return t('set_model_desc_perch_dynint8');
      if (m === 'perch_v2_original') return t('set_model_desc_perch_original');
      if (m.includes('Perch') || m.includes('perch')) return t('set_model_desc_perch');
      return m;
    }

    // Etag of birdnet.conf at the moment we last loaded the form. Sent
    // back as If-Match on the next save so two browser tabs editing the
    // same settings can't silently overwrite each other (Phase 3).
    let _settingsEtag = null;

    async function reload() {
      loading.value = true;
      saveMsg.value = '';
      try {
        const settingsRes = await fetch(API + '/settings');
        _settingsEtag = settingsRes.headers.get('ETag');
        const confData = await settingsRes.json();
        const [modelData, langData, listsData] = await Promise.all([
          fetch(API + '/models').then(r => r.json()),
          fetch(API + '/languages').then(r => r.json()),
          fetch(API + '/species-lists').then(r => r.json()),
        ]);
        // Populate reactive config with defaults for per-model params
        Object.keys(conf).forEach(k => delete conf[k]);
        const defaults = {
          BIRDNET_CONFIDENCE: confData.CONFIDENCE || '0.65',
          PERCH_CONFIDENCE: '0.15',
          PERCH_MIN_MARGIN: '0.05',
          MQTT_ENABLED: '0',
          MQTT_BROKER: '',
          MQTT_PORT: '1883',
          MQTT_USERNAME: '',
          MQTT_PASSWORD: '',
          MQTT_TOPIC_PREFIX: 'birdash',
          MQTT_QOS: '0',
          MQTT_RETAIN: '0',
          MQTT_TLS: '0',
          MQTT_MIN_CONFIDENCE: '',
          MQTT_HASS_DISCOVERY: '0',
          AUTH_MODE: 'off',
          AUTH_USERNAME: '',
          AUTH_SESSION_HOURS: '168',
          RANGE_FILTER_PERCH_EBIRD: '0',
          PRIVACY_FILTER_ENABLED: '0',
          PRIVACY_FILTER_THRESHOLD: '0.5',
          PRIVACY_FILTER_DELETE_AUDIO: '1',
          DOG_FILTER_ENABLED: '0',
          DOG_FILTER_THRESHOLD: '0.5',
          DOG_FILTER_COOLDOWN_SEC: '15',
        };
        Object.assign(conf, defaults, confData);
        // Mirror AUTH_USERNAME into the dedicated authUser ref so the form
        // has its own state and we don't accidentally save AUTH_PASSWORD_HASH
        // through the generic conf path.
        authUser.value = conf.AUTH_USERNAME || '';
        loadAuthStatus();
        models.value = modelData.models || [];
        languages.value = langData.languages || [];
        includeList.value = (listsData.include || []).join('\n');
        excludeList.value = (listsData.exclude || []).join('\n');
        // Capture the just-loaded state as the "saved" baseline. Anything
        // the user types after this will mark the form as dirty.
        _snapshotSavedState();
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      // Load analysis status (dual-model info)
      try {
        analysisStatus.value = await fetch(API + '/analysis-status').then(r => r.json());
      } catch(e) {}
      loading.value = false;
      loadServices();
      loadBackupConfig();
      loadBackupSchedule();
      loadBackupHistory();
    }

    async function loadServices() {
      svcLoading.value = true;
      try {
        const data = await fetch(API + '/services').then(r => r.json());
        services.value = (data.services || []).map(s => ({ ...s, restarting: false }));
      } catch(e) { console.error(e); }
      svcLoading.value = false;
    }

    // Track initial model to detect changes
    let _savedModel = '', _savedSecondary = '', _savedDual = '';

    // saveAll fans out to ~7 endpoints in parallel. Each one can fail
    // independently, so we collect all the results, surface every error,
    // and only show "Saved" if EVERY POST returned ok. Previously most
    // sub-saves were swallowed by `.catch(() => {})`, which produced the
    // "the toast says OK but the value reverts" symptoms users reported.
    async function _postJson(url, body, extraHeaders) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { ...authHeaders(), ...(extraHeaders || {}) },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 409 && data.code === 'STALE_ETAG') {
        const err = new Error(t('set_save_conflict') || 'Conflict: settings were modified by another tab. Reload and try again.');
        err.code = 'STALE_ETAG';
        err.url = url;
        throw err;
      }
      if (!res.ok || data.error) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.url = url;
        throw err;
      }
      return data;
    }

    async function saveAll() {
      saving.value = true;
      saveMsg.value = '';
      saveErr.value = false;
      try {
        // Detect model change before saving
        const modelChanged = _savedModel && (
          conf.MODEL !== _savedModel ||
          conf.SECONDARY_MODEL !== _savedSecondary ||
          String(conf.DUAL_MODEL_ENABLED) !== String(_savedDual)
        );

        // Build the list of save operations. Each one is a labelled
        // function so we can report which sub-save failed.
        const ops = [
          ['settings', () => _postJson(
            API + '/settings',
            { updates: { ...conf } },
            _settingsEtag ? { 'If-Match': _settingsEtag } : {}
          )],
          ['audio',    () => saveAudioConf()],
          ['adaptive-gain', () => saveAgConf()],
          ['apprise',  () => _postJson(API + '/apprise', { urls: appriseUrls.value })],
          ['species-include', () => _postJson(API + '/species-lists',
              { list: 'include', species: includeList.value.split('\n').map(s => s.trim()).filter(Boolean) })],
          ['species-exclude', () => _postJson(API + '/species-lists',
              { list: 'exclude', species: excludeList.value.split('\n').map(s => s.trim()).filter(Boolean) })],
          ['alerts',   () => saveAlertThresholds()],
        ];

        const results = await Promise.allSettled(ops.map(([, fn]) => fn()));
        const failures = [];
        results.forEach((r, i) => {
          if (r.status === 'rejected') {
            failures.push(`${ops[i][0]}: ${r.reason && r.reason.message ? r.reason.message : r.reason}`);
          }
        });

        if (failures.length > 0) {
          saveMsg.value = (t('set_save_partial') || 'Some settings failed to save') + ': ' + failures.join('; ');
          saveErr.value = true;
          // Reload from server to make the UI reflect what's actually persisted.
          await reload().catch(() => {});
          return;
        }

        // All saves succeeded — pull the canonical state back from the
        // server so the UI never lies about what's persisted.
        BIRDASH.updateSiteIdentity(conf.SITE_NAME, conf.SITE_BRAND);
        await reload().catch(() => {});
        _snapshotSavedState();
        // Tell the shell header to refresh its model badge / site name.
        window.dispatchEvent(new Event('birdash:settings-changed'));

        if (modelChanged) {
          saveMsg.value = t('set_model_restarting') || 'Model changed — restarting engine...';
          try {
            await fetch(API + '/services/restart', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ service: 'birdengine' }) });
            await new Promise(r => setTimeout(r, 3000));
            const healthResp = await fetch(API + '/health');
            const health = await healthResp.json();
            if (health.status === 'ok') {
              saveMsg.value = (t('set_model_changed') || 'Model changed successfully') +
                ' — ' + conf.MODEL + (conf.DUAL_MODEL_ENABLED === '1' || conf.DUAL_MODEL_ENABLED === 1 ? ' + ' + conf.SECONDARY_MODEL : '');
              window.dispatchEvent(new CustomEvent('birdash:success', { detail: saveMsg.value }));
            } else {
              saveMsg.value = t('set_model_restart_warning') || 'Model saved but engine may need manual restart';
              saveErr.value = true;
            }
          } catch(e) {
            saveMsg.value = (t('set_model_restart_error') || 'Model saved but engine restart failed') + ': ' + e.message;
            saveErr.value = true;
          }
        } else {
          saveMsg.value = t('set_saved');
        }
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      saving.value = false;
    }

    // ── Dirty tracking — the Save button shows a • when conf has changed
    // since the last successful save. Lets users see at a glance whether
    // there's something to persist (and stops them from second-guessing
    // whether the previous save took effect).
    let _savedSnapshot = null;
    let _savedAudioSnapshot = null;
    let _savedAgSnapshot = null;
    function _snapshotSavedState() {
      try { _savedSnapshot = JSON.stringify(conf); } catch { _savedSnapshot = null; }
      try { _savedAudioSnapshot = JSON.stringify(audioConf); } catch { _savedAudioSnapshot = null; }
      try { _savedAgSnapshot = JSON.stringify(agConf); } catch { _savedAgSnapshot = null; }
      _savedModel = conf.MODEL;
      _savedSecondary = conf.SECONDARY_MODEL;
      _savedDual = String(conf.DUAL_MODEL_ENABLED);
    }
    const isDirty = computed(() => {
      if (!_savedSnapshot) return false;
      try {
        if (JSON.stringify(conf) !== _savedSnapshot) return true;
        if (_savedAudioSnapshot && JSON.stringify(audioConf) !== _savedAudioSnapshot) return true;
        if (_savedAgSnapshot && JSON.stringify(agConf) !== _savedAgSnapshot) return true;
        return false;
      } catch { return false; }
    });

    function resetDefaults() {
      if (!confirm(t('set_defaults_confirm'))) return;
      // Detection defaults — applied to the in-memory form only.
      // The user must click Save to persist; the message reflects this
      // honestly instead of pretending the change is already on disk.
      conf.BIRDNET_CONFIDENCE = 0.65;
      conf.PERCH_CONFIDENCE = 0.15;
      conf.PERCH_MIN_MARGIN = 0.05;
      conf.SENSITIVITY = 1.3;
      conf.OVERLAP = 0.5;
      conf.SF_THRESH = 0.03;
      conf.CONFIDENCE = 0.65;
      conf.RECORDING_LENGTH = 45;
      conf.EXTRACTION_LENGTH = 6;
      conf.AUDIOFMT = 'mp3';
      conf.CHANNELS = 1;
      saveMsg.value = t('set_defaults_applied_unsaved') || (t('set_defaults_applied') + ' — ' + (t('set_click_save_to_persist') || 'click Save to persist'));
      saveErr.value = false;
    }

    async function restartService(name) {
      const svc = services.value.find(s => s.name === name);
      if (svc) svc.restarting = true;
      try {
        await fetch(API + '/services/restart', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ service: name }),
        });
      } catch(e) { console.error(e); }
      setTimeout(loadServices, 1500);
    }

    async function saveSpeciesLists() {
      savingLists.value = true;
      try {
        const inc = includeList.value.split('\n').map(l => l.trim()).filter(Boolean);
        const exc = excludeList.value.split('\n').map(l => l.trim()).filter(Boolean);
        const results = await Promise.allSettled([
          _postJson(API + '/species-lists', { list: 'include', species: inc }),
          _postJson(API + '/species-lists', { list: 'exclude', species: exc }),
        ]);
        const failures = results
          .map((r, i) => r.status === 'rejected' ? `${i ? 'exclude' : 'include'}: ${r.reason.message}` : null)
          .filter(Boolean);
        if (failures.length) {
          saveMsg.value = 'species lists: ' + failures.join('; ');
          saveErr.value = true;
        }
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      savingLists.value = false;
    }

      if (!helpKey.value) return '';

    // ── Audio config ──────────────────────────────────────────────────────────
    const terminalKey = ref(0);

    // ── Generic JSON config loader ─────────────────────────────────────────
    function useJsonConfig(endpoint, defaults) {
      const data = reactive({ ...defaults });
      const loadOk = ref(false);
      async function load() {
        try {
          const r = await fetch(BIRD_CONFIG.apiUrl + endpoint);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          Object.assign(data, await r.json());
          loadOk.value = true;
        } catch (e) {
          console.error('Failed to load ' + endpoint + ':', e);
          loadOk.value = false;
        }
      }
      // save() throws on any failure path (load never succeeded, network
      // error, non-2xx response, or {error} body). Previously it returned
      // a fake "ok" if loadOk was false, which let saveAll report success
      // without ever talking to the server — a major source of "saved
      // but reverted" reports.
      async function save() {
        if (!loadOk.value) {
          throw new Error(endpoint + ': initial load failed, refusing to save stale state');
        }
        const r = await fetch(BIRD_CONFIG.apiUrl + endpoint, {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify(data),
        });
        let body = null;
        try { body = await r.json(); } catch {}
        if (!r.ok) {
          throw new Error((body && body.error) || (endpoint + ': HTTP ' + r.status));
        }
        if (body && body.error) throw new Error(body.error);
        return body;
      }
      return { data, loadOk, load, save };
    }

    // ── Adaptive gain ──────────────────────────────────────────────────────
    const { data: agConf, loadOk: agLoadOk, load: loadAgConf, save: saveAgConf } = useJsonConfig(

    );

    async function loadAgState() {

        agState.value = data.state;

    // ── Database explorer ──────────────────────────────────────────
    const dbTables = ref([]);
    const dbSelectedTable = ref('');
    const dbSchema = ref([]);
    const dbSql = ref('SELECT Date, Time, Com_Name, Sci_Name, round(Confidence,2) as Conf, Model FROM detections ORDER BY Date DESC, Time DESC LIMIT 50');
    const dbColumns = ref([]);
    const dbRows = ref([]);
    const dbLoading = ref(false);
    const dbError = ref('');
    const dbExecTime = ref(0);

    const dbSqlWarning = computed(() => {
      const sql = (dbSql.value || '').trim();
      if (!sql) return '';
      const stripped = sql.replace(/'[^']*'/g, '').replace(/"[^"]*"/g, '');
      if (!/^\s*(SELECT|PRAGMA|WITH)\s/i.test(sql))
        return 'Seules les requêtes SELECT, PRAGMA et WITH sont autorisées.';
      if (/\b(DROP|DELETE|INSERT|UPDATE|CREATE|ALTER|ATTACH|DETACH)\b/i.test(stripped))
        return 'Requête bloquée : opération d\'écriture détectée (DROP, DELETE, INSERT, UPDATE, CREATE, ALTER).';
      if (/;/.test(stripped))
        return 'Les requêtes multiples (;) ne sont pas autorisées.';
      if (sql.length > 4000)
        return 'Requête trop longue (max 4000 caractères).';
      return '';
    });

    async function dbQuery(sql) {
      const resp = await fetch(BIRD_CONFIG.apiUrl + '/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      return resp.json();
    }

    async function dbLoadTables() {
      try {
        const data = await dbQuery("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name");
        const tables = [];
        for (const row of data.rows || []) {
          const name = Array.isArray(row) ? row[0] : row.name;
          const countData = await dbQuery(`SELECT COUNT(*) as n FROM "${name}"`);
          const count = Array.isArray(countData.rows?.[0]) ? countData.rows[0][0] : countData.rows?.[0]?.n || 0;
          tables.push({ name, count });
        }
        dbTables.value = tables;
      } catch (e) { console.error('dbLoadTables:', e); }
    }

    async function dbSelectTable(name) {
      dbSelectedTable.value = name;
      try {

    async function runFilterPreview() {
      filterPreviewing.value = true;
      filterPreview.value = null;
      filterPreviewErr.value = '';
      filterPreviewProgress.value = 0;
      filterPreviewPhase.value = 'fp_phase_recording';

      // Phased progress estimate for a Pi 3 (~25-30s end-to-end).
      // Each phase has a target %, start-time (seconds), and i18n key.
      // Progress is advanced by a 150ms timer, capped at 90% until the
      // real response arrives, then snapped to 100%.
      const started = Date.now();
      const phases = [
        { at: 0,    pct: 0,   key: 'fp_phase_recording' },
        { at: 3,    pct: 15,  key: 'fp_phase_loading' },
        { at: 6,    pct: 30,  key: 'fp_phase_filtering' },
        { at: 10,   pct: 50,  key: 'fp_phase_rendering' },
        { at: 25,   pct: 88,  key: 'fp_phase_finalizing' },
        { at: 40,   pct: 90,  key: 'fp_phase_finalizing' },
      ];
      const tick = setInterval(() => {
        const elapsed = (Date.now() - started) / 1000;
        // Find the current phase + next phase and linearly interpolate.
        let current = phases[0], next = phases[1];
        for (let i = 0; i < phases.length - 1; i++) {
          if (elapsed >= phases[i].at && elapsed < phases[i + 1].at) {
            current = phases[i]; next = phases[i + 1]; break;
          }
          if (elapsed >= phases[phases.length - 1].at) {
            current = phases[phases.length - 1]; next = current;
          }
        }
        const span = Math.max(0.001, next.at - current.at);
        const frac = Math.min(1, Math.max(0, (elapsed - current.at) / span));
        filterPreviewProgress.value = Math.min(90, Math.round(current.pct + (next.pct - current.pct) * frac));
        filterPreviewPhase.value = current.key;
      }, 150);

    const soundLevel = reactive({

    });
    let _soundLevelTimer = null;
    async function loadSoundLevel() {
      try {
        const d = await fetch(API + '/sound-level').then(r => r.json());
        if (!d.available) { soundLevel.available = false; return; }
        soundLevel.available = true;
        soundLevel.leq = d.current?.leq ?? null;
        soundLevel.peak = d.current?.peak ?? null;
        soundLevel.avg1h = typeof d.avg_1h_dbfs === 'number' ? d.avg_1h_dbfs : null;
        soundLevel.ageSec = d.age_seconds;
        // Sparkline: last 60 points, map dBFS [-90..0] to SVG y [38..2]
        const buf = (d.buffer || []).slice(-60);
        if (buf.length >= 2) {
          const w = 200, h = 40;
          const yFor = (v) => {
            const clipped = Math.max(-90, Math.min(0, v));
            return 2 + (h - 4) * (1 - (clipped + 90) / 90);
          };
          const step = w / (buf.length - 1);
          soundLevel.sparkPath = buf.map((e, i) => `${i === 0 ? 'M' : 'L'}${(i * step).toFixed(1)} ${yFor(e.leq).toFixed(1)}`).join(' ');
        } else {
          soundLevel.sparkPath = '';
        }
      } catch {
        soundLevel.available = false;
      }
    }

      telemetryName.value = d.stationName || '';
    }).catch(() => {}).finally(() => { telemetryLoading.value = false; });

    async function enableTelemetry() {
      telemetryJoining.value = true;
      try {
        const res = await fetch(`${API}/telemetry/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ stationName: telemetryName.value.trim() })
        });
        const d = await res.json();
        if (d.ok) {
          telemetryStatus.enabled = true;
          telemetryStatus.stationId = d.stationId;
          telemetryStatus.stationName = telemetryName.value.trim();
        }
      } catch(e) { console.error(e); }
      telemetryJoining.value = false;
    }
    async function disableTelemetry() {
      await fetch(`${API}/telemetry/disable`, { method: 'POST' });
      telemetryStatus.enabled = false;
    }

    // Anonymous usage pings (opt-out)
    const anonPingsEnabled = ref(true);
    fetch(`${API}/telemetry/anonymous-pings`).then(r => r.json()).then(d => {
      anonPingsEnabled.value = d.enabled !== false;
    }).catch(() => {});

    async function toggleAnonPings(enabled) {
      anonPingsEnabled.value = enabled;
      try {
        await fetch(`${API}/telemetry/anonymous-pings`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled })
        });
      } catch(e) { console.error(e); }
    }

    // Trigger for the shell-level power modal (icon in header).
    // We keep a "Manage power…" button in Settings → Station as a
    // second discoverable entry point.
    function openPower() { window.BIRDASH && window.BIRDASH.openPower && window.BIRDASH.openPower(); }

    // ── External display (PiTFT 3.5") ──────────────────────────────
    const tftStatus = reactive({
      ready: false,
      hatDetected: false, hatProduct: '',
      spiEnabled: false, fbExists: false,
      overlayInConfig: false, overlayLine: '',
      service: { active: false, enabled: false, ramMB: null, pid: null },
      config: { enabled: false, rotation: 90, refreshSec: 3, mode: 'pulse', cycleSec: 60, cycleModes: ['headline','leaderboard','ambient'] },
      sudoReady: false,
    });
    const tftInstalling = ref(false);
    const tftInstallMsg = ref('');
    const tftInstallErr = ref('');
    const tftInstallCmds = ref([]);  // shown when sudo is not configured
    const tftSaving = ref(false);
    const tftConfirmInstall = ref(false);

    async function loadTftStatus() {
      try {
        const r = await fetch(API + '/tft-display/status');
        if (r.ok) Object.assign(tftStatus, await r.json());
      } catch {}
    }
    async function saveTftConfig() {
      tftSaving.value = true;
      try {
        await fetch(API + '/tft-display/config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify(tftStatus.config),
        });
      } catch {} finally { tftSaving.value = false; }
    }
    async function runTftInstall() {
      tftConfirmInstall.value = false;
      tftInstalling.value = true;
      tftInstallMsg.value = '';
      tftInstallErr.value = '';
      tftInstallCmds.value = [];
      try {
        const r = await fetch(API + '/tft-display/install', {
          method: 'POST', headers: authHeaders(),
        });
        if (r.ok) {
          tftInstallMsg.value = t('tft_install_running');
          // Poll status for ~30s to see when it completes
          for (let i = 0; i < 15; i++) {
            await new Promise(rs => setTimeout(rs, 2000));
            await loadTftStatus();
          }
          tftInstallMsg.value = t('tft_install_done');
        } else if (r.status === 501) {
          const d = await r.json();
          tftInstallCmds.value = d.manualCommands || [];
          tftInstallErr.value = d.error || '';
        } else {
          tftInstallErr.value = 'HTTP ' + r.status;
        }
      } catch (e) { tftInstallErr.value = e.message; }
      finally { tftInstalling.value = false; }
    }
    async function tftServiceAction(action) {
      try {
        await fetch(API + '/tft-display/service', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ action }),
        });
        setTimeout(loadTftStatus, 500);
      } catch {}
    }
    // Auto-load when the tab opens (and refresh every 5s while on it)
    let _tftPollTimer = null;
    watch(() => activeTab.value, (v) => {
      if (_tftPollTimer) { clearInterval(_tftPollTimer); _tftPollTimer = null; }
      if (v === 'external-display') {
        loadTftStatus();
        _tftPollTimer = setInterval(loadTftStatus, 5000);
      }
      // Sound-level poll only while on the audio tab
      if (v === 'audio') startSoundLevelPoll();
      else stopSoundLevelPoll();
    });

    // ── Provide context to lazy-loaded tab components ──────────────

      audioConf, audioDevices, audioProfiles, audioSubTab, audioSubTabs,

      appriseUrls, savingApprise, testingApprise, appriseMsg, appriseErr, saveApprise, testApprise,

      modelLabel, modelDescription, secondaryModelOptions,

      notifGlobalEnabled, toggleNotifGlobal, saveNotifSettings, notifSaveMsg, notifSaveErr, terminalKey,
      digestPreview, digestSendNow, digestMsg, digestErr, digestPreviewText,
      mqttMinConfPct, testingMqtt, mqttMsg, mqttErr, testMqtt,
      authUser, authCurrentPw, authNewPw, authNewPw2, authSaving, authMsg, authErr, authConfigured, saveAuthCreds,
      rangePreview, onRangePreviewDebounced,
      agConf, agState, loadAgState,
      dbTables, dbSelectedTable, dbSchema, dbSql, dbSqlWarning, dbColumns, dbRows, dbLoading, dbError, dbExecTime,
      dbLoadTables, dbSelectTable, dbExec,
      saveAll, resetDefaults, restartService, saveSpeciesLists, isDirty,
      helpKey, helpTitle, helpBody,
      bkp, backupDests, savingBkp, runningBkp, bkpProgress,
      toggleBackupContent, saveBackupConfig, runBackup,
      bkpStepLabel, bkpElapsed, pollBackupProgress,
      pauseBackup, stopBackup, fmtSize, fmtDateTimeFull,
      bkpSchedule, bkpHistory,
      tabComponents,
      telemetryStatus, telemetryLoading, telemetryName, telemetryJoining, enableTelemetry, disableTelemetry,
      anonPingsEnabled, toggleAnonPings,
      openPower,
      tftStatus, tftInstalling, tftInstallMsg, tftInstallErr, tftInstallCmds,

      // Region & units prefs — reactive refs, watchers persist to localStorage.
      // Note: these don't participate in isDirty/saveAll; they take effect

      dateFormatPref: fmt.dateFormat, weekStartPref: fmt.weekStart,
      effUnits: fmt.effUnits, effTimeFormat: fmt.effTimeFormat,
      effDateFormat: fmt.effDateFormat, effWeekStart: fmt.effWeekStart,
    };
    // ── Station map (Leaflet) ──────────────────────────────────────
    let _stationMap = null, _stationMarker = null, _leafletLoaded = false;

    function _loadLeaflet() {
      if (_leafletLoaded) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        script.onload = () => { _leafletLoaded = true; resolve(); };
        script.onerror = (e) => reject(new Error('Leaflet script failed to load from unpkg.com (network blocked?)'));
        document.head.appendChild(script);
      });
    }

    function _waitForElement(id, timeoutMs = 15000) {
      return new Promise((resolve) => {
        const existing = document.getElementById(id);
        if (existing) return resolve(existing);
        const obs = new MutationObserver(() => {
          const el = document.getElementById(id);
          if (el) { obs.disconnect(); resolve(el); }
        });
        obs.observe(document.body, { childList: true, subtree: true });
        setTimeout(() => { obs.disconnect(); resolve(document.getElementById(id)); }, timeoutMs);
      });
    }

    async function initStationMap() {
      try { await _loadLeaflet(); } catch (e) { console.warn('[station-map] Leaflet failed to load:', e); return; }
      if (typeof L === 'undefined') { console.warn('[station-map] Leaflet global L not defined after load'); return; }
      const el = await _waitForElement('station-map');
      if (!el) { console.warn('[station-map] #station-map element never appeared after 15s'); return; }
      if (_stationMap) return;
      const lat = parseFloat(conf.LATITUDE) || 50.5;
      const lon = parseFloat(conf.LONGITUDE) || 4.5;
      _stationMap = L.map(el).setView([lat, lon], conf.LATITUDE ? 14 : 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap', maxZoom: 19
      }).addTo(_stationMap);
      _stationMarker = L.marker([lat, lon], { draggable: true }).addTo(_stationMap);
      _stationMarker.on('dragend', () => {
        const p = _stationMarker.getLatLng();
        conf.LATITUDE = p.lat.toFixed(4);
        conf.LONGITUDE = p.lng.toFixed(4);
      });
      _stationMap.on('click', (e) => {
        _stationMarker.setLatLng(e.latlng);
        conf.LATITUDE = e.latlng.lat.toFixed(4);
        conf.LONGITUDE = e.latlng.lng.toFixed(4);
      });
      // Leaflet computes tile layout from the container's current size;
      // invalidate once the layout has settled so tiles render correctly.
      setTimeout(() => _stationMap && _stationMap.invalidateSize(), 200);
    }

    function updateMapFromInputs() {
      if (!_stationMap || !_stationMarker) return;
      const lat = parseFloat(conf.LATITUDE), lon = parseFloat(conf.LONGITUDE);
      if (isFinite(lat) && isFinite(lon)) {
        _stationMarker.setLatLng([lat, lon]);
        _stationMap.setView([lat, lon], _stationMap.getZoom());
      }
    }

    function geolocateMe() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition((pos) => {
        conf.LATITUDE = pos.coords.latitude.toFixed(4);
        conf.LONGITUDE = pos.coords.longitude.toFixed(4);
        updateMapFromInputs();
      });
    }

    // Init map when station tab is opened
    const _origSwitch = switchTab;
    function switchTabWithMap(id) {
      _origSwitch(id);
      if (id === 'station') setTimeout(initStationMap, 200);
    }
    // Replace switchTab
    settingsCtx.switchTab = switchTabWithMap;
    settingsCtx.updateMapFromInputs = updateMapFromInputs;
    settingsCtx.geolocateMe = geolocateMe;

    provide('settingsCtx', settingsCtx);

    return {
      t, lang, safeHtml, conf, models, analysisStatus, languages, services,
      tabs, activeTab, switchTab: switchTabWithMap,
      tabComponents,
      // Audio
      audioConf, audioDevices, audioProfiles, audioSubTab, audioSubTabs,
      channelStrategies,
      filterPreviewing, filterPreview, filterPreviewErr, runFilterPreview,
      filterPreviewProgress, filterPreviewPhase,
      noiseProfileStatus, noiseProfileRecording, recordNoiseProfile, deleteNoiseProfile,
      calRunning, calResult, calExpired,
      audioMonitoring, monitorLevels, audioTesting, audioTestImg,
      loadAudioDevices, selectAudioDevice, activateAudioProfile,
      duplicateAudioProfile, deleteAudioProfile,
      boostState, saveBoostDb, loadBoost,

      startMonitor, stopMonitor, testAudio,

      notifGlobalEnabled, toggleNotifGlobal, saveNotifSettings, notifSaveMsg, notifSaveErr, terminalKey,
      digestPreview, digestSendNow, digestMsg, digestErr, digestPreviewText,
      mqttMinConfPct, testingMqtt, mqttMsg, mqttErr, testMqtt,
      authUser, authCurrentPw, authNewPw, authNewPw2, authSaving, authMsg, authErr, authConfigured, saveAuthCreds,
      rangePreview, onRangePreviewDebounced,
      agConf, agState, loadAgState,
      dbTables, dbSelectedTable, dbSchema, dbSql, dbSqlWarning, dbColumns, dbRows, dbLoading, dbError, dbExecTime,
      dbLoadTables, dbSelectTable, dbExec,
      saveAll, resetDefaults, restartService, saveSpeciesLists, isDirty,
      helpKey, helpTitle, helpBody,
      bkp, backupDests, savingBkp, runningBkp, bkpProgress,
      toggleBackupContent, saveBackupConfig, runBackup,
      bkpStepLabel, bkpElapsed, pollBackupProgress,
      pauseBackup, stopBackup, fmtSize, fmtDateTimeFull,
      bkpSchedule, bkpHistory,
      telemetryStatus, telemetryLoading, telemetryName, telemetryJoining, enableTelemetry, disableTelemetry,
      anonPingsEnabled, toggleAnonPings,
      openPower,
      tftStatus, tftInstalling, tftInstallMsg, tftInstallErr, tftInstallCmds,
      tftSaving, tftConfirmInstall, loadTftStatus, saveTftConfig, runTftInstall, tftServiceAction,
      // Region & units prefs (reactive refs, watchers persist to localStorage)
      unitsPref: fmt.units, timeFormatPref: fmt.timeFormat,
      dateFormatPref: fmt.dateFormat, weekStartPref: fmt.weekStart,
      effUnits: fmt.effUnits, effTimeFormat: fmt.effTimeFormat,
      effDateFormat: fmt.effDateFormat, effWeekStart: fmt.effWeekStart,
    };
  }
});
BIRDASH.ready.then(() => registerComponents(app).mount('#app'));
