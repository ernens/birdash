<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <title>BirdStation — Configuration</title>
  <meta property="og:title" content="BirdStation — Settings">
  <meta property="og:description" content="Bird detection dashboard — Heinsch, Belgium">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js" integrity="sha384-wdamyDHEiblYHsu/XTokGtIeFekZu7xN37Yvkl0NZ7PnhwRB+nwE1ByT7VlwiypE" crossorigin="anonymous"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <style>
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:768px) { .settings-grid { grid-template-columns:1fr; } }
    .set-row { display:grid; grid-template-columns:minmax(140px,auto) 2fr auto; align-items:center; gap:.6rem; padding:.6rem 0; }
    .set-label { font-weight:500; font-size:.85rem; color:var(--text-secondary); white-space:nowrap; }
    .set-input { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.45rem .7rem; color:var(--text); font-size:.9rem; max-width:240px; box-sizing:border-box; justify-self:end; }
    .set-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(90,158,58,.2); }
    .set-select { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.45rem .7rem; color:var(--text); font-size:.9rem; max-width:240px; cursor:pointer; box-sizing:border-box; justify-self:end; }
    .set-range { width:100%; min-width:240px; height:6px; accent-color:var(--accent); }
    .set-range-val { font-size:.85rem; font-weight:600; color:var(--accent); min-width:2.5rem; text-align:right; white-space:nowrap; }
    .set-check { display:flex; align-items:center; gap:.5rem; cursor:pointer; }
    .set-check input { accent-color:var(--accent); width:18px; height:18px; }
    .model-card { padding:.8rem; border-radius:8px; border:2px solid var(--border); cursor:pointer; transition:all .2s; }
    .model-card:hover { border-color:var(--accent); }
    .model-card.active { border-color:var(--accent); background:rgba(90,158,58,.08); }
    .model-name { font-weight:700; font-size:1rem; }
    .model-desc { font-size:.82rem; color:var(--text-secondary); margin-top:.3rem; }
    .model-badge { display:inline-block; padding:.15rem .5rem; border-radius:4px; font-size:.75rem; font-weight:600; margin-left:.5rem; }
    .badge-recommended { background:rgba(90,158,58,.15); color:var(--accent); }
    .badge-advanced { background:rgba(200,168,75,.15); color:#c8a84b; }
    .badge-experimental { background:rgba(168,92,58,.15); color:#a85c3a; }
    .save-bar { position:sticky; bottom:0; background:var(--bg-body); padding:1rem 0; border-top:1px solid var(--border); display:flex; gap:1rem; align-items:center; flex-wrap:wrap; z-index:10; }
    .btn-save { background:var(--accent); color:var(--on-accent); border:none; border-radius:8px; padding:.7rem 2rem; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn-save:hover { opacity:.9; }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; }
    .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:8px; padding:.7rem 1.5rem; font-size:.9rem; cursor:pointer; }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
    .save-msg { font-size:.9rem; padding:.4rem .8rem; border-radius:6px; }
    .save-ok { background:rgba(90,158,58,.12); color:var(--accent); }
    .save-err { background:rgba(200,60,60,.12); color:#c84b4b; }
    .svc-row { display:flex; align-items:center; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); }
    .svc-row:last-child { border-bottom:none; }
    .svc-name { font-family:monospace; font-size:.88rem; }
    .svc-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:.5rem; }
    .svc-active { background:var(--success); }
    .svc-inactive { background:var(--danger); }
    .svc-btn { background:transparent; border:1px solid var(--border); border-radius:5px; padding:.3rem .7rem; font-size:.8rem; cursor:pointer; color:var(--text-secondary); }
    .svc-btn:hover { border-color:var(--accent); color:var(--accent); }
    .section-title { font-size:1.1rem; font-weight:700; margin-bottom:.8rem; display:flex; align-items:center; gap:.5rem; }
    textarea.set-textarea { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.5rem; color:var(--text); font-size:.85rem; font-family:monospace; width:100%; min-height:120px; resize:vertical; }
    textarea.set-textarea:focus { outline:none; border-color:var(--accent); }
    /* Info badge & modal */
    .info-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:18px; height:18px; border-radius:50%; border:1.5px solid var(--accent);
      color:var(--accent); font-size:.7rem; font-weight:700; font-style:italic;
      cursor:pointer; flex-shrink:0; margin-left:.4rem;
      font-family:Georgia,serif; line-height:1; transition:all .15s;
      background:transparent; padding:0;
    }
    .info-btn:hover { background:var(--accent); color:var(--on-accent); }
    .info-overlay {
      position:fixed; inset:0; z-index:1000;
      background:var(--overlay-scrim); display:none; align-items:center; justify-content:center;
      padding:1rem; animation:fadeIn .15s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .info-modal {
      background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
      max-width:480px; width:100%; padding:1.5rem; box-shadow:0 8px 32px rgba(0,0,0,.25);
      position:relative; max-height:80vh; overflow-y:auto;
    }
    .info-modal-title {
      font-size:1rem; font-weight:700; color:var(--accent); margin-bottom:.75rem;
      display:flex; align-items:center; gap:.5rem;
    }
    .info-modal-body { font-size:.88rem; line-height:1.6; color:var(--text-main); }
    .info-modal-body strong { color:var(--accent); }
    .info-modal-body code {
      background:var(--bg-deep); padding:.1rem .35rem; border-radius:3px;
      font-size:.82rem; font-family:monospace;
    }
    .info-modal-close {
      position:absolute; top:.75rem; right:.75rem; background:none; border:none;
      font-size:1.2rem; cursor:pointer; color:var(--text-muted); padding:.25rem;
      line-height:1;
    }
    .info-modal-close:hover { color:var(--text-main); }
    .info-rec { margin-top:.6rem; padding:.5rem .7rem; border-radius:6px;
      background:color-mix(in srgb,var(--accent) 8%,transparent);
      border-left:3px solid var(--accent); font-size:.82rem; }
    /* Backup state badges */
    .bkp-state-badge { font-size:.72rem; padding:.15rem .45rem; border-radius:10px;
      font-weight:600; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; }
    .bkp-running { background:color-mix(in srgb,var(--accent) 15%,transparent); color:var(--accent);
      animation:bkp-pulse 1.5s ease-in-out infinite; }
    .bkp-completed { background:color-mix(in srgb,var(--accent) 15%,transparent); color:var(--accent); }
    .bkp-failed { background:color-mix(in srgb,var(--danger) 15%,transparent); color:var(--danger); }
    .bkp-stopped { background:color-mix(in srgb,var(--warning,#c8a84b) 15%,transparent); color:var(--warning,#c8a84b); }
    .bkp-paused { background:color-mix(in srgb,var(--warning,#c8a84b) 15%,transparent); color:var(--warning,#c8a84b); }
    @keyframes bkp-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    /* Tab navigation (same as system.html) */
    .set-tabs{display:flex;gap:.25rem;padding:.25rem;background:var(--bg-card2);border-radius:.5rem;margin-bottom:1.25rem;overflow-x:auto;}
    .set-tab-btn{display:flex;align-items:center;gap:.35rem;padding:.5rem .9rem;border:none;background:transparent;color:var(--text-muted);font-size:.82rem;font-family:inherit;cursor:pointer;border-radius:.4rem;transition:all .2s;white-space:nowrap;}
    .set-tab-btn:hover{background:var(--bg-card);color:var(--text-main);}
    .set-tab-btn.active{background:var(--bg-card);color:var(--accent);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12);}
    .set-tab-icon{font-size:1rem;}
    .set-tab-label{font-size:.78rem;}
  </style>
</head>
<body>
<div id="app">
  <birdash-shell page="settings" :title="t('nav_settings')">

    <!-- Info modal -->
    <div v-show="helpKey" class="info-overlay" @click.self="helpKey=null" :style="{display: helpKey ? 'flex' : 'none'}">
      <div class="info-modal">
        <button class="info-modal-close" @click="helpKey=null">&times;</button>
        <div class="info-modal-title">ⓘ {{helpTitle}}</div>
        <div class="info-modal-body" v-html="safeHtml(helpBody)"></div>
      </div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="display:flex;justify-content:center;padding:3rem;">
      <div class="spinner"><div></div><div></div><div></div></div>
    </div>

    <template v-else>

      <!-- ── Tab Navigation ──────────────────────────────────────── -->
      <div class="set-tabs">
        <button v-for="tab in tabs" :key="tab.id"
                class="set-tab-btn" :class="{active: activeTab === tab.id}"
                @click="switchTab(tab.id)">
          <span class="set-tab-icon"><bird-icon :name="tab.icon" :size="16" ></bird-icon></span>
          <span class="set-tab-label">{{tab.label || t(tab.labelKey)}}</span>
        </button>
      </div>

      <!-- ══ Lazy-loaded tab content ═════════════════════════════════ -->
      <keep-alive>
        <component :is="tabComponents[activeTab]" :key="activeTab"></component>
      </keep-alive>


      <!-- ═══ Save bar ═══ -->
      <div class="save-bar">
        <button class="btn-save" @click="saveAll" :disabled="saving">
          {{saving ? '...' : t('set_save')}}
        </button>
        <button class="btn-outline" @click="resetDefaults">{{t('set_defaults')}}</button>
        <span v-if="saveMsg" class="save-msg" :class="saveErr ? 'save-err' : 'save-ok'">{{saveMsg}}</span>
      </div>

    </template>
  </birdash-shell>
</div>
<script>
const { createApp, ref, reactive, onMounted, computed, defineAsyncComponent, provide, inject } = Vue;
const { useI18n, registerComponents, safeHtml, authHeaders } = BIRDASH;

const app = createApp({
  setup() {
    const { lang, t } = useI18n();
    const API = BIRD_CONFIG.apiUrl;

    const conf = reactive({});
    const models = ref([]);
    const analysisStatus = ref(null);
    const languages = ref([]);
    const services = ref([]);
    const loading = ref(true);

    // ── Tab navigation ──────────────────────────────────────────
    const tabs = [
      { id: 'detection', icon: 'cpu', labelKey: 'set_tab_detection' },
      { id: 'audio',     icon: 'mic', labelKey: 'set_tab_audio' },
      { id: 'notif',     icon: 'bell', labelKey: 'set_tab_notif' },
      { id: 'station',   icon: 'map-pin', labelKey: 'set_tab_station' },
      { id: 'services',  icon: 'wrench', labelKey: 'set_tab_services' },
      { id: 'species',   icon: 'list', labelKey: 'set_tab_species' },
      { id: 'backup',    icon: 'save', labelKey: 'set_tab_backup' },
      { id: 'database',  icon: 'database', labelKey: 'set_tab_database' },
      { id: 'terminal',  icon: 'terminal', labelKey: 'set_tab_terminal' },
        { id: 'monitoring', icon: 'monitor', labelKey: 'nav_system', href: 'system.html' },
    ];
    const hashTab = location.hash.slice(1);
    const localTabs = ['detection', 'audio', 'notif', 'station', 'services', 'species', 'backup', 'database', 'terminal'];
    // Migrate old key
    if (localStorage.getItem('birdash-settings-tab') && !localStorage.getItem('birdash_settings_tab')) {
      localStorage.setItem('birdash_settings_tab', localStorage.getItem('birdash-settings-tab'));
      localStorage.removeItem('birdash-settings-tab');
    }
    const activeTab = ref(
      localTabs.includes(hashTab) ? hashTab :
      localStorage.getItem('birdash_settings_tab') || 'detection'
    );

    function switchTab(id) {
      const tab = tabs.find(t => t.id === id);
      if (tab && tab.href) {
        window.location.href = tab.href;
        return;
      }
      activeTab.value = id;
      localStorage.setItem('birdash_settings_tab', id);
      history.replaceState(null, '', '#' + id);
    }
    const saving = ref(false);
    const birdnetLicenseAccepted = ref(false);
    const birdnetDownloading = ref(false);
    async function downloadBirdnet() {
      birdnetDownloading.value = true;
      try {
        const resp = await fetch(BIRD_CONFIG.apiUrl + '/download-birdnet', { method: 'POST', headers: BIRDASH.authHeaders() });
        const data = await resp.json();
        if (data.ok) {
          window.dispatchEvent(new CustomEvent('birdash:success', { detail: data.message || 'BirdNET download started' }));
          // Reload models list after a delay
          setTimeout(() => reload(), 30000);
        } else {
          window.dispatchEvent(new CustomEvent('birdash:error', { detail: data.error || 'Download failed' }));
        }
      } catch(e) {
        window.dispatchEvent(new CustomEvent('birdash:error', { detail: e.message }));
      }
      birdnetDownloading.value = false;
    }
    const svcLoading = ref(true);
    const saveMsg = ref('');
    const saveErr = ref(false);
    const includeList = ref('');
    const excludeList = ref('');
    const savingLists = ref(false);

    // ── Apprise notification URLs ──────────────────────────────
    const appriseUrls    = ref('');
    const savingApprise  = ref(false);
    const testingApprise = ref(false);
    const appriseMsg     = ref('');
    const appriseErr     = ref(false);

    async function loadApprise() {
      try {
        const res = await fetch(API + '/apprise');
        const data = await res.json();
        appriseUrls.value = data.urls || '';
      } catch(e) {}
    }

    async function saveApprise() {
      savingApprise.value = true;
      appriseMsg.value = '';
      try {
        const res = await fetch(API + '/apprise', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ urls: appriseUrls.value }),
        });
        const data = await res.json();
        if (data.ok) { appriseMsg.value = '✓'; appriseErr.value = false; }
        else { appriseMsg.value = data.error; appriseErr.value = true; }
      } catch(e) { appriseMsg.value = e.message; appriseErr.value = true; }
      savingApprise.value = false;
    }

    // ── Alert thresholds ─────────────────────────────────────
    const { data: alertThresholds, loadOk: alertsLoadOk, load: loadAlertThresholds } = useJsonConfig(
      '/alert-thresholds',
      { temp_warn:70, temp_crit:80, disk_warn:85, disk_crit:95, ram_warn:90, backlog_warn:50, no_detection_hours:4, service_down:1,
        alert_temp:1, alert_temp_crit:1, alert_disk:1, alert_ram:1, alert_backlog:1, alert_no_det:1,
        alert_influx:0, alert_missing:0, alert_rare_visitor:0 }
    );
    const savingAlerts = ref(false);
    const alertSaveMsg = ref('');
    const alertSaveErr = ref(false);

    async function saveAlertThresholds() {
      if (!alertsLoadOk.value) return;
      savingAlerts.value = true;
      alertSaveMsg.value = '';
      try {
        // Save bird notification event toggles + system alert thresholds
        const updates = {
          APPRISE_NOTIFY_EACH_DETECTION: String(conf.APPRISE_NOTIFY_EACH_DETECTION || 0),
          APPRISE_NOTIFY_NEW_SPECIES: String(conf.APPRISE_NOTIFY_NEW_SPECIES || 0),
          NOTIFY_FAVORITES: String(conf.NOTIFY_FAVORITES || 0),
          APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY: String(conf.APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY || 0),
          APPRISE_WEEKLY_REPORT: String(conf.APPRISE_WEEKLY_REPORT || 0),
          APPRISE_NOTIFICATION_TITLE: conf.APPRISE_NOTIFICATION_TITLE || '',
          APPRISE_NOTIFICATION_BODY: conf.APPRISE_NOTIFICATION_BODY || '',
          APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES: String(conf.APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES || 0),
          BIRDASH_ALERT_TEMP_WARN: String(alertThresholds.temp_warn),
          BIRDASH_ALERT_TEMP_CRIT: String(alertThresholds.temp_crit),
          BIRDASH_ALERT_DISK_WARN: String(alertThresholds.disk_warn),
          BIRDASH_ALERT_DISK_CRIT: String(alertThresholds.disk_crit),
          BIRDASH_ALERT_RAM_WARN: String(alertThresholds.ram_warn),
          BIRDASH_ALERT_BACKLOG: String(alertThresholds.backlog_warn),
          BIRDASH_ALERT_NO_DET_H: String(alertThresholds.no_detection_hours),
          BIRDASH_ALERT_ON_TEMP: String(alertThresholds.alert_temp || 0),
          BIRDASH_ALERT_ON_TEMP_CRIT: String(alertThresholds.alert_temp_crit || 0),
          BIRDASH_ALERT_ON_DISK: String(alertThresholds.alert_disk || 0),
          BIRDASH_ALERT_ON_RAM: String(alertThresholds.alert_ram || 0),
          BIRDASH_ALERT_ON_BACKLOG: String(alertThresholds.alert_backlog || 0),
          BIRDASH_ALERT_ON_NO_DET: String(alertThresholds.alert_no_det || 0),
          BIRDASH_ALERT_ON_INFLUX: String(alertThresholds.alert_influx || 0),
          BIRDASH_ALERT_ON_MISSING: String(alertThresholds.alert_missing || 0),
          BIRDASH_ALERT_ON_RARE_VISITOR: String(alertThresholds.alert_rare_visitor || 0),
          BIRDASH_ALERT_ON_SVC_DOWN: String(alertThresholds.service_down || 0),
        };
        const res = await fetch(API + '/settings', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ updates }),
        });
        const data = await res.json();
        if (data.ok) { alertSaveMsg.value = '✓'; alertSaveErr.value = false; }
        else { alertSaveMsg.value = data.error || 'Error'; alertSaveErr.value = true; }
      } catch(e) { alertSaveMsg.value = e.message; alertSaveErr.value = true; }
      savingAlerts.value = false;
    }

    async function testApprise() {
      testingApprise.value = true;
      appriseMsg.value = '';
      // Save first to ensure apprise.txt is up to date
      await saveApprise();
      try {
        const res = await fetch(API + '/apprise/test', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) { appriseMsg.value = t('set_notif_test_ok'); appriseErr.value = false; }
        else { appriseMsg.value = t('set_notif_test_fail', { error: data.error || 'unknown' }); appriseErr.value = true; }
      } catch(e) { appriseMsg.value = t('set_notif_test_fail', { error: e.message }); appriseErr.value = true; }
      testingApprise.value = false;
    }

    // ── Backup configuration ──────────────────────────────────────
    const bkp = reactive({
      destination: 'local', content: ['all'], schedule: 'manual', scheduleTime: '02:00', retention: 30,
      local: { path: '/mnt/backup' },
      smb: { host: '', share: '', user: '', pass: '', remotePath: '/birdash-backup' },
      nfs: { host: '', exportPath: '', mountPoint: '/mnt/nfs-backup', remotePath: '/birdash-backup' },
      sftp: { host: '', port: 22, user: '', pass: '', remotePath: '/birdash-backup' },
      s3: { bucket: '', region: 'eu-west-1', accessKey: '', secretKey: '', remotePath: 'birdash-backup' },
      gdrive: { folderId: '' },
      webdav: { url: '', user: '', pass: '', remotePath: '/birdash-backup' },
      lastRun: null, lastStatus: null,
    });
    const savingBkp = ref(false);
    const runningBkp = ref(false);
    const bkpProgress = reactive({ state: 'idle', percent: 0, step: '', detail: '', startedAt: null, updatedAt: null });
    let _bkpPollTimer = null;

    const backupDests = [
      { value: 'local', icon: 'disc', labelKey: 'set_backup_dest_local' },
      { value: 'smb', icon: 'monitor', labelKey: 'set_backup_dest_smb' },
      { value: 'nfs', icon: 'folder', labelKey: 'set_backup_dest_nfs' },
      { value: 'sftp', icon: 'lock', labelKey: 'set_backup_dest_sftp' },
      { value: 's3', icon: 'cloud', labelKey: 'set_backup_dest_s3' },
      { value: 'gdrive', icon: '📎', labelKey: 'set_backup_dest_gdrive' },
      { value: 'webdav', icon: '🌐', labelKey: 'set_backup_dest_webdav' },
    ];

    function toggleBackupContent(type) {
      if (type === 'all') {
        bkp.content = bkp.content.includes('all') ? ['db', 'config'] : ['all'];
      } else {
        if (bkp.content.includes('all')) return;
        const idx = bkp.content.indexOf(type);
        if (idx >= 0) { bkp.content.splice(idx, 1); if (bkp.content.length === 0) bkp.content.push('db'); }
        else bkp.content.push(type);
      }
    }

    async function loadBackupConfig() {
      try {
        const data = await fetch(API + '/backup-config').then(r => r.json());
        if (data.error) return;
        Object.keys(data).forEach(k => { if (k in bkp) { if (typeof bkp[k] === 'object' && !Array.isArray(bkp[k]) && bkp[k] !== null) Object.assign(bkp[k], data[k]); else bkp[k] = data[k]; } });
      } catch(e) { console.warn('Could not load backup config:', e); }
      // Check if a backup is already running
      try {
        const prog = await fetch(API + '/backup-progress').then(r => r.json());
        if (prog.state === 'running') {
          Object.assign(bkpProgress, prog);
          runningBkp.value = true;
          startBackupPoll();
        } else if (prog.state && prog.state !== 'idle') {
          Object.assign(bkpProgress, prog);
        }
      } catch(e) { /* silent */ }
    }

    function bkpStepLabel(step) {
      const keys = { init: 'bkp_init', db: 'bkp_db', config: 'bkp_config',
        projects: 'bkp_projects', audio: 'bkp_audio', upload: 'bkp_upload', mount: 'bkp_mount', done: 'bkp_done' };
      return keys[step] ? t(keys[step]) : step || '';
    }

    const bkpElapsed = computed(() => {
      if (!bkpProgress.startedAt) return '';
      const ms = new Date(bkpProgress.updatedAt || new Date()) - new Date(bkpProgress.startedAt);
      const sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + 'min ' + (sec % 60) + 's';
      const hr = Math.floor(min / 60);
      return hr + 'h ' + (min % 60) + 'min';
    });

    async function pollBackupProgress() {
      try {
        const data = await fetch(API + '/backup-progress').then(r => r.json());
        if (data.error) return;
        Object.assign(bkpProgress, data);
        // If backup finished, refresh config to get lastRun/lastStatus
        if (data.state === 'completed' || data.state === 'failed' || data.state === 'stopped') {
          stopBackupPoll();
          runningBkp.value = false;
          await loadBackupConfig();
          loadBackupHistory();
        }
      } catch(e) { /* silent */ }
    }

    function startBackupPoll() {
      stopBackupPoll();
      _bkpPollTimer = setInterval(pollBackupProgress, 2000);
    }

    function stopBackupPoll() {
      if (_bkpPollTimer) { clearInterval(_bkpPollTimer); _bkpPollTimer = null; }
    }

    // ── Schedule & History ──────────────────────────────────────────────────
    const bkpSchedule = ref(null);
    const bkpHistory = ref([]);

    async function loadBackupSchedule() {
      try {
        const data = await fetch(API + '/backup-schedule').then(r => r.json());
        bkpSchedule.value = data.schedule || null;
      } catch(e) {}
    }

    async function loadBackupHistory() {
      try {
        const data = await fetch(API + '/backup-history').then(r => r.json());
        bkpHistory.value = (data || []).reverse(); // most recent first
      } catch(e) {}
    }

    function fmtDateTimeFull(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const pad = n => (n < 10 ? '0' : '') + n;
      return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear() +
             ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function fmtSize(bytes) {
      if (!bytes || bytes <= 0) return '0 B';
      const units = ['B', 'Ko', 'Mo', 'Go', 'To'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    async function pauseBackup() {
      try {
        const res = await fetch(API + '/backup-pause', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          if (data.action === 'pause') bkpProgress.state = 'paused';
          else bkpProgress.state = 'running';
        }
      } catch(e) { console.error('Pause failed:', e); }
    }

    async function stopBackup() {
      if (!confirm(t('set_backup_stop_confirm'))) return;
      try {
        const res = await fetch(API + '/backup-stop', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          bkpProgress.state = 'stopped';
          bkpProgress.detail = t('bkp_stopped_by_user');
          stopBackupPoll();
          runningBkp.value = false;
          await loadBackupConfig();
        }
      } catch(e) { console.error('Stop failed:', e); }
    }

    async function saveBackupConfig() {
      savingBkp.value = true;
      try {
        const res = await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const data = await res.json();
        if (data.ok) { saveMsg.value = t('set_backup_saved'); saveErr.value = false; loadBackupSchedule(); }
        else { saveMsg.value = data.error || 'Error'; saveErr.value = true; }
      } catch(e) { saveMsg.value = e.message; saveErr.value = true; }
      savingBkp.value = false;
    }

    async function runBackup() {
      runningBkp.value = true;
      Object.assign(bkpProgress, { state: 'running', percent: 0, step: 'init', detail: t('bkp_starting'), startedAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      try {
        // Save config first
        await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const res = await fetch(API + '/backup-run', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          saveMsg.value = '';
          saveErr.value = false;
          // Start polling for live progress
          startBackupPoll();
          return;
        } else {
          saveMsg.value = data.error || 'Error'; saveErr.value = true;
          Object.assign(bkpProgress, { state: 'idle', percent: 0 });
        }
      } catch(e) {
        saveMsg.value = e.message; saveErr.value = true;
        Object.assign(bkpProgress, { state: 'idle', percent: 0 });
      }
      runningBkp.value = false;
    }

    function modelLabel(m) {
      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return 'BirdNET V2.4';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return 'BirdNET V2.4 MData';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return 'BirdNET V2.4 MData V2';
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return 'BirdNET V1';
      if (m === 'perch_v2_fp16') return 'Perch V2 FP16';
      if (m === 'perch_v2_dynint8') return 'Perch V2 INT8';
      if (m === 'perch_v2_original') return 'Perch V2 FP32';
      if (m.includes('Perch') || m.includes('perch')) return 'Perch V2';

      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return t('set_model_desc_birdnet');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return t('set_model_desc_mdata');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return t('set_model_desc_mdata_v2');
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return t('set_model_desc_v1');
      if (m === 'perch_v2_fp16') return t('set_model_desc_perch_fp16');

    async function reload() {
      loading.value = true;
      saveMsg.value = '';
      try {
        const [confData, modelData, langData, listsData] = await Promise.all([
          fetch(API + '/settings').then(r => r.json()),
          fetch(API + '/models').then(r => r.json()),
          fetch(API + '/languages').then(r => r.json()),
          fetch(API + '/species-lists').then(r => r.json()),
        ]);
        // Populate reactive config with defaults for per-model params
        Object.keys(conf).forEach(k => delete conf[k]);
        const defaults = {
          BIRDNET_CONFIDENCE: confData.CONFIDENCE || '0.65',
          PERCH_CONFIDENCE: '0.15',
          PERCH_MIN_MARGIN: '0.05',
        };
        Object.assign(conf, defaults, confData);
        models.value = modelData.models || [];
        languages.value = langData.languages || [];
        includeList.value = (listsData.include || []).join('\n');
        excludeList.value = (listsData.exclude || []).join('\n');
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      // Load analysis status (dual-model info)
      try {
        analysisStatus.value = await fetch(API + '/analysis-status').then(r => r.json());
      } catch(e) {}
      loading.value = false;
      loadServices();
      loadBackupConfig();
      loadBackupSchedule();
      loadBackupHistory();
    }

    async function loadServices() {
      svcLoading.value = true;
      try {
        const data = await fetch(API + '/services').then(r => r.json());
        services.value = (data.services || []).map(s => ({ ...s, restarting: false }));
      } catch(e) { console.error(e); }
      svcLoading.value = false;
    }

    async function saveAll() {
      saving.value = true;
      saveMsg.value = '';
      saveErr.value = false;
      try {
        // Save all configs in parallel: settings + audio + adaptive gain + apprise + species lists + alerts
        const [res] = await Promise.all([
          fetch(API + '/settings', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ updates: { ...conf } }),
          }),
          saveAudioConf(),
          saveAgConf(),
          fetch(API + '/apprise', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ urls: appriseUrls.value }),
          }).catch(() => {}),
          fetch(API + '/species-lists', {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify({ list: 'include', species: includeList.value.split('\n').map(s => s.trim()).filter(Boolean) }),
          }).catch(() => {}),
          fetch(API + '/species-lists', {
            method: 'POST', headers: authHeaders(),
            body: JSON.stringify({ list: 'exclude', species: excludeList.value.split('\n').map(s => s.trim()).filter(Boolean) }),
          }).catch(() => {}),

    const dbColumns = ref([]);

    const dbSqlWarning = computed(() => {
      const sql = (dbSql.value || '').trim();
      if (!sql) return '';
      const stripped = sql.replace(/'[^']*'/g, '').replace(/"[^"]*"/g, '');
      if (!/^\s*(SELECT|PRAGMA|WITH)\s/i.test(sql))
        return 'Seules les requêtes SELECT, PRAGMA et WITH sont autorisées.';
      if (/\b(DROP|DELETE|INSERT|UPDATE|CREATE|ALTER|ATTACH|DETACH)\b/i.test(stripped))
        return 'Requête bloquée : opération d\'écriture détectée (DROP, DELETE, INSERT, UPDATE, CREATE, ALTER).';
      if (/;/.test(stripped))
        return 'Les requêtes multiples (;) ne sont pas autorisées.';
      if (sql.length > 4000)
        return 'Requête trop longue (max 4000 caractères).';
      return '';
    });

    async function dbQuery(sql) {
      const resp = await fetch(BIRD_CONFIG.apiUrl + '/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sql }),
      });
      return resp.json();
    }

    async function dbLoadTables() {
      try {
        const data = await dbQuery("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name");
        const tables = [];
        for (const row of data.rows || []) {
          const name = Array.isArray(row) ? row[0] : row.name;
          const countData = await dbQuery(`SELECT COUNT(*) as n FROM "${name}"`);
          const count = Array.isArray(countData.rows?.[0]) ? countData.rows[0][0] : countData.rows?.[0]?.n || 0;
          tables.push({ name, count });
        }
        dbTables.value = tables;
      } catch (e) { console.error('dbLoadTables:', e); }
    }

    async function dbSelectTable(name) {
      dbSelectedTable.value = name;
      try {
        const data = await dbQuery(`PRAGMA table_info("${name}")`);
        dbSchema.value = (data.rows || []).map(row => {
          if (Array.isArray(row)) {
            return { cid: row[0], name: row[1], type: row[2] || 'TEXT' };
          }
          return row;
        });
        dbSql.value = `SELECT * FROM "${name}" LIMIT 50`;
        await dbExec();
      } catch (e) { console.error('dbSelectTable:', e); }
    }

    async function dbExec() {
      if (dbSqlWarning.value) return;
      dbLoading.value = true;
      dbError.value = '';
      dbColumns.value = [];
      dbRows.value = [];
      const t0 = performance.now();
      try {
        const data = await dbQuery(dbSql.value);
        dbExecTime.value = Math.round(performance.now() - t0);
        if (data.error) {
          dbError.value = data.error;
        } else {
          dbColumns.value = data.columns || [];
          dbRows.value = (data.rows || []).map(row => {
            if (Array.isArray(row)) {
              const obj = {};
              (data.columns || []).forEach((col, i) => { obj[col] = row[i]; });
              return obj;
            }
            return row;
          });
        }
      } catch (e) {
        dbError.value = e.message;
      }
      dbLoading.value = false;
    }

    function _loadLeaflet() {

      return new Promise((resolve) => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        script.onload = () => { _leafletLoaded = true; resolve(); };
        document.head.appendChild(script);
      });
    }

    async function initStationMap() {
      await _loadLeaflet();
      await new Promise(r => setTimeout(r, 100)); // let DOM settle
      const el = document.getElementById('station-map');
      if (!el || _stationMap) return;
      const lat = parseFloat(conf.LATITUDE) || 50.5;
      const lon = parseFloat(conf.LONGITUDE) || 4.5;
      _stationMap = L.map(el).setView([lat, lon], conf.LATITUDE ? 14 : 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap', maxZoom: 19
      }).addTo(_stationMap);
      _stationMarker = L.marker([lat, lon], { draggable: true }).addTo(_stationMap);
      _stationMarker.on('dragend', () => {
        const p = _stationMarker.getLatLng();
        conf.LATITUDE = p.lat.toFixed(4);
        conf.LONGITUDE = p.lng.toFixed(4);
      });
      _stationMap.on('click', (e) => {
        _stationMarker.setLatLng(e.latlng);
        conf.LATITUDE = e.latlng.lat.toFixed(4);
        conf.LONGITUDE = e.latlng.lng.toFixed(4);
      });
    }

    function updateMapFromInputs() {
      if (!_stationMap || !_stationMarker) return;
      const lat = parseFloat(conf.LATITUDE), lon = parseFloat(conf.LONGITUDE);
      if (isFinite(lat) && isFinite(lon)) {
        _stationMarker.setLatLng([lat, lon]);
        _stationMap.setView([lat, lon], _stationMap.getZoom());
      }
    }

    function geolocateMe() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition((pos) => {
        conf.LATITUDE = pos.coords.latitude.toFixed(4);
        conf.LONGITUDE = pos.coords.longitude.toFixed(4);
        updateMapFromInputs();
      });
    }
