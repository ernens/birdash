<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <title>BIRDASH — Settings</title>
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js" integrity="sha384-wdamyDHEiblYHsu/XTokGtIeFekZu7xN37Yvkl0NZ7PnhwRB+nwE1ByT7VlwiypE" crossorigin="anonymous"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <style>
    .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:768px) { .settings-grid { grid-template-columns:1fr; } }
    .set-row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--border); }
    .set-row:last-child { border-bottom:none; }
    .set-label { font-weight:500; font-size:.9rem; color:var(--text-secondary); flex:1; }
    .set-input { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.45rem .7rem; color:var(--text); font-size:.9rem; width:180px; }
    .set-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(90,158,58,.2); }
    .set-select { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.45rem .7rem; color:var(--text); font-size:.9rem; width:180px; cursor:pointer; }
    .set-range { width:180px; accent-color:var(--accent); }
    .set-range-val { font-size:.85rem; font-weight:600; color:var(--accent); min-width:3rem; text-align:right; }
    .set-check { display:flex; align-items:center; gap:.5rem; cursor:pointer; }
    .set-check input { accent-color:var(--accent); width:18px; height:18px; }
    .model-card { padding:.8rem; border-radius:8px; border:2px solid var(--border); cursor:pointer; transition:all .2s; }
    .model-card:hover { border-color:var(--accent); }
    .model-card.active { border-color:var(--accent); background:rgba(90,158,58,.08); }
    .model-name { font-weight:700; font-size:1rem; }
    .model-desc { font-size:.82rem; color:var(--text-secondary); margin-top:.3rem; }
    .model-badge { display:inline-block; padding:.15rem .5rem; border-radius:4px; font-size:.75rem; font-weight:600; margin-left:.5rem; }
    .badge-recommended { background:rgba(90,158,58,.15); color:var(--accent); }
    .badge-advanced { background:rgba(200,168,75,.15); color:#c8a84b; }
    .badge-experimental { background:rgba(168,92,58,.15); color:#a85c3a; }
    .save-bar { position:sticky; bottom:0; background:var(--bg-body); padding:1rem 0; border-top:1px solid var(--border); display:flex; gap:1rem; align-items:center; flex-wrap:wrap; z-index:10; }
    .btn-save { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:.7rem 2rem; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn-save:hover { opacity:.9; }
    .btn-save:disabled { opacity:.5; cursor:not-allowed; }
    .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:8px; padding:.7rem 1.5rem; font-size:.9rem; cursor:pointer; }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
    .save-msg { font-size:.9rem; padding:.4rem .8rem; border-radius:6px; }
    .save-ok { background:rgba(90,158,58,.12); color:var(--accent); }
    .save-err { background:rgba(200,60,60,.12); color:#c84b4b; }
    .svc-row { display:flex; align-items:center; justify-content:space-between; padding:.5rem 0; border-bottom:1px solid var(--border); }
    .svc-row:last-child { border-bottom:none; }
    .svc-name { font-family:monospace; font-size:.88rem; }
    .svc-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:.5rem; }
    .svc-active { background:#5a9e3a; }
    .svc-inactive { background:#c84b4b; }
    .svc-btn { background:transparent; border:1px solid var(--border); border-radius:5px; padding:.3rem .7rem; font-size:.8rem; cursor:pointer; color:var(--text-secondary); }
    .svc-btn:hover { border-color:var(--accent); color:var(--accent); }
    .section-title { font-size:1.1rem; font-weight:700; margin-bottom:.8rem; display:flex; align-items:center; gap:.5rem; }
    textarea.set-textarea { background:var(--bg-card); border:1px solid var(--border); border-radius:6px; padding:.5rem; color:var(--text); font-size:.85rem; font-family:monospace; width:100%; min-height:120px; resize:vertical; }
    textarea.set-textarea:focus { outline:none; border-color:var(--accent); }
    /* Info badge & modal */
    .info-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:18px; height:18px; border-radius:50%; border:1.5px solid var(--accent);
      color:var(--accent); font-size:.7rem; font-weight:700; font-style:italic;
      cursor:pointer; flex-shrink:0; margin-left:.4rem;
      font-family:Georgia,serif; line-height:1; transition:all .15s;
      background:transparent; padding:0;
    }
    .info-btn:hover { background:var(--accent); color:#fff; }
    .info-overlay {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center;
      padding:1rem; animation:fadeIn .15s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .info-modal {
      background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
      max-width:480px; width:100%; padding:1.5rem; box-shadow:0 8px 32px rgba(0,0,0,.25);
      position:relative; max-height:80vh; overflow-y:auto;
    }
    .info-modal-title {
      font-size:1rem; font-weight:700; color:var(--accent); margin-bottom:.75rem;
      display:flex; align-items:center; gap:.5rem;
    }
    .info-modal-body { font-size:.88rem; line-height:1.6; color:var(--text-main); }
    .info-modal-body strong { color:var(--accent); }
    .info-modal-body code {
      background:var(--bg-deep); padding:.1rem .35rem; border-radius:3px;
      font-size:.82rem; font-family:monospace;
    }
    .info-modal-close {
      position:absolute; top:.75rem; right:.75rem; background:none; border:none;
      font-size:1.2rem; cursor:pointer; color:var(--text-muted); padding:.25rem;
      line-height:1;
    }
    .info-modal-close:hover { color:var(--text-main); }
    .info-rec { margin-top:.6rem; padding:.5rem .7rem; border-radius:6px;
      background:color-mix(in srgb,var(--accent) 8%,transparent);
      border-left:3px solid var(--accent); font-size:.82rem; }
    /* Backup state badges */
    .bkp-state-badge { font-size:.72rem; padding:.15rem .45rem; border-radius:10px;
      font-weight:600; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap; }
    .bkp-running { background:color-mix(in srgb,var(--accent) 15%,transparent); color:var(--accent);
      animation:bkp-pulse 1.5s ease-in-out infinite; }
    .bkp-completed { background:color-mix(in srgb,var(--accent) 15%,transparent); color:var(--accent); }
    .bkp-failed { background:color-mix(in srgb,var(--danger) 15%,transparent); color:var(--danger); }
    .bkp-stopped { background:color-mix(in srgb,var(--warning,#c8a84b) 15%,transparent); color:var(--warning,#c8a84b); }
    .bkp-paused { background:color-mix(in srgb,var(--warning,#c8a84b) 15%,transparent); color:var(--warning,#c8a84b); }
    @keyframes bkp-pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    /* Tab navigation (same as system.html) */
    .set-tabs{display:flex;gap:.25rem;padding:.25rem;background:var(--bg-card2);border-radius:.5rem;margin-bottom:1.25rem;overflow-x:auto;}
    .set-tab-btn{display:flex;align-items:center;gap:.35rem;padding:.5rem .9rem;border:none;background:transparent;color:var(--text-muted);font-size:.82rem;font-family:inherit;cursor:pointer;border-radius:.4rem;transition:all .2s;white-space:nowrap;}
    .set-tab-btn:hover{background:var(--bg-card);color:var(--text-main);}
    .set-tab-btn.active{background:var(--bg-card);color:var(--accent);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12);}
    .set-tab-icon{font-size:1rem;}
    .set-tab-label{font-size:.78rem;}
  </style>
</head>
<body>
<div id="app">
  <birdash-shell page="settings" :title="t('nav_settings')">

    <!-- Info modal -->
    <div v-if="helpKey" class="info-overlay" @click.self="helpKey=null">
      <div class="info-modal">
        <button class="info-modal-close" @click="helpKey=null">&times;</button>
        <div class="info-modal-title">ⓘ {{helpTitle}}</div>
        <div class="info-modal-body" v-html="safeHtml(helpBody)"></div>
      </div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="display:flex;justify-content:center;padding:3rem;">
      <div class="spinner"><div></div><div></div><div></div></div>
    </div>

    <template v-else>

      <!-- ── Tab Navigation ──────────────────────────────────────── -->
      <div class="set-tabs">
        <button v-for="tab in tabs" :key="tab.id"
                class="set-tab-btn" :class="{active: activeTab === tab.id}"
                @click="switchTab(tab.id)">
          <span class="set-tab-icon">{{tab.icon}}</span>
          <span class="set-tab-label">{{t(tab.labelKey)}}</span>
        </button>
      </div>

      <!-- ════════════════════════════════════════════════════════════
           TAB 1: DETECTION
           ════════════════════════════════════════════════════════════ -->
      <div v-if="activeTab==='detection'">

      <!-- ═══ Model Selection ═══ -->
      <div class="card">
        <div class="section-title">🤖 {{t('set_model')}} <button class="info-btn" @click="helpKey='model'">i</button></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.8rem;">
          <div v-for="m in models" :key="m"
               class="model-card" :class="{ active: conf.MODEL === m }"
               @click="conf.MODEL = m">
            <div style="display:flex;align-items:center;">
              <span class="model-name">{{ modelLabel(m) }}</span>
              <span v-if="m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16'" class="model-badge badge-recommended">6.5K</span>
              <span v-else-if="m.includes('MData_Model_V2')" class="model-badge badge-recommended">6.5K + range V2</span>
              <span v-else-if="m.includes('MData_Model')" class="model-badge badge-recommended">6.5K + range</span>
              <span v-else-if="m === 'BirdNET_6K_GLOBAL_MODEL'" class="model-badge badge-experimental">legacy</span>
              <span v-else-if="m.includes('Perch')" class="model-badge badge-advanced">15K</span>
              <span v-else-if="m.includes('Go')" class="model-badge badge-experimental">exp.</span>
            </div>
            <div class="model-desc">{{ modelDescription(m) }}</div>
          </div>
        </div>
      </div>

      <div class="settings-grid">

        <!-- ═══ Analysis ═══ -->
        <div class="card">
          <div class="section-title">🔬 {{t('set_analysis')}}</div>
          <div class="set-row">
            <span class="set-label">{{t('set_confidence')}} <button class="info-btn" @click="helpKey='confidence'">i</button></span>
            <span class="set-range-val">{{conf.CONFIDENCE}}</span>
            <input v-model="conf.CONFIDENCE" type="range" min="0.01" max="0.99" step="0.01" class="set-range" :aria-label="t('set_confidence')">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_sensitivity')}} <button class="info-btn" @click="helpKey='sensitivity'">i</button></span>
            <span class="set-range-val">{{conf.SENSITIVITY}}</span>
            <input v-model="conf.SENSITIVITY" type="range" min="0.5" max="1.5" step="0.05" class="set-range" :aria-label="t('set_sensitivity')">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_species_freq_thresh')}} <button class="info-btn" @click="helpKey='sf_thresh'">i</button></span>
            <span class="set-range-val">{{conf.SF_THRESH}}</span>
            <input v-model="conf.SF_THRESH" type="range" min="0" max="0.5" step="0.01" class="set-range" :aria-label="t('set_species_freq_thresh')">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_overlap')}} <button class="info-btn" @click="helpKey='overlap'">i</button></span>
            <span class="set-range-val">{{conf.OVERLAP}}</span>
            <input v-model="conf.OVERLAP" type="range" min="0" max="2.9" step="0.1" class="set-range" :aria-label="t('set_overlap')">
          </div>
        </div>

        <!-- ═══ Recording ═══ -->
        <div class="card">
          <div class="section-title">🎙️ {{t('set_recording')}}</div>
          <div class="set-row">
            <span class="set-label">{{t('set_rec_length')}} <button class="info-btn" @click="helpKey='rec_length'">i</button></span>
            <input v-model="conf.RECORDING_LENGTH" type="number" min="6" max="120" class="set-input" style="width:80px;">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_extraction_length')}} <button class="info-btn" @click="helpKey='extraction_length'">i</button></span>
            <input v-model="conf.EXTRACTION_LENGTH" type="number" min="3" max="30" class="set-input" style="width:80px;" placeholder="6">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_audio_format')}} <button class="info-btn" @click="helpKey='audio_format'">i</button></span>
            <select v-model="conf.AUDIOFMT" class="set-select" style="width:100px;">
              <option value="mp3">MP3</option>
              <option value="wav">WAV</option>
              <option value="flac">FLAC</option>
              <option value="ogg">OGG</option>
            </select>
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_channels')}} <button class="info-btn" @click="helpKey='channels'">i</button></span>
            <select v-model="conf.CHANNELS" class="set-select" style="width:80px;">
              <option value="1">Mono</option>
              <option value="2">Stereo</option>
            </select>
          </div>
        </div>

      </div><!-- /settings-grid -->
      </div><!-- /tab detection -->

      <!-- ════════════════════════════════════════════════════════════
           TAB 2: STATION
           ════════════════════════════════════════════════════════════ -->
      <div v-if="activeTab==='station'">
      <div class="settings-grid">

        <!-- ═══ Location ═══ -->
        <div class="card">
          <div class="section-title">📍 {{t('set_location')}}</div>
          <div class="set-row">
            <span class="set-label">{{t('set_site_name')}} <button class="info-btn" @click="helpKey='site_name'">i</button></span>
            <input v-model="conf.SITE_NAME" class="set-input">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_latitude')}} <button class="info-btn" @click="helpKey='latitude'">i</button></span>
            <input v-model="conf.LATITUDE" type="number" step="0.0001" class="set-input" style="width:120px;">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_longitude')}} <button class="info-btn" @click="helpKey='longitude'">i</button></span>
            <input v-model="conf.LONGITUDE" type="number" step="0.0001" class="set-input" style="width:120px;">
          </div>
        </div>

        <!-- ═══ Language & Images ═══ -->
        <div class="card">
          <div class="section-title">🌍 {{t('set_language')}}</div>
          <div class="set-row">
            <span class="set-label">{{t('set_language')}} <button class="info-btn" @click="helpKey='database_lang'">i</button></span>
            <select v-model="conf.DATABASE_LANG" class="set-select">
              <option v-for="l in languages" :key="l" :value="l">{{l}}</option>
            </select>
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_image_provider')}} <button class="info-btn" @click="helpKey='image_provider'">i</button></span>
            <select v-model="conf.IMAGE_PROVIDER" class="set-select" style="width:140px;">
              <option value="WIKIPEDIA">Wikipedia</option>
              <option value="FLICKR">Flickr</option>
            </select>
          </div>
        </div>

        <!-- ═══ BirdWeather ═══ -->
        <div class="card">
          <div class="section-title">🌤️ {{t('set_birdweather')}}</div>
          <div class="set-row">
            <span class="set-label">Station ID <button class="info-btn" @click="helpKey='birdweather'">i</button></span>
            <input v-model="conf.BIRDWEATHER_ID" class="set-input" placeholder="empty = disabled">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_rtsp_stream')}} <button class="info-btn" @click="helpKey='rtsp'">i</button></span>
            <input v-model="conf.RTSP_STREAM" class="set-input" style="width:240px;" placeholder="rtsp://...">
          </div>
        </div>

      </div><!-- /settings-grid -->
      </div><!-- /tab station -->

      <!-- ════════════════════════════════════════════════════════════
           TAB 3: SYSTEM
           ════════════════════════════════════════════════════════════ -->
      <div v-if="activeTab==='system'">
      <div class="settings-grid">

        <!-- ═══ Disk Management ═══ -->
        <div class="card">
          <div class="section-title">💾 {{t('set_disk_mgmt')}}</div>
          <div class="set-row">
            <span class="set-label">{{t('set_full_disk')}} <button class="info-btn" @click="helpKey='full_disk'">i</button></span>
            <select v-model="conf.FULL_DISK" class="set-select" style="width:120px;">
              <option value="purge">Purge</option>
              <option value="keep">Keep</option>
            </select>
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_purge_threshold')}} <button class="info-btn" @click="helpKey='purge_threshold'">i</button></span>
            <span class="set-range-val">{{conf.PURGE_THRESHOLD}}%</span>
            <input v-model="conf.PURGE_THRESHOLD" type="range" min="50" max="99" step="1" class="set-range" :aria-label="t('set_purge_threshold')">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_max_files')}} <button class="info-btn" @click="helpKey='max_files'">i</button></span>
            <input v-model="conf.MAX_FILES_SPECIES" type="number" min="0" class="set-input" style="width:80px;">
          </div>
          <div class="set-row">
            <span class="set-label">{{t('set_privacy_threshold')}} <button class="info-btn" @click="helpKey='privacy'">i</button></span>
            <select v-model="conf.PRIVACY_THRESHOLD" class="set-select" style="width:80px;">
              <option value="0">0 (off)</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
        </div>

        <!-- ═══ Notifications — configuration du canal ═══ -->
        <div class="card">
          <div class="section-title">🔔 {{t('set_notifications')}}</div>

          <!-- Apprise URLs -->
          <div class="set-row" style="flex-direction:column;align-items:stretch;">
            <label class="set-label" style="margin-bottom:.3rem;">{{t('set_notif_urls')}}</label>
            <textarea v-model="appriseUrls" rows="3"
                      style="width:100%;box-sizing:border-box;font-family:monospace;font-size:.78rem;background:var(--bg-deep);border:1px solid var(--border);color:var(--text-main);border-radius:4px;padding:.4rem .5rem;resize:vertical;"
                      placeholder="ntfy://ntfy.sh/my-birds&#10;tgram://bottoken/chatid&#10;mailto://user:pass@gmail.com"></textarea>
            <div style="font-size:.68rem;color:var(--text-faint);margin-top:.25rem;line-height:1.5;">
              {{t('set_notif_urls_help')}}<br>
              <code style="color:var(--accent);">ntfy://ntfy.sh/my-topic</code> ·
              <code style="color:var(--accent);">tgram://bottoken/chatid</code> ·
              <code style="color:var(--accent);">discord://webhook_id/webhook_token</code><br>
              <a href="https://github.com/caronc/apprise/wiki" target="_blank" rel="noopener noreferrer" style="color:var(--accent);font-size:.68rem;">Apprise Wiki — 80+ services</a>
            </div>
            <div v-if="!appriseUrls.trim()" style="margin-top:.4rem;padding:.3rem .5rem;background:rgba(251,191,36,.1);border-left:3px solid var(--amber);border-radius:3px;font-size:.72rem;color:var(--amber);">
              {{t('set_notif_no_urls')}}
            </div>
            <div style="display:flex;gap:.5rem;margin-top:.4rem;">
              <button class="btn btn-secondary" style="font-size:.75rem;padding:.25rem .6rem;" @click="saveApprise" :disabled="savingApprise">
                {{savingApprise ? '…' : t('set_save')}}
              </button>
              <button class="btn btn-secondary" style="font-size:.75rem;padding:.25rem .6rem;" @click="testApprise" :disabled="testingApprise || !appriseUrls.trim()">
                {{testingApprise ? t('set_notif_testing') : '🔔 ' + t('set_notif_test')}}
              </button>
              <span v-if="appriseMsg" style="font-size:.72rem;align-self:center;" :style="{color:appriseErr?'var(--danger)':'var(--accent)'}">{{appriseMsg}}</span>
            </div>
          </div>

          <hr style="border:none;border-top:1px solid var(--border);margin:.8rem 0;">

          <!-- Title & Body templates -->
          <div class="set-row" style="flex-direction:column;align-items:stretch;">
            <label class="set-label" style="margin-bottom:.2rem;">{{t('set_notif_title')}}</label>
            <input type="text" v-model="conf.APPRISE_NOTIFICATION_TITLE"
                   style="width:100%;box-sizing:border-box;font-size:.8rem;background:var(--bg-deep);border:1px solid var(--border);color:var(--text-main);border-radius:4px;padding:.3rem .5rem;">
          </div>
          <div class="set-row" style="flex-direction:column;align-items:stretch;margin-top:.4rem;">
            <label class="set-label" style="margin-bottom:.2rem;">{{t('set_notif_body')}}</label>

              </div>

              <!-- Schedule info -->
              <div v-if="bkpSchedule" style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding:.45rem .65rem;background:var(--bg-card2);border-radius:6px;">
                <span style="font-size:1rem;">⏰</span>
                <div style="flex:1;font-size:.8rem;">
                  <div style="color:var(--text-main);">
                    {{bkpSchedule.type === 'daily' ? t('set_backup_schedule_daily') : t('set_backup_schedule_weekly')}}
                    — {{bkpSchedule.time}}
                  </div>
                  <div style="font-size:.72rem;color:var(--text-faint);">
                    {{t('set_backup_next_run')||'Prochain'}}: {{fmtDateTimeFull(bkpSchedule.nextRun)}}
                  </div>
                </div>
              </div>
              <div v-else-if="bkp.schedule === 'manual'" style="font-size:.78rem;color:var(--text-faint);margin-bottom:.5rem;">
                {{t('set_backup_no_schedule')||'Aucune planification — mode manuel'}}
              </div>

              <!-- Last run info (when not active) -->
              <div v-if="bkpProgress.state !== 'running' && bkpProgress.state !== 'paused'" style="font-size:.82rem;color:var(--text-muted);margin-bottom:.5rem;">
                {{t('set_backup_last_status')}}:
                <span v-if="!bkp.lastRun" style="color:var(--text-faint);">{{t('set_backup_never')}}</span>
                <span v-else>
                  <span :style="{color: bkp.lastStatus === 'success' ? 'var(--accent)' : 'var(--danger)'}">
                    {{bkp.lastStatus === 'success' ? t('set_backup_success') : t('set_backup_failed')}}
                  </span>
                  — {{bkp.lastRun}}
                </span>
              </div>

              <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
                <button class="btn-outline" @click="saveBackupConfig" :disabled="savingBkp" style="font-size:.85rem;">
                  {{savingBkp ? '...' : t('set_backup_save')}}
                </button>
                <button class="btn-save" @click="runBackup"
                        :disabled="bkpProgress.state === 'running' || bkpProgress.state === 'paused'"
                        style="font-size:.85rem;padding:.5rem 1.2rem;">
                  {{(bkpProgress.state === 'running' || bkpProgress.state === 'paused') ? t('set_backup_running') : t('set_backup_run_now')}}
                </button>
              </div>

              <!-- Backup history -->
              <div v-if="bkpHistory.length" style="margin-top:.8rem;border-top:1px solid var(--border);padding-top:.6rem;">
                <div style="font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);margin-bottom:.4rem;">
                  {{t('set_backup_history')||'Historique'}}
                </div>
                <div v-for="h in bkpHistory" :key="h.startedAt"
                     style="display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid var(--bg-card2);font-size:.78rem;">
                  <span :style="{color: h.status==='success' ? 'var(--accent)' : 'var(--danger)', fontSize:'.9rem'}">
                    {{h.status === 'success' ? '✓' : '✗'}}
                  </span>
                  <span style="color:var(--text-main);min-width:120px;">{{fmtDateTimeFull(h.startedAt)}}</span>
                  <span style="color:var(--text-faint);font-size:.72rem;">{{h.steps}}</span>
                  <span style="margin-left:auto;font-family:monospace;color:var(--text-muted);">{{h.size}}</span>
                </div>
              </div>
            </div>

          </div>

        </div><!-- /settings-grid -->
      </div>

      </div><!-- /tab backup -->

      <!-- ═══ Save bar ═══ -->
      <div class="save-bar">
        <button class="btn-save" @click="save(false)" :disabled="saving">
          {{saving ? '...' : t('set_save')}}
        </button>
        <button class="btn-save" style="background:#c8a84b;" @click="save(true)" :disabled="saving">
          {{saving ? '...' : t('set_save_restart')}}
        </button>
        <button class="btn-outline" @click="reload">{{t('set_reload')}}</button>
        <span v-if="saveMsg" class="save-msg" :class="saveErr ? 'save-err' : 'save-ok'">{{saveMsg}}</span>
      </div>

    </template>
  </birdash-shell>
</div>

<script>
const { createApp, ref, reactive, onMounted, computed } = Vue;
const { useI18n, useTheme, useNav, registerComponents, safeHtml, authHeaders } = BIRDASH;

const app = createApp({
  setup() {
    const { lang, t } = useI18n();
    const API = BIRD_CONFIG.apiUrl;

    const conf = reactive({});
    const models = ref([]);
    const languages = ref([]);
    const services = ref([]);
    const loading = ref(true);

    // ── Tab navigation ──────────────────────────────────────────
    const tabs = [
      { id: 'detection', icon: '🤖', labelKey: 'set_tab_detection' },
      { id: 'station',   icon: '📍', labelKey: 'set_tab_station' },
      { id: 'system',    icon: '🔧', labelKey: 'set_tab_system' },
      { id: 'backup',    icon: '💾', labelKey: 'set_tab_backup' },
    ];
    const activeTab = ref(localStorage.getItem('birdash-settings-tab') || 'detection');

    function switchTab(id) {
      activeTab.value = id;
      localStorage.setItem('birdash-settings-tab', id);
    }
    const saving = ref(false);
    const svcLoading = ref(true);
    const saveMsg = ref('');
    const saveErr = ref(false);
    const includeList = ref('');
    const excludeList = ref('');
    const savingLists = ref(false);

    // ── Apprise notification URLs ──────────────────────────────
    const appriseUrls    = ref('');
    const savingApprise  = ref(false);
    const testingApprise = ref(false);
    const appriseMsg     = ref('');
    const appriseErr     = ref(false);

    async function loadApprise() {
      try {
        const res = await fetch(API + '/apprise');
        const data = await res.json();
        appriseUrls.value = data.urls || '';
      } catch(e) {}
    }

    async function saveApprise() {
      savingApprise.value = true;
      appriseMsg.value = '';
      try {
        const res = await fetch(API + '/apprise', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ urls: appriseUrls.value }),
        });
        const data = await res.json();
        if (data.ok) { appriseMsg.value = '✓'; appriseErr.value = false; }
        else { appriseMsg.value = data.error; appriseErr.value = true; }
      } catch(e) { appriseMsg.value = e.message; appriseErr.value = true; }
      savingApprise.value = false;
    }

    // ── Alert thresholds ─────────────────────────────────────
    const alertThresholds = reactive({
      temp_warn:70, temp_crit:80, disk_warn:85, disk_crit:95, ram_warn:90, backlog_warn:50, no_detection_hours:4, service_down:1,
      alert_temp:1, alert_temp_crit:1, alert_disk:1, alert_ram:1, alert_backlog:1, alert_no_det:1,
    });
    const savingAlerts = ref(false);
    const alertSaveMsg = ref('');
    const alertSaveErr = ref(false);

    async function loadAlertThresholds() {
      try {
        const res = await fetch(API + '/alert-thresholds');
        const data = await res.json();
        Object.assign(alertThresholds, data);
      } catch(e) {}
    }

    async function saveAlertThresholds() {
      savingAlerts.value = true;
      alertSaveMsg.value = '';
      try {
        // Save bird notification event toggles + system alert thresholds
        const updates = {
          APPRISE_NOTIFY_EACH_DETECTION: String(conf.APPRISE_NOTIFY_EACH_DETECTION || 0),
          APPRISE_NOTIFY_NEW_SPECIES: String(conf.APPRISE_NOTIFY_NEW_SPECIES || 0),
          APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY: String(conf.APPRISE_NOTIFY_NEW_SPECIES_EACH_DAY || 0),
          APPRISE_WEEKLY_REPORT: String(conf.APPRISE_WEEKLY_REPORT || 0),
          APPRISE_NOTIFICATION_TITLE: conf.APPRISE_NOTIFICATION_TITLE || '',
          APPRISE_NOTIFICATION_BODY: conf.APPRISE_NOTIFICATION_BODY || '',
          APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES: String(conf.APPRISE_MINIMUM_SECONDS_BETWEEN_NOTIFICATIONS_PER_SPECIES || 0),
          BIRDASH_ALERT_TEMP_WARN: String(alertThresholds.temp_warn),
          BIRDASH_ALERT_TEMP_CRIT: String(alertThresholds.temp_crit),
          BIRDASH_ALERT_DISK_WARN: String(alertThresholds.disk_warn),
          BIRDASH_ALERT_DISK_CRIT: String(alertThresholds.disk_crit),
          BIRDASH_ALERT_RAM_WARN: String(alertThresholds.ram_warn),
          BIRDASH_ALERT_BACKLOG: String(alertThresholds.backlog_warn),
          BIRDASH_ALERT_NO_DET_H: String(alertThresholds.no_detection_hours),
          BIRDASH_ALERT_ON_TEMP: String(alertThresholds.alert_temp || 0),
          BIRDASH_ALERT_ON_TEMP_CRIT: String(alertThresholds.alert_temp_crit || 0),
          BIRDASH_ALERT_ON_DISK: String(alertThresholds.alert_disk || 0),
          BIRDASH_ALERT_ON_RAM: String(alertThresholds.alert_ram || 0),
          BIRDASH_ALERT_ON_BACKLOG: String(alertThresholds.alert_backlog || 0),
          BIRDASH_ALERT_ON_NO_DET: String(alertThresholds.alert_no_det || 0),
        };
        const res = await fetch(API + '/settings', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ updates }),
        });
        const data = await res.json();
        if (data.ok) { alertSaveMsg.value = '✓'; alertSaveErr.value = false; }
        else { alertSaveMsg.value = data.error || 'Error'; alertSaveErr.value = true; }
      } catch(e) { alertSaveMsg.value = e.message; alertSaveErr.value = true; }
      savingAlerts.value = false;
    }

    async function testApprise() {
      testingApprise.value = true;
      appriseMsg.value = '';
      // Save first to ensure apprise.txt is up to date
      await saveApprise();
      try {
        const res = await fetch(API + '/apprise/test', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) { appriseMsg.value = t('set_notif_test_ok'); appriseErr.value = false; }
        else { appriseMsg.value = t('set_notif_test_fail', { error: data.error || 'unknown' }); appriseErr.value = true; }
      } catch(e) { appriseMsg.value = t('set_notif_test_fail', { error: e.message }); appriseErr.value = true; }
      testingApprise.value = false;
    }

    // ── Backup configuration ──────────────────────────────────────
    const bkp = reactive({
      destination: 'local', content: ['all'], schedule: 'manual', scheduleTime: '02:00', retention: 30,
      local: { path: '/mnt/backup' },
      smb: { host: '', share: '', user: '', pass: '', remotePath: '/birdash-backup' },
      nfs: { host: '', exportPath: '', mountPoint: '/mnt/nfs-backup', remotePath: '/birdash-backup' },
      sftp: { host: '', port: 22, user: '', pass: '', remotePath: '/birdash-backup' },
      s3: { bucket: '', region: 'eu-west-1', accessKey: '', secretKey: '', remotePath: 'birdash-backup' },
      gdrive: { folderId: '' },
      webdav: { url: '', user: '', pass: '', remotePath: '/birdash-backup' },
      lastRun: null, lastStatus: null,
    });
    const savingBkp = ref(false);
    const runningBkp = ref(false);
    const bkpProgress = reactive({ state: 'idle', percent: 0, step: '', detail: '', startedAt: null, updatedAt: null });
    let _bkpPollTimer = null;

    const backupDests = [
      { value: 'local', icon: '💿', labelKey: 'set_backup_dest_local' },
      { value: 'smb', icon: '🖥️', labelKey: 'set_backup_dest_smb' },
      { value: 'nfs', icon: '📁', labelKey: 'set_backup_dest_nfs' },
      { value: 'sftp', icon: '🔐', labelKey: 'set_backup_dest_sftp' },
      { value: 's3', icon: '☁️', labelKey: 'set_backup_dest_s3' },
      { value: 'gdrive', icon: '📎', labelKey: 'set_backup_dest_gdrive' },
      { value: 'webdav', icon: '🌐', labelKey: 'set_backup_dest_webdav' },
    ];

    function toggleBackupContent(type) {
      if (type === 'all') {
        bkp.content = bkp.content.includes('all') ? ['db', 'config'] : ['all'];
      } else {
        if (bkp.content.includes('all')) return;
        const idx = bkp.content.indexOf(type);
        if (idx >= 0) { bkp.content.splice(idx, 1); if (bkp.content.length === 0) bkp.content.push('db'); }
        else bkp.content.push(type);
      }
    }

    async function loadBackupConfig() {
      try {
        const data = await fetch(API + '/backup-config').then(r => r.json());
        if (data.error) return;
        Object.keys(data).forEach(k => { if (k in bkp) { if (typeof bkp[k] === 'object' && !Array.isArray(bkp[k]) && bkp[k] !== null) Object.assign(bkp[k], data[k]); else bkp[k] = data[k]; } });
      } catch(e) { console.warn('Could not load backup config:', e); }
      // Check if a backup is already running
      try {
        const prog = await fetch(API + '/backup-progress').then(r => r.json());
        if (prog.state === 'running') {
          Object.assign(bkpProgress, prog);
          runningBkp.value = true;
          startBackupPoll();
        } else if (prog.state && prog.state !== 'idle') {
          Object.assign(bkpProgress, prog);
        }
      } catch(e) { /* silent */ }
    }

    function bkpStepLabel(step) {
      const labels = { init: 'Initialisation', db: 'Base de données', config: 'Configuration',
        projects: 'Projets', audio: 'BirdSongs', upload: 'Upload', mount: 'Montage', done: 'Terminé' };
      return labels[step] || step || '';
    }

    const bkpElapsed = computed(() => {
      if (!bkpProgress.startedAt) return '';
      const ms = new Date(bkpProgress.updatedAt || new Date()) - new Date(bkpProgress.startedAt);
      const sec = Math.floor(ms / 1000);
      if (sec < 60) return sec + 's';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + 'min ' + (sec % 60) + 's';
      const hr = Math.floor(min / 60);
      return hr + 'h ' + (min % 60) + 'min';
    });

    async function pollBackupProgress() {
      try {
        const data = await fetch(API + '/backup-progress').then(r => r.json());
        if (data.error) return;
        Object.assign(bkpProgress, data);
        // If backup finished, refresh config to get lastRun/lastStatus
        if (data.state === 'completed' || data.state === 'failed' || data.state === 'stopped') {
          stopBackupPoll();
          runningBkp.value = false;
          await loadBackupConfig();
          loadBackupHistory();
        }
      } catch(e) { /* silent */ }
    }

    function startBackupPoll() {
      stopBackupPoll();
      _bkpPollTimer = setInterval(pollBackupProgress, 2000);
    }

    function stopBackupPoll() {
      if (_bkpPollTimer) { clearInterval(_bkpPollTimer); _bkpPollTimer = null; }
    }

    // ── Schedule & History ──────────────────────────────────────────────────
    const bkpSchedule = ref(null);
    const bkpHistory = ref([]);

    async function loadBackupSchedule() {
      try {
        const data = await fetch(API + '/backup-schedule').then(r => r.json());
        bkpSchedule.value = data.schedule || null;
      } catch(e) {}
    }

    async function loadBackupHistory() {
      try {
        const data = await fetch(API + '/backup-history').then(r => r.json());
        bkpHistory.value = (data || []).reverse(); // most recent first
      } catch(e) {}
    }

    function fmtDateTimeFull(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const pad = n => (n < 10 ? '0' : '') + n;
      return pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear() +
             ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function fmtSize(bytes) {
      if (!bytes || bytes <= 0) return '0 B';
      const units = ['B', 'Ko', 'Mo', 'Go', 'To'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    async function pauseBackup() {
      try {
        const res = await fetch(API + '/backup-pause', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          if (data.action === 'pause') bkpProgress.state = 'paused';
          else bkpProgress.state = 'running';
        }
      } catch(e) { console.error('Pause failed:', e); }
    }

    async function stopBackup() {
      if (!confirm(t('set_backup_stop_confirm'))) return;
      try {
        const res = await fetch(API + '/backup-stop', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          bkpProgress.state = 'stopped';
          bkpProgress.detail = 'Arrêté par l\'utilisateur';
          stopBackupPoll();
          runningBkp.value = false;
          await loadBackupConfig();
        }
      } catch(e) { console.error('Stop failed:', e); }
    }

    async function saveBackupConfig() {
      savingBkp.value = true;
      try {
        const res = await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const data = await res.json();
        if (data.ok) { saveMsg.value = t('set_backup_saved'); saveErr.value = false; loadBackupSchedule(); }
        else { saveMsg.value = data.error || 'Error'; saveErr.value = true; }
      } catch(e) { saveMsg.value = e.message; saveErr.value = true; }
      savingBkp.value = false;
    }

    async function runBackup() {
      runningBkp.value = true;
      Object.assign(bkpProgress, { state: 'running', percent: 0, step: 'init', detail: 'Démarrage...', startedAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      try {
        // Save config first
        await fetch(API + '/backup-config', {
          method: 'POST', headers: authHeaders(),
          body: JSON.stringify({ ...bkp }),
        });
        const res = await fetch(API + '/backup-run', { method: 'POST', headers: authHeaders() });
        const data = await res.json();
        if (data.ok) {
          saveMsg.value = '';
          saveErr.value = false;
          // Start polling for live progress
          startBackupPoll();
          return;
        } else {
          saveMsg.value = data.error || 'Error'; saveErr.value = true;
          Object.assign(bkpProgress, { state: 'idle', percent: 0 });
        }
      } catch(e) {
        saveMsg.value = e.message; saveErr.value = true;
        Object.assign(bkpProgress, { state: 'idle', percent: 0 });
      }
      runningBkp.value = false;
    }

    function modelLabel(m) {
      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return 'BirdNET V2.4';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return 'BirdNET V2.4 MData';
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return 'BirdNET V2.4 MData V2';
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return 'BirdNET V1';
      if (m.includes('Perch')) return 'Perch v2';
      if (m.includes('Go')) return 'BirdNET-Go';
      return m;
    }

    function modelDescription(m) {
      if (m === 'BirdNET_GLOBAL_6K_V2.4_Model_FP16') return t('set_model_desc_birdnet');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_FP16') return t('set_model_desc_mdata');
      if (m === 'BirdNET_GLOBAL_6K_V2.4_MData_Model_V2_FP16') return t('set_model_desc_mdata_v2');
      if (m === 'BirdNET_6K_GLOBAL_MODEL') return t('set_model_desc_v1');
      if (m.includes('Perch')) return t('set_model_desc_perch');
      if (m.includes('Go')) return t('set_model_desc_go');
      return m;
    }

    async function reload() {
      loading.value = true;
      saveMsg.value = '';
      try {
        const [confData, modelData, langData, listsData] = await Promise.all([
          fetch(API + '/settings').then(r => r.json()),
          fetch(API + '/models').then(r => r.json()),
          fetch(API + '/languages').then(r => r.json()),
          fetch(API + '/species-lists').then(r => r.json()),
        ]);
        // Populate reactive config
        Object.keys(conf).forEach(k => delete conf[k]);
        Object.assign(conf, confData);
        models.value = modelData.models || [];
        languages.value = langData.languages || [];
        includeList.value = (listsData.include || []).join('\n');
        excludeList.value = (listsData.exclude || []).join('\n');
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      loading.value = false;
      loadServices();
      loadBackupConfig();
      loadBackupSchedule();
      loadBackupHistory();
    }

    async function loadServices() {
      svcLoading.value = true;
      try {
        const data = await fetch(API + '/services').then(r => r.json());
        services.value = (data.services || []).map(s => ({ ...s, restarting: false }));
      } catch(e) { console.error(e); }
      svcLoading.value = false;
    }

    async function save(andRestart) {
      saving.value = true;
      saveMsg.value = '';
      saveErr.value = false;
      try {
        const res = await fetch(API + '/settings', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ updates: { ...conf } }),
        });
        const data = await res.json();
        if (data.ok) {
          saveMsg.value = t('set_saved');
          if (data.warnings) saveMsg.value += ' (' + data.warnings.join(', ') + ')';
          if (andRestart) {
            // Restart core services
            for (const svc of ['birdnet_analysis', 'birdnet_recording']) {
              await fetch(API + '/services/restart', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ service: svc }),
              });
            }
            saveMsg.value += ' + services restarted';
            loadServices();
          }
        } else {
          saveMsg.value = data.error || 'Error';
          saveErr.value = true;
        }
      } catch(e) {
        saveMsg.value = e.message;
        saveErr.value = true;
      }
      saving.value = false;
    }

    async function restartService(name) {
      const svc = services.value.find(s => s.name === name);
      if (svc) svc.restarting = true;
      try {
        await fetch(API + '/services/restart', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ service: name }),
        });
      } catch(e) { console.error(e); }
      setTimeout(loadServices, 1500);
    }

    async function saveSpeciesLists() {
      savingLists.value = true;
      try {
        const inc = includeList.value.split('\n').map(l => l.trim()).filter(Boolean);
        const exc = excludeList.value.split('\n').map(l => l.trim()).filter(Boolean);
        await Promise.all([
          fetch(API + '/species-lists', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ list: 'include', species: inc }),
          }),
          fetch(API + '/species-lists', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ list: 'exclude', species: exc }),
          }),
        ]);
      } catch(e) { console.error(e); }
      savingLists.value = false;
    }

    // ── Help system ──────────────────────────────────────────────────────
    const helpKey = ref(null);

    const HELP = {
      fr: {
        model: {
          title: 'Modèle de détection',
          body: `Le modèle IA utilisé pour identifier les espèces d'oiseaux à partir de l'audio.<br><br>
            <strong>BirdNET V2.4</strong> — Modèle de référence par Cornell Lab. 6 500 espèces, optimisé pour Raspberry Pi. Chunks de 3s à 48 kHz. Rapide et fiable.<br>
            <strong>BirdNET V2.4 + MData</strong> — Même modèle + filtre géographique qui élimine les espèces improbables selon votre localisation et la semaine.<br>
            <strong>Perch V2</strong> — Modèle Google Research. 10 340 espèces d'oiseaux (filtré). Chunks de 5s à 32 kHz. Plus précis mais plus lent (~1.6× temps réel sur Pi 4).<br>
            <strong>BirdNET-Go</strong> — Variante expérimentale.`,
