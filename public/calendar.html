<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — Calendrier</title>
  <meta property="og:title" content="BirdStation — Calendrier">
  <meta property="og:description" content="Bird detection dashboard — Heinsch, Belgium">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-queries.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <style>
    .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
    .cal-title { font-family:var(--font-display); font-size:1.4rem; font-weight:700; text-transform:capitalize; }
    .cal-nav { display:flex; gap:.3rem; align-items:center; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-dow { text-align:center; font-size:.7rem; color:var(--text-faint); padding:.3rem 0; font-weight:600; text-transform:uppercase; }
    .cal-cell {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
      padding:.5rem .4rem; min-height:80px; cursor:pointer; transition:border-color .15s, transform .15s;
      display:flex; flex-direction:column; gap:.2rem; position:relative;
    }
    .cal-cell:hover { border-color:var(--accent); transform:translateY(-1px); }
    .cal-cell.today { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
    .cal-cell.empty { background:transparent; border-color:transparent; cursor:default; min-height:auto; }
    .cal-cell.empty:hover { transform:none; border-color:transparent; }
    .cal-cell.future { opacity:.35; cursor:default; }
    .cal-cell.future:hover { transform:none; border-color:var(--border); }
    .cal-day { font-size:.85rem; font-weight:600; }
    .cal-sp { font-size:.72rem; color:var(--accent); display:flex; align-items:center; gap:.2rem; }
    .cal-det { font-size:.68rem; color:var(--text-muted); }
    .cal-bar { height:4px; border-radius:2px; margin-top:auto; }
    .cal-kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:.6rem; margin-bottom:1rem; }
    .cal-kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:.6rem .8rem; text-align:center; }
    .cal-kpi-val { font-family:var(--font-display); font-size:1.6rem; font-weight:700; }
    .cal-kpi-label { font-size:.72rem; color:var(--text-muted); }
    .cal-legend { display:flex; gap:1rem; justify-content:center; margin-top:.6rem; font-size:.7rem; color:var(--text-faint); align-items:center; }
    .cal-legend-swatch { width:12px; height:12px; border-radius:2px; }
    @media (max-width:640px) {
      .cal-cell { min-height:60px; padding:.3rem; }
      .cal-day { font-size:.75rem; }
      .cal-sp, .cal-det { font-size:.65rem; }
    }
  </style>
</head>
<body>
<div id="app">
  <birdash-shell page="calendar" :title="t('nav_calendar')">

    <!-- Monthly KPIs -->
    <div class="cal-kpis">
      <div class="cal-kpi">
        <div class="cal-kpi-val" style="color:var(--accent);">{{monthKpis.species}}</div>
        <div class="cal-kpi-label">{{t('species')}}</div>
      </div>
      <div class="cal-kpi">
        <div class="cal-kpi-val">{{monthKpis.detections}}</div>
        <div class="cal-kpi-label">{{t('detections')}}</div>
      </div>
      <div class="cal-kpi">
        <div class="cal-kpi-val amber">{{monthKpis.avgPerDay}}</div>
        <div class="cal-kpi-label">{{t('cal_avg_per_day')}}</div>
      </div>
      <div class="cal-kpi">
        <div class="cal-kpi-val blue">{{monthKpis.activeDays}}</div>
        <div class="cal-kpi-label">{{t('cal_active_days')}}</div>
      </div>
    </div>

    <!-- Calendar header: ← Month Year → -->
    <div class="cal-header">
      <button class="btn btn-secondary" style="padding:.3rem .6rem;" @click="prevMonth">
        <bird-icon name="chevron-left" :size="16"></bird-icon>
      </button>
      <div class="cal-title">{{monthLabel}}</div>
      <button class="btn btn-secondary" style="padding:.3rem .6rem;" @click="nextMonth" :disabled="isCurrentMonth">
        <bird-icon name="chevron-right" :size="16"></bird-icon>
      </button>
    </div>

    <!-- Day-of-week headers -->
    <div class="cal-grid">
      <div v-for="d in dowLabels" :key="d" class="cal-dow">{{d}}</div>
    </div>

    <!-- Calendar cells -->
    <div v-if="loading" style="text-align:center;padding:3rem;"><div class="spinner"><div></div><div></div><div></div></div></div>
    <div v-else class="cal-grid">
      <div v-for="(cell, i) in cells" :key="i"
           class="cal-cell"
           :class="{ empty: !cell.day, today: cell.isToday, future: cell.isFuture }"
           @click="cell.day && !cell.isFuture ? openDay(cell.date) : null">
        <template v-if="cell.day">
          <div class="cal-day">{{cell.day}}</div>
          <div v-if="cell.sp > 0" class="cal-sp">
            <bird-icon name="bird" :size="11"></bird-icon> {{cell.sp}}
          </div>
          <div v-if="cell.det > 0" class="cal-det">{{cell.det.toLocaleString()}} det.</div>
          <div v-else-if="!cell.isFuture" class="cal-det" style="opacity:.3;">—</div>
          <div class="cal-bar" :style="{ background: cell.det > 0 ? barColor(cell.det) : 'transparent', width: barWidth(cell.det) + '%' }"></div>
        </template>
      </div>
    </div>

    <!-- Legend -->
    <div class="cal-legend">
      <span style="display:flex;align-items:center;gap:.3rem;"><span class="cal-legend-swatch" style="background:rgba(52,211,153,.3);"></span> {{t('cal_few')}}</span>
      <span style="display:flex;align-items:center;gap:.3rem;"><span class="cal-legend-swatch" style="background:rgba(52,211,153,.6);"></span> {{t('cal_moderate')}}</span>
      <span style="display:flex;align-items:center;gap:.3rem;"><span class="cal-legend-swatch" style="background:rgba(52,211,153,1);"></span> {{t('cal_many')}}</span>
    </div>

  </birdash-shell>
</div>

<script>
const { createApp, ref, computed, onMounted } = Vue;
const { useI18n, useTheme, useNav, birdQuery, localDateStr, navigateTo } = BIRDASH;

const app = createApp({
  setup() {
    const { lang, t } = useI18n();
    useTheme();
    useNav('calendar');

    const todayStr = localDateStr();
    const loading = ref(false);

    // Current viewed month (year, month 0-indexed)
    const viewYear = ref(new Date().getFullYear());
    const viewMonth = ref(new Date().getMonth());

    const isCurrentMonth = computed(() =>
      viewYear.value === new Date().getFullYear() && viewMonth.value === new Date().getMonth()
    );

    const monthLabel = computed(() => {
      const d = new Date(viewYear.value, viewMonth.value, 1);
      return d.toLocaleDateString(lang.value, { month: 'long', year: 'numeric' });
    });

    // Day-of-week labels (Monday first)
    const dowLabels = computed(() => {
      const labels = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(2024, 0, i + 1); // 2024-01-01 is a Monday
        labels.push(d.toLocaleDateString(lang.value, { weekday: 'short' }));
      }
      return labels;
    });

    // Daily data from DB
    const dailyData = ref({}); // { 'YYYY-MM-DD': { det, sp } }
    let maxDet = 1;

    // Build calendar cells
    const cells = computed(() => {
      const y = viewYear.value, m = viewMonth.value;
      const firstDay = new Date(y, m, 1);
      const lastDay = new Date(y, m + 1, 0);
      const daysInMonth = lastDay.getDate();

      // Monday = 0 offset
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;

      const result = [];
      // Empty cells before first day
      for (let i = 0; i < startDow; i++) result.push({ day: 0 });

      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const data = dailyData.value[date] || {};
        result.push({
          day: d,
          date,
          det: data.det || 0,
          sp: data.sp || 0,
          isToday: date === todayStr,
          isFuture: date > todayStr,
        });
      }
      return result;
    });

    // Monthly KPIs
    const monthKpis = computed(() => {
      const prefix = `${viewYear.value}-${String(viewMonth.value + 1).padStart(2, '0')}`;
      const data = Object.entries(dailyData.value).filter(([d]) => d.startsWith(prefix) && d !== '_totalSpecies');
      const totalDet = data.reduce((s, [, v]) => s + (v.det || 0), 0);
      const activeDays = data.filter(([, v]) => v.det > 0).length;
      return {
        species: dailyData.value._totalSpecies || '—',
        detections: totalDet ? totalDet.toLocaleString() : '—',
        avgPerDay: activeDays > 0 ? Math.round(totalDet / activeDays).toLocaleString() : '—',
        activeDays: activeDays || '—',
      };
    });

    function barColor(det) {
      const ratio = Math.min(det / maxDet, 1);
      const a = 0.2 + ratio * 0.8;
      return `rgba(52,211,153,${a.toFixed(2)})`;
    }
    function barWidth(det) {
      if (!det || !maxDet) return 0;
      return Math.max(10, Math.round((det / maxDet) * 100));
    }

    async function loadMonth() {
      loading.value = true;
      const y = viewYear.value, m = viewMonth.value;
      const from = `${y}-${String(m + 1).padStart(2, '0')}-01`;
      const to = `${y}-${String(m + 1).padStart(2, '0')}-${new Date(y, m + 1, 0).getDate()}`;
      try {
        // Aggregate daily_stats (per-species table) into per-day totals
        const rows = await birdQuery(
          `SELECT date, SUM(count_07) as det, COUNT(DISTINCT com_name) as sp
           FROM daily_stats WHERE date >= ? AND date <= ?
           GROUP BY date ORDER BY date`,
          [from, to]
        );
        const map = {};
        let mx = 1;
        // Collect all distinct species across the month for the KPI
        const allSpecies = new Set();
        for (const r of rows) {
          map[r.date] = { det: r.det, sp: r.sp };
          if (r.det > mx) mx = r.det;
        }

        // Get species names per day for monthly total species KPI
        const spRows = await birdQuery(
          `SELECT date, com_name FROM daily_stats WHERE date >= ? AND date <= ? AND count_07 > 0`,
          [from, to]
        );
        for (const r of spRows) {
          allSpecies.add(r.com_name);
          if (!map[r.date]) map[r.date] = { det: 0, sp: 0, species: [] };
          if (!map[r.date].species) map[r.date].species = [];
          map[r.date].species.push(r.com_name);
        }

        // Store total unique species for monthly KPI
        map._totalSpecies = allSpecies.size;
        dailyData.value = map;
        maxDet = mx;
      } catch (e) { console.error('[calendar]', e); }
      loading.value = false;
    }

    function prevMonth() {
      if (viewMonth.value === 0) { viewMonth.value = 11; viewYear.value--; }
      else viewMonth.value--;
      loadMonth();
    }
    function nextMonth() {
      if (isCurrentMonth.value) return;
      if (viewMonth.value === 11) { viewMonth.value = 0; viewYear.value++; }
      else viewMonth.value++;
      loadMonth();
    }

    function openDay(date) {
      window.location.href = 'today.html?date=' + date;
    }

    onMounted(loadMonth);

    return {
      t, lang, loading,
      viewYear, viewMonth, isCurrentMonth, monthLabel, dowLabels,
      cells, monthKpis, dailyData,
      barColor, barWidth,
      prevMonth, nextMonth, openDay,
    };
  }
});
BIRDASH.ready.then(() => BIRDASH.registerComponents(app).mount('#app'));
</script>
</body>
</html>
