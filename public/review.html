<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark light">
  <title>BirdStation — À valider</title>
  <meta property="og:title" content="BirdStation — Review">
  <meta property="og:description" content="Bird detection dashboard — Heinsch, Belgium">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/birds/img/robin-logo.svg">
  <link rel="stylesheet" href="css/bird-styles.css">
  <link rel="stylesheet" href="css/bird-pages.css">
  <script src="js/vue.global.prod.min.js"></script>
  <script src="js/birdash-local.js" onerror=""></script>
  <script src="js/bird-config.js"></script>
  <script src="js/bird-shared.js"></script>
  <script src="js/bird-icons.js"></script>
  <script src="js/bird-vue-core.js"></script>
  <script src="js/bird-spectro-modal.js"></script>
</head>
<body>
<div id="app">
  <birdash-shell page="review" :title="t('nav_review')">

    <!-- Toolbar -->
    <div class="rv-toolbar">
      <!-- Row 1: Period + stats -->
      <div class="rv-row">
        <filter-period
          :period="fp.period.value" :quick-buttons="fp.quickButtons.value"
          :date-from="fp.dateFrom.value" :date-to="fp.dateTo.value"
          @set-period="fp.setPeriod" @set-custom-range="fp.setCustomRange"
        ></filter-period>
        <span class="rv-pill">{{unreviewed}} suspectes</span>
        <span v-if="rejectedCount" class="rv-pill" style="background:rgba(229,62,62,.15);color:#e53e3e;">{{rejectedCount}} ✗</span>
        <span v-if="confirmedCount" class="rv-pill" style="background:rgba(56,161,105,.15);color:#38a169;">{{confirmedCount}} ✓</span>
      </div>

      <!-- Row 2: Selection actions -->
      <div class="rv-row">
        <button class="rv-btn-outline" @click="selectAll">
          {{selected.size === flagged.length ? t('review_deselect') : t('review_select_all')}}
        </button>
        <span class="rv-sep"></span>
        <span style="font-size:.72rem;color:var(--text-muted);">{{t('review_conf_select')}} :</span>
        <select style="font-size:.75rem;padding:.2rem .4rem;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-main);cursor:pointer;"
                @change="selectByConfidence(Number($event.target.value))" :value="confThreshold || ''">
          <option value="">—</option>
          <option v-for="th in [30,40,50,60,70]" :key="th" :value="th">&lt;{{th}}% ({{countBelow(th)}})</option>
        </select>
      </div>

      <!-- Row 3: Bulk actions (only visible when items selected) -->
      <div class="rv-row" v-if="selected.size">
        <span style="font-size:.78rem;font-weight:600;">{{selected.size}} {{t('review_selected')}} :</span>
        <button class="rv-btn rv-btn-ok" @click="bulkAction('confirmed')"><bird-icon name="check" :size="13"></bird-icon> {{t('review_confirm')}}</button>
        <button class="rv-btn rv-btn-maybe" @click="bulkAction('doubtful')"><bird-icon name="help-circle" :size="13"></bird-icon> {{t('review_doubtful_btn')}}</button>
        <button class="rv-btn rv-btn-no" @click="bulkAction('rejected')"><bird-icon name="x" :size="13"></bird-icon> {{t('review_reject')}}</button>
        <span class="rv-sep"></span>
        <button class="rv-btn rv-btn-no" @click="deleteSelected"><bird-icon name="trash-2" :size="13"></bird-icon> {{t('review_delete_selection')}}</button>
      </div>

      <!-- Row 4: Reject by rule + purge rejected -->
      <div class="rv-row" v-if="reasonGroups.length || rejectedCount">
        <template v-if="reasonGroups.length">
          <span style="font-size:.72rem;color:var(--text-muted);">{{t('review_reject_rule')}} :</span>
          <button v-for="rg in reasonGroups" :key="rg.reason"
                  class="rv-btn rv-btn-no" style="font-size:.68rem;padding:.18rem .4rem;" @click="bulkRejectByReason(rg.reason)">
            <bird-icon name="x" :size="11"></bird-icon> {{rg.reason}} ({{rg.count}})
          </button>
        </template>
        <span v-if="reasonGroups.length && rejectedCount" class="rv-sep"></span>
        <button v-if="rejectedCount" class="rv-btn rv-btn-no" style="font-size:.72rem;" @click="openDeleteModal(rejectedList)">
          <bird-icon name="trash-2" :size="13"></bird-icon> {{t('review_purge')}} ({{rejectedCount}})
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="text-align:center;padding:3rem;"><div class="spinner"></div></div>

    <!-- Empty -->
    <div v-else-if="!flagged.length" style="text-align:center;padding:3rem;opacity:.6;">{{t('review_none')}}</div>

    <!-- Detection list -->
    <div v-else style="padding:.5rem 1rem;">
      <div v-for="det in pagedFlagged" :key="det.date + det.time + det.sci_name"
           class="rv-card" :class="det.validation">
        <div style="display:flex;align-items:center;gap:.5rem;">
          <input type="checkbox" :checked="selected.has(detKey(det))" @change="toggleSelect(det)">
          <bird-img :src="API+'/photo?sci='+encodeURIComponent(det.sci_name)" style="width:40px;height:40px;border-radius:50%;"></bird-img>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;">
              <strong style="font-size:.88rem;">{{spName(det.com_name, det.sci_name)}}</strong>
              <span style="font-size:.72rem;font-weight:600;"
                    :style="{color: det.confidence>=0.8?'var(--accent)':det.confidence>=0.7?'#dd6b20':'#e53e3e'}">
                {{fmtConf(det.confidence)}}
              </span>
            </div>
            <div style="font-size:.75rem;color:var(--text-muted);">{{fmtDate(det.date)}} {{det.time.slice(0,5)}} · {{det.model}}</div>
            <div style="margin-top:.2rem;">
              <span v-for="r in det.reasons" :key="r" class="rv-badge">{{r}}</span>
            </div>
          </div>
          <button v-if="det.file_name" class="rv-mini" @click="playAudio(det)" :aria-label="playingDet===detKey(det)?'Stop':'Play'">{{playingDet===detKey(det)?'⏹':'▶'}}</button>
          <button v-if="det.file_name" class="rv-mini" @click="openSpectro(det)" title="Spectrogramme" aria-label="Spectrogramme"><bird-icon name="maximize-2" :size="16" ></bird-icon></button>
          <div class="rv-actions">
            <button class="rv-btn rv-btn-ok" @click="validate(det,'confirmed')" :disabled="det.validation==='confirmed' || validatingKey===detKey(det)">✓</button>
            <button class="rv-btn rv-btn-maybe" @click="validate(det,'doubtful')" :disabled="det.validation==='doubtful' || validatingKey===detKey(det)">?</button>
            <button class="rv-btn rv-btn-no" @click="validate(det,'rejected')" :disabled="det.validation==='rejected' || validatingKey===detKey(det)">✗</button>
          </div>
        </div>
      </div>
      <div v-if="flagged.length > pageLimit" style="text-align:center;padding:.75rem;">
        <button class="rv-btn-outline" @click="pageLimit += 50" style="padding:.4rem 1.2rem;">
          {{t('review_show_more')}} ({{flagged.length - pageLimit}})
        </button>
      </div>
    </div>

    <!-- Delete confirmation / result modal -->
    <div v-if="delOpen" class="tl-popup-overlay" @click.self="closeDeleteModal" @keydown.escape="closeDeleteModal" role="dialog" aria-modal="true">
      <div class="tl-popup" style="max-width:520px;max-height:80vh;overflow-y:auto;">
        <button class="tl-popup-close" @click="closeDeleteModal">✕</button>

        <!-- Before deletion: preview -->
        <template v-if="!delDone">
          <div style="font-weight:600;font-size:1rem;margin-bottom:.5rem;color:#e53e3e;">
            🗑 {{t('review_purge_title')}}
          </div>
          <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.75rem;">
            {{t('review_purge_warning')}}
          </div>
          <div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;">
            <div v-for="det in delItems" :key="det.date+det.time+det.sci_name"
                 style="display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-bottom:1px solid var(--border);font-size:.8rem;">
              <span style="color:var(--text-muted);min-width:70px;">{{fmtDate(det.date)}}</span>
              <span style="color:var(--text-muted);min-width:40px;">{{det.time.slice(0,5)}}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{spName(det.com_name, det.sci_name)}}</span>
              <span style="font-size:.7rem;color:var(--text-faint);">{{fmtConf(det.confidence)}}</span>
            </div>
          </div>
          <div style="display:flex;gap:.5rem;justify-content:flex-end;">
            <button class="rv-btn-outline" @click="closeDeleteModal" style="padding:.4rem 1rem;">{{t('cancel') || 'Annuler'}}</button>
            <button class="rv-btn rv-btn-no" style="padding:.4rem 1rem;" @click="executeDelete" :disabled="delDeleting">
              <template v-if="delDeleting">{{delProgress}}% ({{Math.round(delProgress * delItems.length / 100)}}/{{delItems.length}})</template>
              <template v-else>{{t('review_purge_confirm')}} ({{delItems.length}})</template>
            </button>
          </div>
        </template>

        <!-- After deletion: results -->
        <template v-else>
          <div style="font-weight:600;font-size:1rem;margin-bottom:.5rem;color:#38a169;">
            ✓ {{t('review_delete_done')}}
          </div>
          <div style="max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;">
            <div v-for="r in delResults" :key="r.file"
                 style="display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-bottom:1px solid var(--border);font-size:.8rem;">
              <span :style="{color: r.ok ? '#38a169' : '#e53e3e'}">{{r.ok ? '✓' : '✗'}}</span>
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{r.name}}</span>
              <span style="font-size:.7rem;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;direction:rtl;">{{r.file}}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:flex-end;">
            <button class="rv-btn rv-btn-ok" @click="closeDeleteModal" style="padding:.4rem 1rem;">OK</button>
          </div>
        </template>
      </div>
    </div>

  </birdash-shell>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;
const { useI18n, useTheme, useNav, useFilterPeriod, useSpeciesNames, registerComponents, fmtDate, fmtConf } = BIRDASH;
const { buildAudioUrl } = BIRDASH_UTILS;
const API = BIRD_CONFIG.apiUrl;

const app = createApp({
  setup() {
    const { t } = useI18n();
    const { spName } = useSpeciesNames();
    useTheme(); useNav();

    const flagged = ref([]);
    const totalDets = ref(0);
    const loading = ref(false);
    const pageLimit = ref(50);
    const pagedFlagged = computed(() => flagged.value.slice(0, pageLimit.value));
    const selected = reactive(new Set());
    let _audio = null;
    const playingDet = ref(null);
    const validatingKey = ref(null);
    const fp = useFilterPeriod({ default: '7d', buttons: ['1d','7d','30d','90d','all'], onChange: loadFlagged });

    function detKey(d) { return `${d.date}|${d.time}|${d.sci_name}`; }
    const unreviewed = computed(() => flagged.value.filter(d => d.validation === 'unreviewed').length);
    const rejectedList = computed(() => flagged.value.filter(d => d.validation === 'rejected'));
    const rejectedCount = computed(() => rejectedList.value.length);
    const confirmedCount = computed(() => flagged.value.filter(d => d.validation === 'confirmed').length);
    const reasonGroups = computed(() => {
      const g = {};
      for (const d of flagged.value) { if (d.validation !== 'unreviewed') continue; for (const r of d.reasons) g[r] = (g[r]||0)+1; }
      return Object.entries(g).map(([reason,count]) => ({reason,count})).sort((a,b) => b.count-a.count);
    });

    async function loadFlagged() {
      loading.value = true; selected.clear(); pageLimit.value = 50;
      try {
        const from = fp.dateFrom.value || new Date().toISOString().split('T')[0];
        const to = fp.dateTo.value || from;
        const resp = await fetch(`${API}/flagged-detections?dateFrom=${from}&dateTo=${to}&limit=2000`);
        const data = await resp.json();
        flagged.value = data.flagged || [];
        totalDets.value = data.total || 0;
      } catch(e) { console.error('loadFlagged:', e); }
      loading.value = false;
    }

    // Helper: POST that throws on any failure path. Mirrors _postJson in
    // settings.html so review.html follows the same "real ack" rule:
    // we only update the UI once the server has acknowledged success.
    async function _bulkPost(detections, status) {
      const resp = await fetch(`${API}/bulk-validate`, {
        method: 'POST',
        headers: BIRDASH.authHeaders(),
        body: JSON.stringify({ detections, status }),
      });
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok || data.error) {
        throw new Error(data.error || `HTTP ${resp.status} ${resp.statusText}`);
      }
      return data;
    }

    async function validate(det, status) {
      if (validatingKey.value) return;
      validatingKey.value = detKey(det);
      const labels = { confirmed: t('review_confirmed_msg'), rejected: t('review_rejected_msg'), doubtful: t('review_doubtful_msg') };
      try {
        await _bulkPost([{date:det.date,time:det.time,sci_name:det.sci_name}], status);
        det.validation = status; window.dispatchEvent(new Event('birdash:review-changed'));
        window.dispatchEvent(new CustomEvent('birdash:success', {detail: (labels[status] || status) + ' — ' + spName(det.com_name, det.sci_name)}));
      } catch(e) {
        console.error('validate:', e);
        window.dispatchEvent(new CustomEvent('birdash:error', {detail: t('review_action_error') + ': ' + e.message}));
      } finally {
        validatingKey.value = null;
      }
    }

    async function bulkAction(status) {
      const dets = flagged.value.filter(d => selected.has(detKey(d)));
      if (!dets.length) return;
      const labels = { confirmed: t('review_confirm'), rejected: t('review_reject'), doubtful: '?' };
      if (!confirm(`${labels[status] || status} ${dets.length} ?`)) return;
      try {
        await _bulkPost(dets.map(d => ({date:d.date,time:d.time,sci_name:d.sci_name})), status);
        for (const d of dets) d.validation = status;
        selected.clear(); window.dispatchEvent(new Event('birdash:review-changed'));
        window.dispatchEvent(new CustomEvent('birdash:success', {detail: `${labels[status]} — ${dets.length} ${t('review_detections')}`}));
      } catch(e) {
        console.error('bulkAction:', e);
        window.dispatchEvent(new CustomEvent('birdash:error', {detail: t('review_action_error') + ': ' + e.message}));
      }
    }

    async function bulkRejectByReason(reason) {
      const matching = flagged.value.filter(d => d.reasons.includes(reason) && d.validation==='unreviewed');
      if (!matching.length || !confirm(`${t('review_reject')} ${matching.length} "${reason}" ?`)) return;
      try {
        await _bulkPost(matching.map(d => ({date:d.date,time:d.time,sci_name:d.sci_name})), 'rejected');
        for (const d of matching) d.validation = 'rejected'; window.dispatchEvent(new Event('birdash:review-changed'));
        window.dispatchEvent(new CustomEvent('birdash:success', {detail: `${t('review_reject')} — ${matching.length} "${reason}"`}));
      } catch(e) {
        console.error('bulkRejectByReason:', e);
        window.dispatchEvent(new CustomEvent('birdash:error', {detail: t('review_action_error') + ': ' + e.message}));
      }
    }

    function toggleSelect(det) { const k=detKey(det); selected.has(k)?selected.delete(k):selected.add(k); }
    function selectAll() { selected.size===flagged.value.length ? selected.clear() : flagged.value.forEach(d => selected.add(detKey(d))); }

    // ── Confidence-based selection ────────────────────────────
    const confThreshold = ref(null);

    function countBelow(pct) {
      return flagged.value.filter(d => d.confidence < pct / 100).length;
    }

    function selectByConfidence(pct) {
      selected.clear();
      if (confThreshold.value === pct) { confThreshold.value = null; return; }
      confThreshold.value = pct;
      for (const d of flagged.value) {
        if (d.confidence < pct / 100) selected.add(detKey(d));
      }
    }

    function playAudio(det) {
      const key = detKey(det);
      if (_audio && playingDet.value===key) { _audio.pause(); _audio=null; playingDet.value=null; return; }
      if (_audio) { _audio.pause(); _audio=null; }
      const url = buildAudioUrl(det.file_name); if (!url) return;
      _audio = new Audio(url); _audio.play(); playingDet.value = key;
      _audio.onended = () => { playingDet.value=null; _audio=null; };
    }

    function openSpectro(det) {
      BIRDASH.openSpectroModal({ fileName:det.file_name, speciesName:det.com_name, sciName:det.sci_name, confidence:det.confidence, date:det.date, time:det.time });
    }

    // ── Delete modal (shared by "delete selected" and "purge rejected") ──
    const delOpen = ref(false);
    const delItems = ref([]);
    const delDeleting = ref(false);
    const delDone = ref(false);
    const delResults = ref([]);

    function deleteSelected() {
      const items = flagged.value.filter(d => selected.has(detKey(d)));
      if (!items.length) return;
      openDeleteModal(items);
    }

    function openDeleteModal(items) {
      delItems.value = items.map(d => ({ ...d }));
      delDeleting.value = false;
      delDone.value = false;
      delResults.value = [];
      delOpen.value = true;
    }

    async function closeDeleteModal() {
      delOpen.value = false;
      if (delDone.value) {
        const ok = delResults.value.filter(r => r.ok).length;
        const fail = delResults.value.filter(r => !r.ok).length;
        selected.clear();
        await loadFlagged();
        window.dispatchEvent(new Event('birdash:review-changed'));
        if (ok > 0) window.dispatchEvent(new CustomEvent('birdash:success', { detail: `${ok} ${t('review_deleted_count')}` }));
        if (fail > 0) window.dispatchEvent(new CustomEvent('birdash:error', { detail: `${fail} ${t('review_delete_failed')}` }));
      }
    }

    const delProgress = ref(0);
    async function executeDelete() {
      delDeleting.value = true;
      delProgress.value = 0;
      const results = [];
      const total = delItems.value.length;
      for (let i = 0; i < total; i++) {
        const det = delItems.value[i];
        delProgress.value = Math.round((i / total) * 100);
        try {
          const resp = await fetch(`${API}/detections`, { method:'DELETE', headers:BIRDASH.authHeaders(),
            body: JSON.stringify({ date:det.date, time:det.time, comName:det.com_name }) });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok || data.error) {
            throw new Error(data.error || `HTTP ${resp.status}`);
          }
          results.push({ name: det.com_name, file: det.file_name, ok: true });
        } catch(e) {
          results.push({ name: det.com_name, file: det.file_name, ok: false, error: e.message });
        }
      }
      delProgress.value = 100;
      delDeleting.value = false;
      delResults.value = results;
      delDone.value = true;
    }

    onMounted(loadFlagged);

    return {
      t, spName, fp, API, fmtDate, fmtConf,
      flagged, pagedFlagged, loading, pageLimit, selected, playingDet,
      unreviewed, rejectedList, rejectedCount, confirmedCount, reasonGroups,
      delOpen, delItems, delDeleting, delDone, delResults, delProgress,
      detKey, loadFlagged, validate, bulkAction, bulkRejectByReason, validatingKey,
      toggleSelect, selectAll, confThreshold, countBelow, selectByConfidence,
      playAudio, openSpectro,
      deleteSelected, openDeleteModal, closeDeleteModal, executeDelete,
    };
  }
});
BIRDASH.ready.then(() => registerComponents(app).mount('#app'));
</script>
</body>
</html>
