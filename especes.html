<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Espèces</title>
  <link rel="stylesheet" href="bird-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right">
      <div id="theme-switcher"></div>
        <div id="lang-switcher"></div>
    </div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- Sélecteur si pas de param URL -->
    <div id="species-picker" style="display:none;" class="card" style="margin-bottom:1rem;">
      <div class="card-title" data-i18n="filter_species"></div>
      <div style="display:flex; gap:.6rem; align-items:center;">
        <select class="bird-select" id="picker-select" style="min-width:250px; flex:1;"></select>
        <button class="btn btn-primary" onclick="selectSpecies()"
                data-i18n="apply_filter"></button>
      </div>
    </div>

    <!-- Fiche espèce -->
    <div id="species-detail" style="display:none;">

      <!-- Header espèce -->
      <div style="display:flex; gap:1.25rem; align-items:flex-start; margin-bottom:1rem; flex-wrap:wrap;">
        <!-- Photo Wikipedia -->
        <div id="species-photo-wrap" style="flex-shrink:0;">
          <div id="species-photo" style="
            width:120px; height:120px; border-radius:var(--radius-lg);
            background:var(--bg-card2); border:1px solid var(--border);
            display:flex; align-items:center; justify-content:center;
            font-size:3rem; overflow:hidden;">🦜</div>
        </div>

        <!-- Infos -->
        <div style="flex:1; min-width:200px;">
          <h1 id="sp-name" style="font-family:var(--font-display); font-size:1.8rem;
              font-weight:600; color:var(--text-main); margin-bottom:.2rem;"></h1>
          <div id="sp-sci" style="font-style:italic; color:var(--text-muted);
               font-size:1rem; margin-bottom:.75rem;"></div>
          <!-- Liens externes -->
          <div class="ext-links" id="ext-links"></div>
        </div>

        <!-- KPIs espèce -->
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem; flex-shrink:0;">
          <div class="kpi-card" style="text-align:center; min-width:100px;">
            <div class="kpi-value" id="sp-total">—</div>
            <div class="kpi-label" data-i18n="total_detections"></div>
          </div>
          <div class="kpi-card" style="text-align:center;">
            <div class="kpi-value amber" id="sp-conf">—</div>
            <div class="kpi-label" data-i18n="max_confidence"></div>
          </div>
          <div class="kpi-card" style="text-align:center;">
            <div class="kpi-value muted" id="sp-first">—</div>
            <div class="kpi-label" data-i18n="first_detection"></div>
          </div>
          <div class="kpi-card" style="text-align:center;">
            <div class="kpi-value muted" id="sp-last">—</div>
            <div class="kpi-label" data-i18n="last_seen"></div>
          </div>
        </div>
      </div>

      <!-- Graphiques -->
      <div class="grid-2" style="margin-bottom:1rem;">
        <div class="card">
          <div class="card-title" data-i18n="activity_by_hour"></div>
          <div class="chart-wrap"><canvas id="chart-hourly"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title" data-i18n="monthly_presence"></div>
          <div class="chart-wrap"><canvas id="chart-monthly"></canvas></div>
        </div>
      </div>

      <!-- 30 derniers jours -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-title" id="title-30d"></div>
        <div class="chart-wrap"><canvas id="chart-30d"></canvas></div>
      </div>

      <!-- Dernières détections -->
      <div class="card">
        <div class="card-title" data-i18n="recent_detections"></div>
        <div id="sp-recent-feed"></div>
        <div style="margin-top:.75rem;">
          <a id="link-all-dets" class="btn btn-secondary" href="#"></a>
        </div>
      </div>

    </div>

    <div id="sp-loading" class="spinner" style="padding:4rem;"><div></div><div></div><div></div></div>

  </main>
</div>

<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
let currentSpecies = null;
let chartH = null, chartM = null, chart30 = null;

document.addEventListener('DOMContentLoaded', async () => {
  initPage('especes');
  applyI18n();

  const sp = getUrlParam('species');
  if (sp) {
    await loadSpeciesDetail(decodeURIComponent(sp));
  } else {
    await showPicker();
  }
});

document.addEventListener('langchange', () => {
  applyI18n();
  if (currentSpecies) {
    // Recharge les labels des charts
    updateChartLabels();
  }
});

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const t30 = document.getElementById('title-30d');
  if (t30) t30.textContent = t('detections') + ' — 30 ' + t('this_month').toLowerCase();
  const linkAll = document.getElementById('link-all-dets');
  if (linkAll && currentSpecies)
    linkAll.textContent = t('nav_detections') + ' →';
}

// ── Picker espèce ─────────────────────────────────────────────────────────────
async function showPicker() {
  document.getElementById('sp-loading').style.display = 'none';
  document.getElementById('species-picker').style.display = 'block';
  const rows = await birdQuery(
    `SELECT DISTINCT Com_Name FROM detections ORDER BY Com_Name ASC`
  );
  const sel = document.getElementById('picker-select');
  sel.innerHTML = rows.map(r =>
    `<option value="${r.Com_Name}">${r.Com_Name}</option>`
  ).join('');
}

function selectSpecies() {
  const val = document.getElementById('picker-select').value;
  if (val) {
    document.getElementById('species-picker').style.display = 'none';
    loadSpeciesDetail(val);
  }
}

// ── Chargement fiche espèce ───────────────────────────────────────────────────
async function loadSpeciesDetail(speciesName) {
  currentSpecies = speciesName;
  document.getElementById('sp-loading').style.display = 'flex';
  document.getElementById('species-detail').style.display = 'none';

  try {
    // Stats globales
    const [stats] = await birdQuery(
      `SELECT COUNT(*) as total,
              ROUND(MAX(Confidence)*100,1) as max_conf,
              ROUND(AVG(Confidence)*100,1) as avg_conf,
              MIN(Date) as first_date,
              MAX(Date) as last_date,
              MAX(Sci_Name) as sci
       FROM detections WHERE Com_Name = ?`,
      [speciesName]
    );

    if (!stats || !stats.total) {
      document.getElementById('sp-loading').innerHTML =
        `<div class="error-msg">${t('no_data')}</div>`;
      return;
    }

    // Rempli le header
    document.getElementById('sp-name').textContent    = speciesName;
    document.getElementById('sp-sci').textContent     = stats.sci || '';
    document.getElementById('sp-total').textContent   = stats.total.toLocaleString();
    document.getElementById('sp-conf').textContent    = stats.max_conf + '%';
    document.getElementById('sp-first').textContent   = fmtDate(stats.first_date);
    document.getElementById('sp-last').textContent    = fmtDate(stats.last_date);
    document.title = `PIBIRD — ${speciesName}`;

    // Liens externes
    renderExtLinks(speciesName, stats.sci || '');

    // Image Wikipedia (async, non bloquant)
    fetchSpeciesImage(stats.sci || speciesName).then(imgUrl => {
      const el = document.getElementById('species-photo');
      if (imgUrl) {
        el.innerHTML = `<img src="${imgUrl}" alt="${speciesName}"
          style="width:100%; height:100%; object-fit:cover;">`;
      }
    });

    // Lien vers toutes les détections
    const linkAll = document.getElementById('link-all-dets');
    linkAll.href = `detections.html?species=${encodeURIComponent(speciesName)}`;
    linkAll.textContent = t('nav_detections') + ' →';

    // Titre 30j
    document.getElementById('title-30d').textContent =
      t('detections') + ' — 30 jours';

    document.getElementById('sp-loading').style.display = 'none';
    document.getElementById('species-detail').style.display = 'block';

    // Charge les graphiques en parallèle
    await Promise.all([
      loadHourlyChart(speciesName),
      loadMonthlyChart(speciesName),
      load30dChart(speciesName),
      loadRecentFeed(speciesName),
    ]);

  } catch(e) {
    document.getElementById('sp-loading').innerHTML =
      `<div class="error-msg">⚠ ${e.message}</div>`;
  }
}

// ── Liens externes ────────────────────────────────────────────────────────────
function renderExtLinks(comName, sciName) {
  const links = buildSpeciesLinks(comName, sciName);
  document.getElementById('ext-links').innerHTML =
    Object.values(links).map(l =>
      `<a class="ext-link" href="${l.url}" target="_blank" rel="noopener">
        ${l.icon} ${l.label}
      </a>`
    ).join('');
}

// ── Graphique horaire ─────────────────────────────────────────────────────────
async function loadHourlyChart(sp) {
  const rows = await birdQuery(
    `SELECT CAST(SUBSTR(Time,1,2) AS INTEGER) as h, COUNT(*) as n
     FROM detections WHERE Com_Name = ?
     GROUP BY h ORDER BY h ASC`,
    [sp]
  );
  const byHour = Array(24).fill(0);
  rows.forEach(r => { byHour[r.h] = r.n; });

  if (chartH) chartH.destroy();
  const base = chartDefaults();
  chartH = new Chart(document.getElementById('chart-hourly').getContext('2d'), {
    type: 'bar',
    data: {
      labels: Array.from({length:24}, (_,i) => `${String(i).padStart(2,'0')}h`),
      datasets: [{
        label: t('detections'),
        data: byHour,
        backgroundColor: 'rgba(90,158,58,.65)',
        borderColor: '#5a9e3a',
        borderWidth: 1,
        borderRadius: 2,
      }]
    },
    options: {
      ...base,
      plugins: { ...base.plugins, legend: { display: false } },
      scales: {
        x: { ...base.scales.x, ticks: { font: { size: 9 } } },
        y: { ...base.scales.y, beginAtZero: true },
      }
    }
  });
}

// ── Graphique mensuel ─────────────────────────────────────────────────────────
async function loadMonthlyChart(sp) {
  const rows = await birdQuery(
    `SELECT CAST(SUBSTR(Date,6,2) AS INTEGER) as m, COUNT(*) as n
     FROM detections WHERE Com_Name = ?
     GROUP BY m ORDER BY m ASC`,
    [sp]
  );
  const byMonth = Array(12).fill(0);
  rows.forEach(r => { byMonth[r.m - 1] = r.n; });

  if (chartM) chartM.destroy();
  const base = chartDefaults();
  chartM = new Chart(document.getElementById('chart-monthly').getContext('2d'), {
    type: 'bar',
    data: {
      labels: t('months_short'),
      datasets: [{
        label: t('detections'),
        data: byMonth,
        backgroundColor: byMonth.map(v =>
          v > 0 ? 'rgba(200,168,75,.65)' : 'rgba(200,168,75,.1)'
        ),
        borderColor: '#c8a84b',
        borderWidth: 1,
        borderRadius: 2,
      }]
    },
    options: {
      ...base,
      plugins: { ...base.plugins, legend: { display: false } },
      scales: {
        x: { ...base.scales.x, ticks: { font: { size: 10 } } },
        y: { ...base.scales.y, beginAtZero: true },
      }
    }
  });
}

// ── 30 derniers jours ─────────────────────────────────────────────────────────
async function load30dChart(sp) {
  const from = daysAgo(29);
  const rows = await birdQuery(
    `SELECT Date, COUNT(*) as n
     FROM detections WHERE Com_Name = ? AND Date >= ?
     GROUP BY Date ORDER BY Date ASC`,
    [sp, from]
  );
  const map = {};
  rows.forEach(r => { map[r.Date] = r.n; });
  const labels = [], data = [];
  for (let i = 29; i >= 0; i--) {
    const d = daysAgo(i);
    const mo = t('months_short')[new Date(d).getMonth()];
    labels.push(`${new Date(d).getDate()} ${mo}`);
    data.push(map[d] || 0);
  }

  if (chart30) chart30.destroy();
  const base = chartDefaults();
  chart30 = new Chart(document.getElementById('chart-30d').getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: t('detections'),
        data,
        backgroundColor: 'rgba(74,138,181,.65)',
        borderColor: '#4a8ab5',
        borderWidth: 1,
        borderRadius: 2,
      }]
    },
    options: {
      ...base,
      plugins: { ...base.plugins, legend: { display: false } },
      scales: {
        x: { ...base.scales.x, ticks: { maxTicksLimit: 10, font: { size: 9 } } },
        y: { ...base.scales.y, beginAtZero: true },
      }
    }
  });
}

// ── Feed dernières détections ─────────────────────────────────────────────────
async function loadRecentFeed(sp) {
  const feed = document.getElementById('sp-recent-feed');
  const rows = await birdQuery(
    `SELECT Date, Time, Confidence, File_Name
     FROM detections WHERE Com_Name = ?
     ORDER BY Date DESC, Time DESC LIMIT 10`,
    [sp]
  );
  if (!rows.length) { feed.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }

  feed.innerHTML = rows.map(d => {
    const conf = parseFloat(d.Confidence);
    const cc   = conf >= 0.8 ? 'conf-high' : conf >= 0.6 ? 'conf-mid' : 'conf-low';
    const safeFile = d.File_Name ? d.File_Name.replace(/'/g,"&#39;") : '';
    const playBtn  = d.File_Name
      ? `<button class="play-btn" style="width:22px;height:22px;font-size:.6rem;"
               onclick="toggleAudio('${safeFile}',this)">▶</button>`
      : '<span style="width:22px;display:inline-block;"></span>';
    return `
      <div class="det-item">
        ${playBtn}
        <div class="det-time">${fmtDate(d.Date)}</div>
        <div class="det-time" style="min-width:44px;">${fmtTime(d.Time)}</div>
        <div style="flex:1;"></div>
        <span class="conf-badge ${cc}">${fmtConf(d.Confidence)}</span>
      </div>`;
  }).join('');
}

function updateChartLabels() {
  // Reconstruit les labels mensuels si la langue change
  if (chartM) {
    chartM.data.labels = t('months_short');
    chartM.update();
  }
}
</script>
</body>
</html>
