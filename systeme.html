<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Système</title>
  <link rel="stylesheet" href="bird-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .status-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: .4rem; flex-shrink: 0;
    }
    .dot-ok   { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-warn { background: var(--amber);  box-shadow: 0 0 6px var(--amber); }
    .dot-err  { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

    .sys-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: .55rem 0; border-bottom: 1px solid var(--bg-card2);
      font-size: .85rem;
    }
    .sys-row:last-child { border-bottom: none; }
    .sys-label { color: var(--text-muted); font-size: .75rem; text-transform: uppercase;
                 letter-spacing: .05em; }
    .sys-value { color: var(--text-main); font-family: monospace; font-size: .85rem; }

    .gap-item {
      padding: .4rem .6rem; background: rgba(224,108,74,.1);
      border: 1px solid rgba(224,108,74,.2); border-radius: var(--radius);
      font-size: .8rem; margin-bottom: .35rem;
    }
    .gap-date { color: var(--danger); font-weight: 500; }
    .gap-days { color: var(--text-muted); font-size: .72rem; }
  </style>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right"><div id="theme-switcher"></div>
        <div id="lang-switcher"></div></div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- Ligne 1 : État API + DB infos -->
    <div class="grid-2" style="margin-bottom:1rem;">

      <!-- État du service -->
      <div class="card">
        <div class="card-title" data-i18n="service_status"></div>
        <div id="api-status">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

      <!-- Infos DB -->
      <div class="card">
        <div class="card-title" data-i18n="db_status"></div>
        <div id="db-info">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

    </div>

    <!-- Fraîcheur des données + Gaps -->
    <div class="grid-2" style="margin-bottom:1rem;">

      <!-- Fraîcheur -->
      <div class="card">
        <div class="card-title" data-i18n="data_freshness"></div>
        <div id="freshness-info">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

      <!-- Gaps de données -->
      <div class="card">
        <div class="card-title">⚠️ Jours sans données (> 1 jour de gap)</div>
        <div id="gaps-info">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

    </div>

    <!-- Activité 30 jours (détections par jour) -->
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-title">📈 Activité quotidienne — 30 derniers jours</div>
      <div class="chart-wrap">
        <canvas id="chart-activity"></canvas>
      </div>
    </div>

    <!-- Détections par heure (global) -->
    <div class="card">
      <div class="card-title">🕐 Distribution horaire globale</div>
      <div class="chart-wrap">
        <canvas id="chart-hourly-global"></canvas>
      </div>
    </div>

  </main>
</div>

<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
let chartActivity = null, chartHourly = null;

document.addEventListener('DOMContentLoaded', async () => {
  initPage('systeme');
  applyI18n();
  await Promise.all([
    checkApiStatus(),
    loadDbInfo(),
    loadFreshness(),
    loadGaps(),
    loadActivityChart(),
    loadHourlyGlobalChart(),
  ]);
});

document.addEventListener('langchange', applyI18n);

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

// ── État API ──────────────────────────────────────────────────────────────────
async function checkApiStatus() {
  const cont = document.getElementById('api-status');
  const t0 = Date.now();
  try {
    const res = await fetch(`${BIRD_CONFIG.apiUrl}/health`);
    const data = await res.json();
    const ms = Date.now() - t0;
    cont.innerHTML = `
      <div class="sys-row">
        <span class="sys-label">API bird-server</span>
        <span class="sys-value" style="display:flex;align-items:center;">
          <span class="status-dot dot-ok"></span> ${t('api_ok')}
        </span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Latence</span>
        <span class="sys-value">${ms} ms</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">${t('db_total')}</span>
        <span class="sys-value">${data.total_detections ? data.total_detections.toLocaleString() : '—'}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Port</span>
        <span class="sys-value">7474</span>
      </div>`;
  } catch(e) {
    cont.innerHTML = `
      <div class="sys-row">
        <span class="sys-label">API bird-server</span>
        <span class="sys-value" style="display:flex;align-items:center;">
          <span class="status-dot dot-err"></span> ${t('api_error')}
        </span>
      </div>
      <div class="error-msg" style="padding:.5rem 0;">${e.message}</div>`;
  }
}

// ── Infos DB ──────────────────────────────────────────────────────────────────
async function loadDbInfo() {
  const cont = document.getElementById('db-info');
  try {
    const [stats] = await birdQuery(
      `SELECT COUNT(*) as total,
              COUNT(DISTINCT Com_Name) as species,
              COUNT(DISTINCT Date) as days,
              MIN(Date) as first,
              MAX(Date) as last
       FROM detections`
    );
    const [conf] = await birdQuery(
      `SELECT ROUND(AVG(Confidence)*100,1) as avg_conf,
              ROUND(MIN(Confidence)*100,1) as min_conf,
              ROUND(MAX(Confidence)*100,1) as max_conf
       FROM detections`
    );
    cont.innerHTML = `
      <div class="sys-row">
        <span class="sys-label">${t('db_total')}</span>
        <span class="sys-value">${stats.total.toLocaleString()}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Espèces distinctes</span>
        <span class="sys-value">${stats.species}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Jours enregistrés</span>
        <span class="sys-value">${stats.days}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">${t('db_first')}</span>
        <span class="sys-value">${fmtDate(stats.first)}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">${t('db_last')}</span>
        <span class="sys-value">${fmtDate(stats.last)}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Confiance moy. / min / max</span>
        <span class="sys-value">${conf.avg_conf}% / ${conf.min_conf}% / ${conf.max_conf}%</span>
      </div>`;
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Fraîcheur ─────────────────────────────────────────────────────────────────
async function loadFreshness() {
  const cont = document.getElementById('freshness-info');
  try {
    const [last] = await birdQuery(
      `SELECT Date, Time, Com_Name FROM detections ORDER BY Date DESC, Time DESC LIMIT 1`
    );
    const [today] = await birdQuery(
      `SELECT COUNT(*) as n FROM detections WHERE Date = ?`, [localDateStr()]
    );
    const [yesterday] = await birdQuery(
      `SELECT COUNT(*) as n FROM detections WHERE Date = ?`, [daysAgo(1)]
    );

    const lastDt = last ? new Date(`${last.Date}T${last.Time}`) : null;
    const diffMs = lastDt ? Date.now() - lastDt.getTime() : null;
    const diffMin = diffMs ? Math.floor(diffMs / 60000) : null;

    let freshIcon = '🟢', freshText = '—';
    if (diffMin !== null) {
      if (diffMin < 30)        { freshIcon = '🟢'; freshText = freshnessLabel(last.Date, last.Time); }
      else if (diffMin < 120)  { freshIcon = '🟡'; freshText = freshnessLabel(last.Date, last.Time); }
      else                     { freshIcon = '🔴'; freshText = freshnessLabel(last.Date, last.Time); }
    }

    cont.innerHTML = `
      <div class="sys-row">
        <span class="sys-label">Dernière détection</span>
        <span class="sys-value" style="display:flex;align-items:center;gap:.4rem;">
          ${freshIcon} ${last ? last.Com_Name : '—'}
        </span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Date / Heure</span>
        <span class="sys-value">${last ? fmtDate(last.Date) + ' ' + fmtTime(last.Time) : '—'}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Fraîcheur</span>
        <span class="sys-value">${freshText}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Détections aujourd'hui</span>
        <span class="sys-value" style="color:var(--accent);">${today ? today.n.toLocaleString() : '0'}</span>
      </div>
      <div class="sys-row">
        <span class="sys-label">Détections hier</span>
        <span class="sys-value">${yesterday ? yesterday.n.toLocaleString() : '0'}</span>
      </div>`;
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Gaps de données ────────────────────────────────────────────────────────────
async function loadGaps() {
  const cont = document.getElementById('gaps-info');
  try {
    const rows = await birdQuery(
      `SELECT Date FROM detections GROUP BY Date ORDER BY Date ASC`
    );
    if (rows.length < 2) { cont.innerHTML = `<p style="color:var(--accent); font-size:.85rem;">✓ Aucun gap détecté</p>`; return; }

    const gaps = [];
    for (let i = 1; i < rows.length; i++) {
      const prev = new Date(rows[i-1].Date);
      const curr = new Date(rows[i].Date);
      const diff = Math.round((curr - prev) / 86400000);
      if (diff > 1) {
        gaps.push({ from: rows[i-1].Date, to: rows[i].Date, days: diff - 1 });
      }
    }

    if (!gaps.length) {
      cont.innerHTML = `<p style="color:var(--accent); font-size:.85rem; padding:.5rem 0;">✓ Aucun gap — données continues</p>`;
      return;
    }

    // Trie par durée décroissante
    gaps.sort((a,b) => b.days - a.days);
    const top = gaps.slice(0, 8);

    cont.innerHTML = `
      <p style="font-size:.75rem; color:var(--text-muted); margin-bottom:.5rem;">
        ${gaps.length} gap(s) détecté(s) au total
      </p>
      ${top.map(g => `
        <div class="gap-item">
          <span class="gap-date">${fmtDate(g.from)} → ${fmtDate(g.to)}</span>
          <span class="gap-days"> — ${g.days} jour(s) manquant(s)</span>
        </div>`).join('')}`;
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Activité 30 jours ─────────────────────────────────────────────────────────
async function loadActivityChart() {
  try {
    const from = daysAgo(29);
    const rows = await birdQuery(
      `SELECT Date, COUNT(*) as n FROM detections
       WHERE Date >= ? GROUP BY Date ORDER BY Date ASC`,
      [from]
    );
    const map = {};
    rows.forEach(r => { map[r.Date] = r.n; });

    const labels = [], data = [];
    for (let i = 29; i >= 0; i--) {
      const d = daysAgo(i);
      const mo = t('months_short')[new Date(d).getMonth()];
      labels.push(`${new Date(d).getDate()} ${mo}`);
      data.push(map[d] || 0);
    }

    if (chartActivity) chartActivity.destroy();
    const base = chartDefaults();
    chartActivity = new Chart(
      document.getElementById('chart-activity').getContext('2d'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: t('detections'),
          data,
          backgroundColor: data.map(v => v === 0 ? 'rgba(224,108,74,.3)' : 'rgba(90,158,58,.65)'),
          borderColor: data.map(v => v === 0 ? '#e06c4a' : '#5a9e3a'),
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        ...base,
        plugins: { ...base.plugins, legend: { display: false } },
        scales: {
          x: { ...base.scales.x, ticks: { maxTicksLimit: 10, font: { size: 9 } } },
          y: { ...base.scales.y, beginAtZero: true },
        }
      }
    });
  } catch(e) { console.error('activity chart:', e); }
}

// ── Distribution horaire globale ──────────────────────────────────────────────
async function loadHourlyGlobalChart() {
  try {
    const rows = await birdQuery(
      `SELECT CAST(SUBSTR(Time,1,2) AS INTEGER) as h, COUNT(*) as n
       FROM detections GROUP BY h ORDER BY h ASC`
    );
    const byHour = Array(24).fill(0);
    rows.forEach(r => { byHour[r.h] = r.n; });

    if (chartHourly) chartHourly.destroy();
    const base = chartDefaults();
    chartHourly = new Chart(
      document.getElementById('chart-hourly-global').getContext('2d'), {
      type: 'bar',
      data: {
        labels: Array.from({length:24}, (_,i) => `${String(i).padStart(2,'0')}h`),
        datasets: [{
          label: t('detections'),
          data: byHour,
          backgroundColor: 'rgba(74,138,181,.65)',
          borderColor: '#4a8ab5',
          borderWidth: 1,
          borderRadius: 2,
        }]
      },
      options: {
        ...base,
        plugins: { ...base.plugins, legend: { display: false } },
        scales: {
          x: { ...base.scales.x, ticks: { font: { size: 10 } } },
          y: { ...base.scales.y, beginAtZero: true },
        }
      }
    });
  } catch(e) { console.error('hourly global chart:', e); }
}
</script>
</body>
</html>
