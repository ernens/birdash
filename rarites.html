<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PIBIRD — Rarités</title>
  <link rel="stylesheet" href="bird-styles.css">
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <span class="brand-name">🐦 PIBIRD</span>
      <span class="brand-sub">Bruxelles</span>
    </div>
    <div class="header-right"><div id="theme-switcher"></div>
        <div id="lang-switcher"></div></div>
  </header>

  <nav class="app-nav"><div id="main-nav"></div></nav>

  <main class="app-main">

    <!-- Filtre seuil -->
    <div class="filter-bar" style="margin-bottom:1rem;">
      <div class="filter-group">
        <label data-i18n="filter_confidence"></label>
        <select class="bird-select" id="f-conf">
          <option value="0">0%</option>
          <option value="0.5">50%</option>
          <option value="0.7" selected>70%</option>
          <option value="0.8">80%</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Seuil rarité (max détections)</label>
        <select class="bird-select" id="f-rarity">
          <option value="5">≤ 5</option>
          <option value="10" selected>≤ 10</option>
          <option value="25">≤ 25</option>
          <option value="50">≤ 50</option>
        </select>
      </div>
      <div class="filter-group" style="flex-direction:row; align-self:flex-end; gap:.4rem;">
        <button class="btn btn-primary" onclick="load()" data-i18n="apply_filter"></button>
      </div>
    </div>

    <!-- KPIs rarités -->
    <div class="kpi-grid" id="rarity-kpis" style="margin-bottom:1rem;"></div>

    <!-- Grille 2 colonnes -->
    <div class="grid-2" style="margin-bottom:1rem;">

      <!-- Espèces vues une seule fois -->
      <div class="card">
        <div class="card-title">💎 Vues une seule fois</div>
        <div id="once-list">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

      <!-- Détections récentes d'espèces rares -->
      <div class="card">
        <div class="card-title">🕐 Dernières détections rares</div>
        <div id="recent-rare">
          <div class="spinner"><div></div><div></div><div></div></div>
        </div>
      </div>

    </div>

    <!-- Table complète des espèces rares -->
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:.75rem 1rem; border-bottom:1px solid var(--border);">
        <div class="card-title" style="margin-bottom:0;" id="rare-table-title"></div>
      </div>
      <div id="rare-table-wrap">
        <div class="spinner" style="padding:2rem;"><div></div><div></div><div></div></div>
      </div>
    </div>

  </main>
</div>

<script src="bird-config.js"></script>
<script src="bird-i18n.js"></script>
<script src="bird-core.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  initPage('rarites');
  applyI18n();
  load();
});

document.addEventListener('langchange', applyI18n);

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
}

async function load() {
  const conf   = parseFloat(document.getElementById('f-conf').value);
  const maxDet = parseInt(document.getElementById('f-rarity').value);

  const titleEl = document.getElementById('rare-table-title');
  if (titleEl) titleEl.textContent = t('rare_desc', { n: maxDet });

  await Promise.all([
    loadKpis(conf, maxDet),
    loadOnceList(conf),
    loadRecentRare(conf, maxDet),
    loadRareTable(conf, maxDet),
  ]);
}

// ── KPIs ─────────────────────────────────────────────────────────────────────
async function loadKpis(conf, maxDet) {
  const cont = document.getElementById('rarity-kpis');
  try {
    const [totSp]   = await birdQuery(`SELECT COUNT(DISTINCT Com_Name) as n FROM detections WHERE Confidence >= ?`, [conf]);
    const [rareSp]  = await birdQuery(
      `SELECT COUNT(*) as n FROM (
         SELECT Com_Name FROM detections WHERE Confidence >= ?
         GROUP BY Com_Name HAVING COUNT(*) <= ?
       )`, [conf, maxDet]
    );
    const [onceSp]  = await birdQuery(
      `SELECT COUNT(*) as n FROM (
         SELECT Com_Name FROM detections WHERE Confidence >= ?
         GROUP BY Com_Name HAVING COUNT(*) = 1
       )`, [conf]
    );
    const thisYear  = localDateStr().substring(0,4);
    const [newSp]   = await birdQuery(
      `SELECT COUNT(*) as n FROM (
         SELECT Com_Name FROM detections
         WHERE Confidence >= ? AND SUBSTR(Date,1,4) = ?
         GROUP BY Com_Name
         HAVING MIN(Date) >= ? || '-01-01'
       )`, [conf, thisYear, thisYear]
    );

    cont.innerHTML = [
      { val: totSp.n,  label: 'Total espèces',    cls: '' },
      { val: rareSp.n, label: `Rares (≤${maxDet})`, cls: 'amber' },
      { val: onceSp.n, label: 'Vues une fois',     cls: 'blue' },
      { val: newSp.n,  label: `Nouvelles ${thisYear}`, cls: '' },
    ].map(k => `
      <div class="kpi-card">
        <div class="kpi-value ${k.cls}">${k.val}</div>
        <div class="kpi-label">${k.label}</div>
      </div>`).join('');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Espèces vues une seule fois ──────────────────────────────────────────────
async function loadOnceList(conf) {
  const cont = document.getElementById('once-list');
  try {
    const rows = await birdQuery(
      `SELECT Com_Name, MAX(Sci_Name) as sci, MAX(Date) as last_date,
              MAX(Time) as last_time, MAX(Confidence) as max_conf
       FROM detections WHERE Confidence >= ?
       GROUP BY Com_Name HAVING COUNT(*) = 1
       ORDER BY last_date DESC LIMIT 20`,
      [conf]
    );
    if (!rows.length) { cont.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }
    cont.innerHTML = rows.map(r => {
      const cc = parseFloat(r.max_conf) >= 0.8 ? 'conf-high' : 'conf-mid';
      return `
        <div class="det-item" style="cursor:pointer;"
             onclick="navigateTo('especes.html',{species:'${encodeURIComponent(r.Com_Name)}'})">
          <div style="font-size:.9rem; flex:1;">
            <span style="color:var(--danger);">💎</span>
            <strong style="color:var(--text-main);">${r.Com_Name}</strong>
            <div style="font-size:.74rem; color:var(--text-muted); font-style:italic;">${r.sci || ''}</div>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <span class="conf-badge ${cc}">${fmtConf(r.max_conf)}</span>
            <div style="font-size:.72rem; color:var(--text-faint); margin-top:.2rem;">${fmtDate(r.last_date)}</div>
          </div>
        </div>`;
    }).join('');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Dernières détections d'espèces rares ─────────────────────────────────────
async function loadRecentRare(conf, maxDet) {
  const cont = document.getElementById('recent-rare');
  try {
    const rows = await birdQuery(
      `SELECT d.Date, d.Time, d.Com_Name, d.Sci_Name, d.Confidence, d.File_Name
       FROM detections d
       INNER JOIN (
         SELECT Com_Name FROM detections WHERE Confidence >= ?
         GROUP BY Com_Name HAVING COUNT(*) <= ?
       ) rare ON d.Com_Name = rare.Com_Name
       WHERE d.Confidence >= ?
       ORDER BY d.Date DESC, d.Time DESC LIMIT 15`,
      [conf, maxDet, conf]
    );
    if (!rows.length) { cont.innerHTML = `<p class="error-msg">${t('no_data')}</p>`; return; }
    cont.innerHTML = rows.map(d => {
      const cc = parseFloat(d.Confidence) >= 0.8 ? 'conf-high' : 'conf-mid';
      const safeFile = d.File_Name ? d.File_Name.replace(/'/g,"&#39;") : '';
      const playBtn  = d.File_Name
        ? `<button class="play-btn" style="width:22px;height:22px;font-size:.6rem;"
                 onclick="event.stopPropagation();toggleAudio('${safeFile}',this)">▶</button>`
        : '';
      return `
        <div class="det-item" style="cursor:pointer;"
             onclick="navigateTo('especes.html',{species:'${encodeURIComponent(d.Com_Name)}'})">
          ${playBtn}
          <div class="det-time">${fmtDate(d.Date)}</div>
          <div style="flex:1; min-width:0;">
            <div style="font-size:.85rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
              ${d.Com_Name}
            </div>
            <div class="det-sci">${d.Sci_Name || ''}</div>
          </div>
          <span class="conf-badge ${cc}">${fmtConf(d.Confidence)}</span>
        </div>`;
    }).join('');
  } catch(e) { cont.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}

// ── Table complète ─────────────────────────────────────────────────────────────
async function loadRareTable(conf, maxDet) {
  const wrap = document.getElementById('rare-table-wrap');
  try {
    const rows = await birdQuery(
      `SELECT Com_Name, MAX(Sci_Name) as sci,
              COUNT(*) as n,
              MIN(Date) as first_date, MAX(Date) as last_date,
              ROUND(MAX(Confidence)*100,1) as max_conf,
              ROUND(AVG(Confidence)*100,1) as avg_conf
       FROM detections WHERE Confidence >= ?
       GROUP BY Com_Name HAVING n <= ?
       ORDER BY last_date DESC, n ASC`,
      [conf, maxDet]
    );
    if (!rows.length) { wrap.innerHTML = `<div class="error-msg">${t('no_data')}</div>`; return; }
    wrap.innerHTML = `
      <table class="bird-table">
        <thead><tr>
          <th>${t('species_name')}</th>
          <th style="font-style:italic;">Nom latin</th>
          <th>${t('detections_count')}</th>
          <th>${t('first_seen')}</th>
          <th>${t('last_seen')}</th>
          <th>${t('max_confidence')}</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr style="cursor:pointer;"
                onclick="navigateTo('especes.html',{species:'${encodeURIComponent(r.Com_Name)}'})">
              <td>
                <span style="color:var(--danger); margin-right:.3rem;">
                  ${r.n === 1 ? '💎' : r.n <= 3 ? '🔶' : '🔹'}
                </span>
                <strong>${r.Com_Name}</strong>
              </td>
              <td style="font-style:italic; color:var(--text-muted); font-size:.8rem;">${r.sci || ''}</td>
              <td style="text-align:center;">
                <span class="conf-badge ${r.n === 1 ? 'conf-low' : r.n <= 5 ? 'conf-mid' : 'conf-high'}">
                  ${r.n}
                </span>
              </td>
              <td style="font-size:.8rem;">${fmtDate(r.first_date)}</td>
              <td style="font-size:.8rem;">${fmtDate(r.last_date)}</td>
              <td><span class="conf-badge conf-high">${r.max_conf}%</span></td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) { wrap.innerHTML = `<div class="error-msg">⚠ ${e.message}</div>`; }
}
</script>
</body>
</html>
